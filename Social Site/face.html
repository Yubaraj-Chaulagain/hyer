<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Face Capture</title>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding:10px;
}

video{
width:100%;
max-width:500px;
border:2px solid #333;
border-radius:10px;
}

#status{
margin:10px;
font-size:20px;
font-weight:bold;
}

img{
width:120px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<h2>Auto Face Capture</h2>

<video id="video" autoplay playsinline></video>

<div id="status">Starting camera...</div>

<canvas id="canvas" style="display:none"></canvas>

<div id="photos"></div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusBox = document.getElementById("status");
const photosDiv = document.getElementById("photos");

let faceCaptured = false;

async function startCamera(){

const stream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
}
});

video.srcObject = stream;

}

async function detectFace(){

try{

const detector = new FaceDetector();

const faces =
await detector.detect(video);

if(faces.length > 0){

statusBox.innerHTML = "😀 Face Detected";

if(!faceCaptured){

faceCaptured = true;

capturePhotos();

}

}else{

statusBox.innerHTML = "❌ No Face";

faceCaptured = false;

}

}catch(err){

statusBox.innerHTML =
"FaceDetector not supported";

}

requestAnimationFrame(detectFace);

}

function capturePhotos(){

let count = 0;

const interval = setInterval(()=>{

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

const imgData =
canvas.toDataURL("image/jpeg");

const img =
document.createElement("img");

img.src = imgData;

photosDiv.appendChild(img);

const a =
document.createElement("a");

a.href = imgData;
a.download =
"capture_"+Date.now()+".jpg";

a.innerHTML =
"<br>Download";

photosDiv.appendChild(a);

photosDiv.appendChild(
document.createElement("hr")
);

count++;

if(count >= 3){

clearInterval(interval);

}

},1000);

}

startCamera();

video.addEventListener(
"playing",
detectFace
);

</script>

</body>
</html>
