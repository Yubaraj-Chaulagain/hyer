<!DOCTYPE html>
<html>
<body>

<h3>Auto Capture + Local Save</h3>

<video id="video" autoplay playsinline width="320"></video>
<div id="status">Starting...</div>

<button onclick="showPhotos()">Show Saved Photos</button>
<div id="gallery"></div>

<script>

const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const gallery = document.getElementById("gallery");

let previousFrame = null;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
  video.srcObject = stream;
});

function savePhoto(data){

  let photos = JSON.parse(localStorage.getItem("photos") || "[]");

  photos.push({
    time: Date.now(),
    img: data
  });

  localStorage.setItem("photos", JSON.stringify(photos));

}

function capturePhoto(){

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const data = canvas.toDataURL("image/jpeg",0.7);

  savePhoto(data);

  statusBox.innerHTML = "📸 Photo Saved in Local Storage";
}

function detectMotion(){

  if(video.videoWidth === 0){
    requestAnimationFrame(detectMotion);
    return;
  }

  const temp = document.createElement("canvas");
  temp.width = 160;
  temp.height = 120;

  const tctx = temp.getContext("2d");
  tctx.drawImage(video,0,0,160,120);

  const current = tctx.getImageData(0,0,160,120).data;

  if(previousFrame){

    let diff = 0;

    for(let i=0;i<current.length;i+=4){
      diff += Math.abs(current[i] - previousFrame[i]);
    }

    if(diff > 90000){
      capturePhoto();
    }
  }

  previousFrame = new Uint8ClampedArray(current);

  requestAnimationFrame(detectMotion);
}

function showPhotos(){

  gallery.innerHTML = "";

  let photos = JSON.parse(localStorage.getItem("photos") || "[]");

  photos.forEach(p=>{
    let img = document.createElement("img");
    img.src = p.img;
    img.width = 120;
    gallery.appendChild(img);
  });

}

video.addEventListener("playing",detectMotion);

</script>

</body>
</html>
