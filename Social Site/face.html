<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Camera Storage</title>
</head>
<body>

<h3>Offline Auto Save Camera</h3>

<video id="video" autoplay playsinline width="320"></video>
<br><br>

<button onclick="showPhotos()">Show Photos</button>
<button onclick="clearPhotos()">Clear All</button>

<div id="gallery"></div>

<script>

const video = document.getElementById("video");
const gallery = document.getElementById("gallery");

let previousFrame = null;
let db;

// -------------------- OPEN DATABASE --------------------
const request = indexedDB.open("PhotoDB", 1);

request.onupgradeneeded = function(e){
  db = e.target.result;
  db.createObjectStore("photos", { keyPath: "id", autoIncrement:true });
};

request.onsuccess = function(e){
  db = e.target.result;
  startCamera();
};

// -------------------- CAMERA --------------------
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    video.srcObject = stream;
  });

  video.addEventListener("playing", detectMotion);
}

// -------------------- SAVE PHOTO --------------------
function savePhoto(data){

  const tx = db.transaction("photos","readwrite");
  const store = tx.objectStore("photos");

  store.add({
    image: data,
    time: Date.now()
  });

}

// -------------------- CAPTURE --------------------
function capturePhoto(){

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img = canvas.toDataURL("image/jpeg",0.7);

  savePhoto(img);

  console.log("Saved to IndexedDB");
}

// -------------------- MOTION DETECT --------------------
function detectMotion(){

  const temp = document.createElement("canvas");
  temp.width = 160;
  temp.height = 120;

  const tctx = temp.getContext("2d");
  tctx.drawImage(video,0,0,160,120);

  const current = tctx.getImageData(0,0,160,120).data;

  if(previousFrame){

    let diff = 0;

    for(let i=0;i<current.length;i+=4){
      diff += Math.abs(current[i] - previousFrame[i]);
    }

    if(diff > 90000){
      capturePhoto();
    }
  }

  previousFrame = new Uint8ClampedArray(current);

  requestAnimationFrame(detectMotion);
}

// -------------------- SHOW PHOTOS --------------------
function showPhotos(){

  gallery.innerHTML = "";

  const tx = db.transaction("photos","readonly");
  const store = tx.objectStore("photos");

  store.getAll().onsuccess = function(e){

    e.target.result.forEach(p=>{
      const img = document.createElement("img");
      img.src = p.image;
      img.width = 120;
      img.style.margin = "5px";
      gallery.appendChild(img);
    });

  };
}

// -------------------- CLEAR --------------------
function clearPhotos(){
  const tx = db.transaction("photos","readwrite");
  tx.objectStore("photos").clear();
  gallery.innerHTML = "";
}

</script>

</body>
</html>
