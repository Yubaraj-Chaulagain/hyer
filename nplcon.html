<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepali Congress Member Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
    color:#003893;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    text-align:center;
}
.card h2{
    margin:0;
    color:#003893;
}
.card p{
    font-size:28px;
    margin:10px 0 0;
    font-weight:bold;
}
.search-box{
    margin:20px 0;
}
input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}
.table-wrap{
    overflow:auto;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th,td{
    padding:10px;
    border:1px solid #ddd;
}
th{
    background:#003893;
    color:#fff;
}
.chart-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin:20px 0;
}
@media(max-width:768px){
.chart-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<h1>नेपाली कांग्रेस सदस्य Dashboard</h1>

<div class="cards">
<div class="card">
<h2>कुल सदस्य</h2>
<p id="total">0</p>
</div>

<div class="card">
<h2>पुरुष</h2>
<p id="male">0</p>
</div>

<div class="card">
<h2>महिला</h2>
<p id="female">0</p>
</div>

<div class="card">
<h2>नयाँ सदस्य</h2>
<p id="newMember">0</p>
</div>
</div>

<div class="chart-grid">
<div class="card">
<canvas id="genderChart"></canvas>
</div>

<div class="card">
<canvas id="addressChart"></canvas>
</div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="सदस्य खोज्नुहोस्...">
</div>

<div class="table-wrap">
<table id="memberTable">
<thead>
<tr>
<th>ID</th>
<th>Gender</th>
<th>Name</th>
<th>Status</th>
<th>Address</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTRZiCAKAgh-hpvPLSqw_2oxsgAVUETX0tJMBjVpLGtOIxwHgkeiGdWkgki85NLNNlGHISZxTGNAhCL/pub?gid=0&single=true&output=csv";

let allData=[];

fetch(CSV_URL)
.then(res=>res.text())
.then(csv=>{

const rows=csv.trim().split("\n");
const data=[];

for(let i=1;i<rows.length;i++){

const cols=rows[i].split(",");

if(cols.length>=5){

data.push({
id:cols[0],
gender:cols[1],
name:cols[2],
status:cols[3],
address:cols[4]
});

}

}

allData=data;

renderDashboard(data);
renderTable(data);

});

function renderDashboard(data){

document.getElementById("total").innerText=data.length;

const male=data.filter(x=>x.gender.includes("पुरुष")).length;
const female=data.filter(x=>x.gender.includes("महिला")).length;

document.getElementById("male").innerText=male;
document.getElementById("female").innerText=female;

const newMember=data.filter(x=>x.status.includes("नयाँ")).length;
document.getElementById("newMember").innerText=newMember;

new Chart(document.getElementById("genderChart"),{
type:"pie",
data:{
labels:["पुरुष","महिला"],
datasets:[{
data:[male,female]
}]
}
});

const addressCount={};

data.forEach(r=>{
addressCount[r.address]=(addressCount[r.address]||0)+1;
});

new Chart(document.getElementById("addressChart"),{
type:"bar",
data:{
labels:Object.keys(addressCount),
datasets:[{
label:"Members",
data:Object.values(addressCount)
}]
}
});

}

function renderTable(data){

const tbody=document.querySelector("#memberTable tbody");

tbody.innerHTML="";

data.forEach(r=>{

tbody.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.gender}</td>
<td>${r.name}</td>
<td>${r.status}</td>
<td>${r.address}</td>
</tr>
`;

});

}

document.getElementById("search")
.addEventListener("keyup",function(){

const q=this.value.toLowerCase();

const filtered=allData.filter(x=>
x.name.toLowerCase().includes(q) ||
x.address.toLowerCase().includes(q)
);

renderTable(filtered);

});

</script>

</body>
</html>
