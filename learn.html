<input type="text" id="searchInput" placeholder="Search Name..." oninput="handleInput()">

<table id="myTable" border="1">
  <tr>
    <th>Name</th>
    <th>Age</th>
  </tr>
  <tr>
    <td>Saroj</td>
    <td>22</td>
  </tr>
  <tr>
    <td>Ram</td>
    <td>25</td>
  </tr>
  <tr>
    <td>Shyam</td>
    <td>30</td>
  </tr>
</table>

<script>
function handleInput() {
  let input = document.getElementById("searchInput");

  // ✅ Auto Capitalize
  let words = input.value.toLowerCase().split(" ");
  for (let i = 0; i < words.length; i++) {
    if (words[i]) {
      words[i] = words[i][0].toUpperCase() + words[i].slice(1);
    }
  }
  input.value = words.join(" ");

  // 🔍 Search Function
  let filter = input.value.toLowerCase();
  let tr = document.querySelectorAll("#myTable tr");

  for (let i = 1; i < tr.length; i++) {
    let td = tr[i].getElementsByTagName("td")[0]; // Name column

    if (td) {
      let text = td.textContent.toLowerCase();
      tr[i].style.display = text.includes(filter) ? "" : "none";
    }
  }
}
</script>
