<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Auto Reply Chat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:500px;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#fff;
}

.header{
  background:#2563eb;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
  background:#f1f5f9;
}

.msg{
  max-width:80%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  white-space:pre-wrap;
}

.user{
  background:#2563eb;
  color:#fff;
  margin-left:auto;
}

.bot{
  background:#e2e8f0;
}

.inputBox{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:12px;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  margin-left:8px;
  padding:12px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">💬 Pro Auto Reply System</div>

  <div id="chat" class="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="Type question...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOtSNDD7aXPK2sFvWtFZL_GNonYJyvcP6JMKuVB9bbO88sFq9D_g4MekAIzSUwZthsICeStMrm2GbU/pub?output=csv";

let data = [];

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// simple CSV parser
function parseCSV(text){
  return text.split("\n").map(r => r.split(","));
}

// add message
function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// load sheet
async function load(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);

    data = [];

    for(let i=1;i<rows.length;i++){
      let q = (rows[i][0]||"").trim();
      let a = (rows[i][1]||"").trim();

      if(q){
        data.push({q,a});
      }
    }

    localStorage.setItem("chat_data", JSON.stringify(data));

  }catch(e){
    let cache = localStorage.getItem("chat_data");
    if(cache) data = JSON.parse(cache);
  }
}

load();

// send function
function send(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");

  let found = data.find(x =>
    x.q.toLowerCase().includes(text.toLowerCase())
  );

  if(found){
    addMsg(found.a || "No answer found","bot");
  }else{
    addMsg("Sorry, no match found","bot");
  }

  input.value = "";
}

// Enter key support
input.addEventListener("keypress", (e)=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
