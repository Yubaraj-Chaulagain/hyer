<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Reply System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#f4f6f9;
  --card:#fff;
  --text:#222;
  --accent:#007bff;
}
body.dark{
  --bg:#1e1e1e;
  --card:#2a2a2a;
  --text:#fff;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:10px;
  text-align:center;
  background:var(--accent);
  color:white;
}
.container{
  padding:10px;
  max-width:900px;
  margin:auto;
}
input,button,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:1px solid #ccc;
}
button{
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
}
.card{
  background:var(--card);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}
.row{
  display:flex;
  gap:10px;
}
.row button{
  flex:1;
}
.small{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
Auto Reply System (CSV + Live Search + WhatsApp)
</header>

<div class="container">

<button onclick="toggleDark()">🌙 Dark Mode</button>

<input id="search" placeholder="Search question..." oninput="render()">

<input id="q" placeholder="Question">
<input id="a" placeholder="Answer">

<div class="row">
<button onclick="addData()">Add</button>
<button onclick="updateData()">Update</button>
</div>

<button onclick="exportCSV()">Export CSV</button>
<input type="file" onchange="importCSV(event)">

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")||"[]");
let editIndex = -1;

function save(){
  localStorage.setItem("data",JSON.stringify(data));
}

function addData(){
  let q=document.getElementById("q").value;
  let a=document.getElementById("a").value;
  if(!q||!a) return alert("Fill both");
  data.push({q,a});
  save(); render();
}

function updateData(){
  if(editIndex==-1) return alert("Select item first");
  data[editIndex].q=document.getElementById("q").value;
  data[editIndex].a=document.getElementById("a").value;
  editIndex=-1;
  save(); render();
}

function del(i){
  data.splice(i,1);
  save(); render();
}

function fill(i){
  document.getElementById("q").value=data[i].q;
  document.getElementById("a").value=data[i].a;
  editIndex=i;
}

function copyText(t){
  navigator.clipboard.writeText(t);
  alert("Copied!");
}

function whatsapp(t){
  window.open("https://wa.me/?text="+encodeURIComponent(t));
}

function render(){
  let s=document.getElementById("search").value.toLowerCase();
  let list=document.getElementById("list");
  list.innerHTML="";
  data.filter(x=>x.q.toLowerCase().includes(s)).forEach((x,i)=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${x.q}</b><br>
      <span class="small">${x.a}</span><br><br>
      <div class="row">
        <button onclick="fill(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
      </div>
      <div class="row">
        <button onclick="copyText('${x.a}')">Copy</button>
        <button onclick="whatsapp('${x.a}')">WhatsApp</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function exportCSV(){
  let csv="Question,Answer\n";
  data.forEach(x=>{
    csv+=`"${x.q}","${x.a}"\n`;
  });
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

function importCSV(e){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=function(){
    let lines=reader.result.split("\n");
    data=[];
    lines.forEach(l=>{
      let [q,a]=l.split(",");
      if(q&&a) data.push({q:q.replace(/"/g,""),a:a.replace(/"/g,"")});
    });
    save(); render();
  }
  reader.readAsText(file);
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
