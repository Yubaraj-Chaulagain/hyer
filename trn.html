<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<table id="myTable" class="display" style="width:100%"></table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOtSNDD7aXPK2sFvWtFZL_GNonYJyvcP6JMKuVB9bbO88sFq9D_g4MekAIzSUwZthsICeStMrm2GbU/pub?gid=0&single=true&output=csv";

Papa.parse(csvUrl, {
    download: true,
    complete: function(results) {

        const cols = [0, 1, 2, 6, 13]; // Columns 1,2,3,7,14 (0-based index)

        const headers = cols.map(i => ({
            title: results.data[0][i]
        }));

        const data = results.data.slice(1).map(row =>
            cols.map(i => row[i])
        );

        $('#myTable').DataTable({
            data: data,
            columns: headers,
            pageLength: 25,
            searching: true,
            ordering: true,
            responsive: true
        });

    }
});
</script>
</body>
</html>
