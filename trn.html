<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<style>
body{
    font-family:Arial,sans-serif;
    margin:10px;
    background:#f5f5f5;
}

.dataTables_wrapper{
    width:100%;
    overflow-x:auto;
}

.card{
    max-width:320px;
    margin:15px auto;
    padding:15px;
    background:#1976d2;
    color:#fff;
    text-align:center;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.card h3{
    margin:0;
    font-size:18px;
}

.card h2{
    margin:10px 0 0;
    font-size:32px;
    font-weight:bold;
}

table.dataTable{
    width:100%!important;
    border-collapse:collapse;
    font-size:14px;
    background:#fff;
}

table.dataTable thead th{
    background:#1976d2;
    color:#fff;
    text-align:center;
    white-space:nowrap;
}

table.dataTable tbody td{
    text-align:center;
    white-space:nowrap;
}

.dataTables_filter input,
.dataTables_length select{
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

@media(max-width:768px){
    table.dataTable{
        font-size:12px;
    }

    .dataTables_filter,
    .dataTables_length,
    .dataTables_info,
    .dataTables_paginate{
        text-align:center!important;
        float:none!important;
        margin:8px 0;
    }
}
</style>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
<div style="
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
border-radius:10px 10px 0 0;
font-family:Arial,sans-serif;">
Yubaraj Personal Business
</div>
<div id="totalCard" class="card">
    <h3>Total Amount</h3>
    <h2 id="grandTotal">0</h2>
</div>

<table id="myTable" class="display" style="width:100%"></table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOtSNDD7aXPK2sFvWtFZL_GNonYJyvcP6JMKuVB9bbO88sFq9D_g4MekAIzSUwZthsICeStMrm2GbU/pub?gid=0&single=true&output=csv";

Papa.parse(csvUrl, {
    download: true,
    complete: function(results) {

        const cols = [0, 1, 2, 6, 13]; // Columns 1,2,3,7,14 (0-based index)

        const headers = cols.map(i => ({
            title: results.data[0][i]
        }));

        const data = results.data.slice(1).map(row =>
            cols.map(i => row[i])
        );

        $('#myTable').DataTable({
            data: data,
            columns: headers,
            pageLength: 25,
            searching: true,
            ordering: true,
            responsive: true
        });

    }
});


// Calculate total of displayed column 14
let total = data.reduce((sum, row) => {
    return sum + (parseFloat(String(row[4]).replace(/,/g,'')) || 0);
}, 0);

// Show in card
document.getElementById("grandTotal").textContent =
    total.toLocaleString();
</script>
</body>
</html>
