    <script>
let workCount = 0;

function addWork(){
workCount++;
let div=document.createElement('div');
div.className='workBox';
div.innerHTML=`
<input placeholder="Job Title" id="job${workCount}">
<input placeholder="Company" id="company${workCount}">
<input placeholder="Start Date" id="start${workCount}">
<input placeholder="End Date" id="end${workCount}">
<input placeholder="Address" id="address${workCount}">

<textarea placeholder="Description" id="desc${workCount}"></textarea>
`;
document.getElementById('workContainer').appendChild(div);
}

function gen(){

document.getElementById("cvName").innerText =
document.getElementById("name").value || "Your Name";

document.getElementById("cvLocation").innerText =
document.getElementById("location").value || "";

document.getElementById("cvPhone").innerText =
document.getElementById("phone").value || "";

document.getElementById("cvEmail").innerText =
document.getElementById("email").value || "";

document.getElementById("cvDob").innerText =
document.getElementById("dob").value || "";
    
document.getElementById("cvgender").innerText =
document.getElementById("gender").value || "";

document.getElementById("cvNationality").innerText =
document.getElementById("nationality").value || "";

document.getElementById("cvSummary").innerText =
document.getElementById("summary").value || "";

document.getElementById("cvSkills").innerText =
document.getElementById("skills").value || "";

document.getElementById("cvLang").innerText =
document.getElementById("languages").value || "";

document.getElementById("cvEdu").innerText =
document.getElementById("education").value || "";

document.getElementById("cvRespons").innerText =
document.getElementById("Responsbiliti").value || "";

/* WORK HISTORY */
let workHTML = "";

for(let i=1;i<=workCount;i++){
let job=document.getElementById('job'+i)?.value||"";
let company=document.getElementById('company'+i)?.value||"";
let start=document.getElementById('start'+i)?.value||"";
let end=document.getElementById('end'+i)?.value||"";
let address=document.getElementById('address'+i)?.value||"";
let desc=document.getElementById('desc'+i)?.value||"";

if(job || company){
workHTML += `
<p><b>${job}</b> (${start} - ${end})</p>
<p>${company} | ${address}</p>
<p class='small'>${desc}</p><br>
`;
}
}

document.getElementById("cvWork").innerHTML = workHTML;

/* PHOTO */
let file = document.getElementById("photo").files[0];
if(file){
let reader = new FileReader();
reader.onload = function(e){
document.getElementById("cvPhoto").src = e.target.result;
};
reader.readAsDataURL(file);
}

}
    </script>
    <script>

async function downloadPDF(){
  const { jsPDF } = window.jspdf;

  let cv = document.querySelector(".cv");

  // Convert HTML to canvas
  let canvas = await html2canvas(cv, {
    scale: 2
  });

  let imgData = canvas.toDataURL("image/png");

  // A4 size
  let pdf = new jsPDF("p", "mm", "a4");

  let imgWidth = 210;
  let pageHeight = 297;

  let imgHeight = canvas.height * imgWidth / canvas.width;

  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);

  // If content is long → multiple pages
  while (imgHeight > pageHeight){
    position = position - pageHeight;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    imgHeight -= pageHeight;
  }

  pdf.save("cv-design.pdf");
}

        async function syncToSheet(){
  let all = JSON.parse(localStorage.getItem("cvData") || "[]");

  for(let data of all){
    await fetch("YOUR_WEB_APP_URL", {
      method: "POST",
      body: JSON.stringify(data)
    });
  }

  localStorage.removeItem("cvData");
  alert("Synced to Google Sheets 🚀");
}


        function loadList(){
  let all = JSON.parse(localStorage.getItem("cvData") || "[]");
  let html = "";

  all.forEach(d => {
    html += `
      <div class="workBox">
        <b>${d.name}</b><br>
        ${d.phone}<br><br>

        <button onclick="editData(${d.id})">Edit</button>
        <button onclick="deleteData(${d.id})">Delete</button>
      </div>
    `;
  });

  document.getElementById("dataList").innerHTML = html;
}
function deleteData(id){
  if(!confirm("Delete this CV?")) return;

  let all = JSON.parse(localStorage.getItem("cvData") || "[]");
  all = all.filter(d => d.id !== id);

  localStorage.setItem("cvData", JSON.stringify(all));
  loadList();
}

let editId = null; // ✅ ADD THIS        
function editData(id){
  let all = JSON.parse(localStorage.getItem("cvData") || "[]");
  let d = all.find(x => x.id === id);
  if(!d) return;

 document.getElementById("name").value = d.name;
document.getElementById("location").value = d.location;
document.getElementById("phone").value = d.phone;
document.getElementById("email").value = d.email;
document.getElementById("dob").value = d.dob;
document.getElementById("gender").value = d.gender;
document.getElementById("nationality").value = d.nationality;
document.getElementById("summary").value = d.summary;
document.getElementById("skills").value = d.skills;
document.getElementById("languages").value = d.languages;
document.getElementById("education").value = d.education;
document.getElementById("Responsbiliti").value = d.Responsbiliti;

  // ✅ load WORKS
  document.getElementById("workContainer").innerHTML = "";
  workCount = 0;

  d.works?.forEach(w => {
    addWork();
    document.getElementById('job'+workCount).value = w.job;
    document.getElementById('company'+workCount).value = w.company;
    document.getElementById('start'+workCount).value = w.start;
    document.getElementById('end'+workCount).value = w.end;
    document.getElementById('address'+workCount).value = w.address;
    document.getElementById('desc'+workCount).value = w.desc;
  });

  // ✅ load PHOTO
  if(d.photo){
    document.getElementById("cvPhoto").src = d.photo;
  }

  editId = id;
  alert("Editing Mode ✏️");
}
  function saveOffline(){
  let all = JSON.parse(localStorage.getItem("cvData") || "[]");

  // ✅ collect WORK DATA
  let works = [];
  for(let i=1;i<=workCount;i++){
    let job = document.getElementById('job'+i)?.value || "";
    let company = document.getElementById('company'+i)?.value || "";
    let start = document.getElementById('start'+i)?.value || "";
    let end = document.getElementById('end'+i)?.value || "";
    let address = document.getElementById('address'+i)?.value || "";
    let desc = document.getElementById('desc'+i)?.value || "";

    if(job || company){
      works.push({job, company, start, end, address, desc});
    }
  }

  // ✅ photo (base64)
  let photoData = document.getElementById("cvPhoto").src || "";

  let newData = {
  id: editId || Date.now(),
  name: document.getElementById("name").value,
  location: document.getElementById("location").value,
  phone: document.getElementById("phone").value,
  email: document.getElementById("email").value,
  dob: document.getElementById("dob").value,
  gender: document.getElementById("gender").value,
  nationality: document.getElementById("nationality").value,
  summary: document.getElementById("summary").value,
  skills: document.getElementById("skills").value,
  languages: document.getElementById("languages").value,
  education: document.getElementById("education").value,
  Responsbiliti: document.getElementById("Responsbiliti").value,
  works: works,
  photo: photoData
};

  if(editId){
    all = all.map(d => d.id === editId ? newData : d);
  } else {
    all.push(newData);
  }

  localStorage.setItem("cvData", JSON.stringify(all));

  clearForm();
  loadList();

  alert(editId ? "Updated ✅" : "Saved ✅");
}
        
   function clearForm(){
  name.value = "";
  location.value = "";
  phone.value = "";
  email.value = "";
  dob.value = "";
  gender.value = "";
  nationality.value = "";
  summary.value = "";
  skills.value = "";
  languages.value = "";
  education.value = "";
  Responsbiliti.value = "";

  document.getElementById("workContainer").innerHTML = "";
  document.getElementById("cvPhoto").src = "";

  workCount = 0;
  editId = null;
}
        
        window.onload = function(){
  loadList();
};
        
        
        </script>

<script>
let scale = 1;
let posX = 0;
let posY = 0;

const img = document.getElementById("cvPhoto");
const zoom = document.getElementById("zoomRange");

zoom.addEventListener("input", function(){
  scale = this.value;
  updateTransform();
});

function updateTransform(){
  img.style.transform =
    `translate(${posX}px, ${posY}px) scale(${scale})`;
}

/* DRAG SYSTEM */
let isDragging = false;
let startX, startY;

img.addEventListener("mousedown", startDrag);
img.addEventListener("touchstart", startDrag);

function startDrag(e){
  isDragging = true;

  let point = e.touches ? e.touches[0] : e;

  startX = point.clientX - posX;
  startY = point.clientY - posY;
}

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

function drag(e){
  if(!isDragging) return;

  let point = e.touches ? e.touches[0] : e;

  posX = point.clientX - startX;
  posY = point.clientY - startY;

  updateTransform();
}

document.addEventListener("mouseup", stopDrag);
document.addEventListener("touchend", stopDrag);

function stopDrag(){
  isDragging = false;
}
</script>
