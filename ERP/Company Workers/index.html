<script>
let stock = JSON.parse(localStorage.getItem('stock') || '[]');
let user = document.getElementById('user');
let pass = document.getElementById('pass');
let loginCard = document.getElementById('loginCard');
let app = document.getElementById('app');
let registerCard = document.getElementById('registerCard');
let loginHistory = JSON.parse(localStorage.getItem('loginHistory') || '[]');
let activities = JSON.parse(localStorage.getItem('activities') || '[]');
let users = JSON.parse(localStorage.getItem('users') || '[]');
let customers=JSON.parse(localStorage.getItem('customers')||'[]');
let companies=JSON.parse(localStorage.getItem('companies')||'[]');
let legal=JSON.parse(localStorage.getItem('legal')||'[]');
let attendance=JSON.parse(localStorage.getItem('attendance')||'[]');
let txn=JSON.parse(localStorage.getItem('txn')||'[]');

function save(){

localStorage.setItem('customers',JSON.stringify(customers));
localStorage.setItem('companies',JSON.stringify(companies));
localStorage.setItem('legal',JSON.stringify(legal));
localStorage.setItem('attendance',JSON.stringify(attendance));
localStorage.setItem('txn',JSON.stringify(txn));
localStorage.setItem('stock',JSON.stringify(stock));

localStorage.setItem('users',JSON.stringify(users));
localStorage.setItem('activities',JSON.stringify(activities));
localStorage.setItem('loginHistory',JSON.stringify(loginHistory));

}

function login(){

let username = user.value.trim();
let password = pass.value.trim();

// 🔒 BLOCK CHECK
if(isBlocked(username)){
return;
}

// 🔑 ADMIN PASSWORD
let adminPass = localStorage.getItem("adminPass") || "admin123";

// ✅ ADMIN LOGIN
if(username === "admin"){

// ❌ WRONG ADMIN PASSWORD
if(password !== adminPass){

addFailedAttempt(username);

saveHistory(username, "Failed");
logActivity("Failed Admin Login");

alert("Wrong admin password");

return;
}

// ✅ SUCCESS
resetAttempts(username);

let adminUser = {
username:"admin",
role:"Admin"
};

localStorage.setItem("currentUser", JSON.stringify(adminUser));

saveHistory("admin", "Success");
logActivity("Admin Login Success");

loginCard.classList.add('hidden');
app.classList.remove('hidden');

loadAll();
applyPermissions();
show("customer");

return;
}

// 👤 NORMAL USER
let u = users.find(x =>
x.username == username &&
x.password == password
);

// ❌ WRONG LOGIN
if(!u){

addFailedAttempt(username);

saveHistory(username, "Failed");
logActivity("Failed Login: " + username);

alert("Invalid username or password");

return;
}

// ❌ NOT ACTIVE
if(u.status != "Active"){

alert("User not approved");

return;
}

// ⏳ EXPIRY
let today = new Date().toISOString().split("T")[0];

if(u.end && today > u.end){

u.status = "Disabled";

localStorage.setItem(
'users',
JSON.stringify(users)
);

alert("Account expired");

return;
}

// ✅ SUCCESS LOGIN
resetAttempts(username);

saveHistory(username, "Success");
logActivity("Login Success: " + username);

localStorage.setItem(
"currentUser",
JSON.stringify(u)
);

loginCard.classList.add('hidden');
app.classList.remove('hidden');

loadAll();
applyPermissions();
show("customer");
}
function logout(){location.reload();}

function show(id){

  let current = getCurrentUser();

  // safety check
  if(!document.getElementById(id)) return;

  // ✅ ALL SECTION HIDE
  [
    "customer",
    "company",
    "legal",
    "attendance",
    "transaction",
    "stock",
    "buy",
    "sell",
    "users",
    "history",
    "activity"
  ].forEach(x=>{
    let el = document.getElementById(x);
    if(el){
      el.classList.add("hidden");
    }
  });

  // ✅ OPEN SELECTED SECTION
  let target = document.getElementById(id);
  if(target){
    target.classList.remove("hidden");
  }

  // ✅ PAGE TITLE
  let title = document.getElementById("pageTitle");

  if(title){

    let titles = {
      customer:"Customers",
      company:"Working Company",
      legal:"Legal Company",
      attendance:"Attendance",
      transaction:"Transactions",
      stock:"Stock Management",
      buy:"Buy Product",
      sell:"Sell Product",
      users:"User Management",
      history:"Login History",
      activity:"Activity Log"
    };

    title.innerText = titles[id] || "Dashboard";
  }

  // ✅ MOBILE MENU AUTO CLOSE
  let nav = document.getElementById("navMenu");
  if(nav){
    nav.classList.remove("show");
  }
}

  alert("Fill required fields");
  return;
}

customers.push({
id: Date.now() + Math.random(),
  name: c_name.value,
  prof: c_prof.value,
  company: c_company.value || "N/A",
  email: c_email.value,
  phone: c_phone.value,
  balance: 0,
  date: new Date().toLocaleString()
});

logActivity("Added Customer: " + c_name.value);

save();
loadAll();

// clear fields
clearInputs([
  "c_name",
  "c_prof",
  "c_company",
  "c_email",
  "c_phone"
]);

}

 let failedAttempts = JSON.parse(localStorage.getItem('failedAttempts') || '{}');

// ❌ WRONG LOGIN COUNT
function addFailedAttempt(username){

if(!failedAttempts[username]){
failedAttempts[username] = {
count:0,
blockedUntil:null
};
}

failedAttempts[username].count++;

// 🔥 3 TIME WRONG = BLOCK 2 MINUTE
if(failedAttempts[username].count >= 3){

failedAttempts[username].blockedUntil = Date.now() + (2 * 60 * 1000);

alert("❌ Account locked for 2 minutes");

}

localStorage.setItem(
'failedAttempts',
JSON.stringify(failedAttempts)
);
}

// 🔒 BLOCK CHECK
function isBlocked(username){

let data = failedAttempts[username];

if(!data) return false;

// ⏳ BLOCK TIME CHECK
if(data.blockedUntil){

if(Date.now() < data.blockedUntil){

let remain =
Math.ceil((data.blockedUntil - Date.now()) / 1000);

alert("⛔ Try again after " + remain + " sec");

return true;

}else{

// ✅ AUTO RESET AFTER 2 MIN
failedAttempts[username] = {
count:0,
blockedUntil:null
};

localStorage.setItem(
'failedAttempts',
JSON.stringify(failedAttempts)
);

return false;
}
}

return false;
}

// ✅ RESET AFTER SUCCESS LOGIN
function resetAttempts(username){

failedAttempts[username] = {
count:0,
blockedUntil:null
};

localStorage.setItem(
'failedAttempts',
JSON.stringify(failedAttempts)
);
}

function exportExcel(){

ATTENDANCE: attendance,
TRANSACTIONS: txn,
USERS: users,
ACTIVITIES: activities,
LOGIN_HISTORY: loginHistory,
STOCK: stock
};

let csv = "";

for(let tableName in tables){

let data = tables[tableName];

csv += "\n\n====================\n";
csv += tableName + "\n";
csv += "====================\n";

if(data.length == 0){

csv += "No Data\n";
continue;

}

// HEADER
let headers = Object.keys(data[0]);

csv += headers.join(",") + "\n";

// ROWS
data.forEach(row=>{

let values = headers.map(h=>{

let val = row[h] ?? "";

return `"${String(val).replace(/"/g,'""')}"`;

});

csv += values.join(",") + "\n";

});

}

// DOWNLOAD SINGLE FILE
let blob = new Blob([csv], {
type: "text/csv;charset=utf-8;"
});

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = "ERP_FULL_DATA.csv";

link.click();

logActivity("Exported Full CSV File");

alert("✅ Single CSV File Exported");

}

    function exportFilteredCSV(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

from = new Date(from);
to = new Date(to);

function inRange(dateStr){

if(!dateStr) return true;

let d = new Date(dateStr);

return d >= from && d <= to;
}

// 🔥 FILTER DATA
let filtered = {

customers: customers,

companies: companies,

legal: legal,

attendance: attendance.filter(x =>
inRange(x.date)
),

transactions: txn.filter(x =>
inRange(x.date)
),

stock: stock,

sell: txn.filter(x =>
x.type=="sell" && inRange(x.date)
),

buy: txn.filter(x =>
x.type=="buy" && inRange(x.date)
),

loginHistory: loginHistory.filter(x =>
inRange(x.time)
),

activities: activities.filter(x =>
inRange(x.time)
),

users: users

};

// 🔥 JSON → CSV STYLE
let csv = "";

for(let key in filtered){

csv += "\n\n===== " + key.toUpperCase() + " =====\n";

let arr = filtered[key];

if(arr.length==0){
csv += "No Data\n";
continue;
}

// HEADER
csv += Object.keys(arr[0]).join(",") + "\n";

// ROWS
arr.forEach(row=>{

csv += Object.values(row)
.map(v => `"${v}"`)
.join(",") + "\n";

});

}

// DOWNLOAD
let blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);

async function syncToGoogleSheet(){

  async function send(sheet, row){
    let res = await fetch(GOOGLE_SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify({ sheet, row })
    });

    return await res.json();
  }

  let ok = true;

  const tables = [
    ["customers", customers],
    ["companies", companies],
    ["stock", stock],
    ["users", users]
  ];

  for(let [sheet, data] of tables){
    for(let row of data){
      let r = await send(sheet, row);
      if(!r || r.status !== "OK"){
        ok = false;
      }
    }
  }

  if(ok){

    // ✅ CLEAR OFFLINE DATA (IMPORTANT)
    customers = [];

  }else{

    // paisa ghataune

  }

  // ✅ CASH MODE

  // ✅ stock reduce

  // ✅ save transaction
  txn.push({
    id: Date.now() + Math.random(),

    function editSell(i){
  let list = txn.filter(t=>t.type=="sell");

  if(!newQty) return;

  let product = stock.find(p=>p.name==old.product);

  // reverse old effect
  if(product) product.qty += old.qty;
  if(customer && old.mode=="account") customer.balance += old.total;

  // recalc
  old.qty = newQty;
  old.total = newQty * product.sellPrice;

  // apply new
  if(product) product.qty -= newQty;
  if(customer && old.mode=="account") customer.balance -= old.total;

  save();
  loadAll();
}

function addTxn(){

let t = t_type.value;
let amount = Number(document.getElementById('amount').value);

if(amount <= 0){
alert("Invalid amount");
return;
}

// 🟢 SAVING / WITHDRAW
if(t=='saving' || t=='withdraw'){

let m = customers.find(c=>c.name==member.value);

if(!m){
alert("Customer not found");
return;
}

if(t=='saving'){
m.balance += amount;
}else{
if(m.balance < amount){
alert("Insufficient balance");
return;
}
m.balance -= amount;
}

txn.push({
id: Date.now() + Math.random(),
type:t,
from:member.value,
amount,
date:new Date().toLocaleString()
});
}

// 🔵 TRANSFER (MOST IMPORTANT)
if(t=='transfer'){

let f = customers.find(c=>c.name==from.value);
let toUser = customers.find(c=>c.name==to.value);

// ❌ same user block
if(from.value == to.value){
alert("Cannot transfer to same customer");
return;
}

// ❌ not found
if(!f || !toUser){
alert("Customer not found");
return;
}

// ❌ insufficient balance
if(f.balance < amount){
alert("Insufficient balance");
return;
}

// ✅ UPDATE BALANCE
f.balance -= amount;
toUser.balance += amount;

// ✅ DOUBLE ENTRY (VERY IMPORTANT)
txn.push({
id: Date.now() + Math.random(),
type:"transfer-out",
from:from.value,
to:to.value,
amount,
date:new Date().toLocaleString()
});

txn.push({
id: Date.now() + Math.random(),
type:"transfer-in",
from:from.value,
to:to.value,
amount,
date:new Date().toLocaleString()
});

}
    logActivity("Transaction: " + t + " Amount: " + amount);

save();
loadAll();
}
