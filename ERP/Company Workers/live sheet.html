<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.card{
    background:#fff;
    margin-bottom:20px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
    background:#2563eb;
    color:#fff;
    padding:12px;
    font-size:18px;
    font-weight:bold;
}

.table-wrap{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#111827;
    color:#fff;
}

tr:nth-child(even){
    background:#f9fafb;
}
</style>
</head>

<body>

<h1>🔥 Auto ERP Dashboard</h1>

<input type="text" id="search" placeholder="Search..." onkeyup="searchAll()">

<div id="app">Loading...</div>

<script>

const SHEET_ID = "1GBZfB519IJtggOlgGNjlG8-gyXi-FlemOEGu2bWZebg";

const SHEETS = [
    "Customers",
    "Users",
    "Stock",
    "Sell",
    "Buy",
    "Transactions",
    "Attendance",
    "Activities"
];

const app = document.getElementById("app");

async function loadAll(){

    app.innerHTML = "";

    for(let sheet of SHEETS){

        try{

            const url =
            `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheet}`;

            const res = await fetch(url);

            const text = await res.text();

            const json = JSON.parse(
                text.substr(47).slice(0,-2)
            );

            renderSheet(sheet,json.table);

        }catch(err){

            console.log(sheet,err);

        }
    }
}

function renderSheet(name,table){

    const card = document.createElement("div");

    card.className = "card";

    let html = `
        <div class="title">${name}</div>
        <div class="table-wrap">
        <table>
    `;

    // HEADERS
    html += "<tr>";

    table.cols.forEach(col=>{

        html += `<th>${col.label}</th>`;

    });

    html += "</tr>";

    // ROWS
    table.rows.forEach(row=>{

        html += `<tr class="row">`;

        row.c.forEach(cell=>{

            html += `<td>${cell ? cell.v : ""}</td>`;

        });

        html += `</tr>`;
    });

    html += "</table></div>";

    card.innerHTML = html;

    app.appendChild(card);
}

function searchAll(){

    const value =
    document.getElementById("search")
    .value
    .toLowerCase();

    const rows =
    document.querySelectorAll(".row");

    rows.forEach(row=>{

        const text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";
    });
}

loadAll();

setInterval(loadAll,30000);

</script>

</body>
</html>
