<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

#menu{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.menu-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.menu-btn:hover{
    background:#1d4ed8;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.card{
    background:#fff;
    margin-bottom:20px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
    background:#2563eb;
    color:#fff;
    padding:12px;
    font-size:18px;
    font-weight:bold;
}

.table-wrap{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#111827;
    color:#fff;
}

tr:nth-child(even){
    background:#f9fafb;
}

.loading{
    text-align:center;
    padding:20px;
    font-size:18px;
}

</style>
</head>

<body>

<h1>🔥 Auto ERP Dashboard</h1>

<input 
type="text" 
id="search" 
placeholder="Search current section..." 
onkeyup="searchCurrentSection()"
>

<!-- MENU -->
<div id="menu"></div>

<!-- APP -->
<div id="app" class="loading">
Loading Google Sheets...
</div>

<script>

const SHEET_ID = "1GBZfB519IJtggOlgGNjlG8-gyXi-FlemOEGu2bWZebg";

const SHEETS = [
    "Customers",
    "Users",
    "Stock",
    "Sell",
    "Buy",
    "Transactions",
    "Attendance",
    "Activities"
];

const app = document.getElementById("app");
const menu = document.getElementById("menu");

async function loadAll(){

    app.innerHTML = "";

    // MENU BUTTONS
    menu.innerHTML = "";

    SHEETS.forEach((sheet,index)=>{

        const btn = document.createElement("button");

        btn.className = "menu-btn";

        btn.innerText = sheet;

        btn.onclick = ()=>showSection(sheet);

        menu.appendChild(btn);
    });

    // LOAD EACH SHEET
    for(let sheet of SHEETS){

        try{

            const url =
            `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}`;

            const res = await fetch(url);

            const text = await res.text();

            const json = JSON.parse(
                text.substr(47).slice(0,-2)
            );

            renderSheet(sheet,json.table);

        }catch(err){

            console.log(sheet,err);

        }
    }

    // DEFAULT FIRST SECTION
    showSection(SHEETS[0]);
}

function renderSheet(name,table){

    const section = document.createElement("div");

    section.className = "section";

    section.id = "section-"+name;

    let html = `
        <div class="card">
            <div class="title">${name}</div>
            <div class="table-wrap">
            <table>
    `;

    // HEADERS
    html += "<tr>";

    table.cols.forEach(col=>{

        html += `<th>${col.label}</th>`;

    });

    html += "</tr>";

    // ROWS
    table.rows.forEach(row=>{

        html += `<tr class="row">`;

        row.c.forEach(cell=>{

            html += `<td>${cell ? cell.v : ""}</td>`;

        });

        html += `</tr>`;
    });

    html += `
            </table>
            </div>
        </div>
    `;

    section.innerHTML = html;

    app.appendChild(section);
}

function showSection(sheetName){

    document.querySelectorAll(".section")
    .forEach(sec=>{

        sec.classList.remove("active");

    });

    const active =
    document.getElementById("section-"+sheetName);

    if(active){

        active.classList.add("active");
    }

    document.getElementById("search").value = "";

    searchCurrentSection();
}

function searchCurrentSection(){

    const value =
    document.getElementById("search")
    .value
    .toLowerCase();

    const activeSection =
    document.querySelector(".section.active");

    if(!activeSection) return;

    const rows =
    activeSection.querySelectorAll(".row");

    rows.forEach(row=>{

        const text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";
    });
}

loadAll();

// AUTO REFRESH
setInterval(loadAll,30000);

</script>

</body>
</html>
