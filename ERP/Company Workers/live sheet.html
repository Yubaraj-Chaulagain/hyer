<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#eef2f7;
    margin:0;
    padding:10px;
}

/* TOP BAR */
.topbar{
    display:flex;
    align-items:center;
    gap:10px;
    background:#2563eb;
    color:white;
    padding:10px;
    position:sticky;
    top:0;
    z-index:1000;
}

/* HAMBURGER BUTTON (ALL DEVICES) */
.hamburger{
    font-size:22px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

/* CENTER APP */
#app{
    max-width:1200px;
    margin:auto;
}

/* TITLE */
h1{
    margin:0;
    font-size:clamp(18px, 2.5vw, 28px);
}

/* SEARCH */
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* SIDE MENU (DEFAULT HIDDEN) */
#menu{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100%;
    background:#111827;
    padding:10px;
    overflow-y:auto;
    transition:0.3s;
    z-index:1000;
    display:flex;
    flex-direction:column;
}

/* OPEN MENU */
#menu.open{
    left:0;
}

/* MENU BUTTONS */
.menu-btn{
    width:100%;
    margin-bottom:8px;
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

/* MENU HOVER */
.menu-btn:hover{
    background:#1d4ed8;
}

/* OVERLAY */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:999;
}

#overlay.show{
    display:block;
}

/* CARD */
.card{
    background:#fff;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* TABLE WRAP */
.table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}

/* TABLE SCROLL BAR */
.table-wrap::-webkit-scrollbar{
    height:6px;
}

.table-wrap::-webkit-scrollbar-thumb{
    background:#888;
    border-radius:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    min-width:600px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    font-size:14px;
    white-space:nowrap;
}

th{
    background:#111827;
    color:#fff;
}

/* ACTIVE SECTION */
.section{
    display:none;
}

.section.active{
    display:block;
}

/* MOBILE */
@media (max-width:768px){

    body{
        padding:8px;
    }

    input{
        font-size:14px;
    }

    th,td{
        font-size:12px;
        padding:6px;
    }
}

/* CHROMEBOOK / DESKTOP (NO AUTO OPEN MENU) */
@media (min-width:768px){
    #menu{
        left:-260px; /* still hidden until click */
    }
}
</style>
</head>

<body>
<!-- TOP BAR -->
<div class="topbar">
    <button class="hamburger" onclick="toggleMenu()">☰</button>
    <h1>🔥 Auto ERP Dashboard</h1>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeMenu()"></div>

<input 
type="text" 
id="search" 
placeholder="Search current section..." 
onkeyup="searchCurrentSection()"
>

<!-- MENU -->
<div id="menu"></div>

<!-- APP -->
<div id="app" class="loading">
Loading Google Sheets...
</div>

<script>

const SHEET_ID = "1GBZfB519IJtggOlgGNjlG8-gyXi-FlemOEGu2bWZebg";

const SHEETS = [
    "Customers",
    "Users",
    "Stock",
    "Sell",
    "Buy",
    "Transactions",
    "Attendance",
    "Activities"
];

const app = document.getElementById("app");
const menu = document.getElementById("menu");

async function loadAll(){
document.getElementById("menu").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
    app.replaceChildren();
    menu.innerHTML = "";

    // MENU BUTTONS
    SHEETS.forEach(sheet=>{

        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.innerText = sheet;
        btn.onclick = ()=>showSection(sheet);
        menu.appendChild(btn);
    });

    // LOAD SHEETS
    for(let sheet of SHEETS){

        try{
            const url =
            `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}`;

            const res = await fetch(url);
            const text = await res.text();

            const json = JSON.parse(text.substr(47).slice(0,-2));

            renderSheet(sheet,json.table);

        }catch(err){
            console.log(sheet,err);
        }
    }

    showSection(SHEETS[0]);
}

function renderSheet(name,table){

    const section = document.createElement("div");

    section.className = "section";

    section.id = "section-"+name;

    let html = `
        <div class="card">
            <div class="title">${name}</div>
            <div class="table-wrap">
            <table>
    `;

    // HEADERS
    html += "<tr>";

    table.cols.forEach(col=>{

        html += `<th>${col.label}</th>`;

    });

    html += "</tr>";

    // ROWS
    table.rows.forEach(row=>{

        html += `<tr class="row">`;

        row.c.forEach(cell=>{

            html += `<td>${cell ? cell.v : ""}</td>`;

        });

        html += `</tr>`;
    });

    html += `
            </table>
            </div>
        </div>
    `;

    section.innerHTML = html;

    app.appendChild(section);
}

function showSection(sheetName){

    document.querySelectorAll(".section")
    .forEach(sec=>{
        sec.classList.remove("active");
    });

    const active =
    document.getElementById("section-"+sheetName);

    if(active){
        active.classList.add("active");
    }

    document.getElementById("search").value = "";

    searchCurrentSection();

    closeMenu(); // 🔥 AUTO CLOSE SIDEBAR
}

    function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
}
    
function searchCurrentSection(){

    const value =
    document.getElementById("search")
    .value
    .toLowerCase();

    const activeSection =
    document.querySelector(".section.active");

    if(!activeSection) return;

    const rows =
    activeSection.querySelectorAll(".row");

    rows.forEach(row=>{

        const text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(value)
        ? ""
        : "none";
    });
}

loadAll();

// AUTO REFRESH
setInterval(loadAll,60000);

</script>

</body>
</html>
