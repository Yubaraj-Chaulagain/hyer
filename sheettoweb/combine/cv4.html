<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro CV Builder Advanced</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body{font-family:Arial;margin:0;background:#eef2f7}
.form{padding:15px;background:#fff}
input,textarea{
width:100%;padding:10px;margin:5px 0;
border-radius:6px;border:1px solid #ccc;
}
button{
width:100%;padding:12px;background:#0f766e;
color:#fff;border:none;border-radius:6px;margin-top:5px;
}
.cv{display:flex;max-width:900px;margin:20px auto;background:#fff}
.left{width:35%;background:#4b6b70;color:#fff;padding:20px}
.left img{width:120px;height:120px;border-radius:10px;object-fit:cover}
.right{width:65%;padding:20px}
h1{margin:0;border-bottom:3px solid black;padding-bottom:5px}
.section{margin-top:15px}
.small{font-size:14px}
.workBox{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}
</style></head><body><div class="form">
<h2>Fill CV Details</h2>
<input type="file" id="photo"><h3>Basic Info</h3>
<input id="name" placeholder="Full Name">
<input id="location" placeholder="Location">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="dob" placeholder="Date of Birth">
<input id="nationality" placeholder="Nationality"><h3>Work Target</h3>
<input id="target" placeholder="e.g. Food Packaging Helper"><h3>Summary</h3>
<textarea id="summary"></textarea><h3>Work History</h3>
<div id="workContainer"></div>
<button onclick="addWork()">+ Add Work</button><h3>Skills</h3>
<textarea id="skills"></textarea><h3>Languages</h3>
<textarea id="languages"></textarea><h3>Education</h3>
<textarea id="education"></textarea><button onclick="gen()">Generate CV</button> <button onclick="downloadTXT()">Download TXT</button> <button onclick="downloadPDF()">Download PDF</button>

</div><div class="cv">
<div class="left">
<img id="cvPhoto">
<h3>Contact</h3>
<p id="cvLocation"></p>
<p id="cvPhone"></p>
<p id="cvEmail"></p>
<p id="cvDob"></p>
<p id="cvNationality"></p><h3>Skills</h3>
<p id="cvSkills"></p><h3>Languages</h3>
<p id="cvLang"></p>
</div><div class="right">
<h1 id="cvName">Your Name</h1>
<p><b>Target:</b> <span id="cvTarget"></span></p><div class="section">
<h3>PROFESSIONAL SUMMARY</h3>
<p id="cvSummary" class="small"></p>
</div><div class="section">
<h3>WORK HISTORY</h3>
<div id="cvWork"></div>
</div><div class="section">
<h3>EDUCATION</h3>
<p id="cvEdu"></p>
</div>
</div>
</div><script>
let workCount = 0;

function addWork(){
workCount++;
let div=document.createElement('div');
div.className='workBox';
div.innerHTML=`
<input placeholder="Job Title" id="job${workCount}">
<input placeholder="Company" id="company${workCount}">
<input placeholder="Start Date" id="start${workCount}">
<input placeholder="End Date" id="end${workCount}">
<input placeholder="Address" id="address${workCount}">
<textarea placeholder="Description" id="desc${workCount}"></textarea>`; document.getElementById('workContainer').appendChild(div); }

function gen(){ const nameEl = document.getElementById('name'); const locationEl = document.getElementById('location'); const phoneEl = document.getElementById('phone'); const emailEl = document.getElementById('email'); const dobEl = document.getElementById('dob'); const nationalityEl = document.getElementById('nationality'); const summaryEl = document.getElementById('summary'); const skillsEl = document.getElementById('skills'); const languagesEl = document.getElementById('languages'); const educationEl = document.getElementById('education'); const targetEl = document.getElementById('target');

const cvName = document.getElementById('cvName'); const cvLocation = document.getElementById('cvLocation'); const cvPhone = document.getElementById('cvPhone'); const cvEmail = document.getElementById('cvEmail'); const cvDob = document.getElementById('cvDob'); const cvNationality = document.getElementById('cvNationality'); const cvSummary = document.getElementById('cvSummary'); const cvSkills = document.getElementById('cvSkills'); const cvLang = document.getElementById('cvLang'); const cvEdu = document.getElementById('cvEdu'); const cvTarget = document.getElementById('cvTarget');

cvName.innerText = nameEl.value; cvLocation.innerText = locationEl.value; cvPhone.innerText = phoneEl.value; cvEmail.innerText = emailEl.value; cvDob.innerText = dobEl.value; cvNationality.innerText = nationalityEl.value; cvSummary.innerText = summaryEl.value; cvSkills.innerText = skillsEl.value; cvLang.innerText = languagesEl.value; cvEdu.innerText = educationEl.value; cvTarget.innerText = targetEl.value;

let workHTML = "";

for(let i=1;i<=workCount;i++){ let job=document.getElementById('job'+i)?.value||""; let company=document.getElementById('company'+i)?.value||""; let start=document.getElementById('start'+i)?.value||""; let end=document.getElementById('end'+i)?.value||""; let address=document.getElementById('address'+i)?.value||""; let desc=document.getElementById('desc'+i)?.value||"";

if(job || company){ workHTML += <p><b>${job}</b> (${start} - ${end})</p><p>${company} | ${address}</p><p class='small'>${desc}</p><br>; } }

document.getElementById('cvWork').innerHTML = workHTML;

let file = document.getElementById('photo').files[0]; if(file){ let reader = new FileReader(); reader.onload = e => document.getElementById('cvPhoto').src = e.target.result; reader.readAsDataURL(file); } }

function downloadTXT(){ const name = document.getElementById('name').value; const location = document.getElementById('location').value; const phone = document.getElementById('phone').value; const email = document.getElementById('email').value; const target = document.getElementById('target').value; const summary = document.getElementById('summary').value;

let text = "CV\n" + name + "\n" + location + "\n" + phone + "\n" + email + "\nTarget: " + target + "\n\nSummary:\n" + summary;

let blob = new Blob([text],{type:"text/plain"}); let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "cv.txt"; a.click(); }

async function downloadPDF(){ const { jsPDF } = window.jspdf; let doc = new jsPDF();

const name = document.getElementById('name').value; const location = document.getElementById('location').value; const phone = document.getElementById('phone').value; const email = document.getElementById('email').value; const summary = document.getElementById('summary').value; const target = document.getElementById('target').value;

doc.text("CV",10,10); doc.text(name,10,20); doc.text("Target: " + target,10,30); doc.text(location,10,40); doc.text(phone,10,50); doc.text(email,10,60); doc.text("Summary:",10,70); doc.text(summary,10,80);

doc.save("cv.pdf"); } </script>

</body>
</html>
