<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP ULTRA FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
.section{background:#fff;padding:10px;margin:10px;border-radius:10px;}
input,select,button{width:100%;padding:8px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center">🚀 ERP ULTRA FIXED SYSTEM</h2>

<!-- MEMBERS -->
<div class="section">
<h3>👤 Members</h3>

<input id="m_search" placeholder="Search members" onkeyup="searchMembers()">

<input id="m_name" placeholder="Name">
<button onclick="saveMember()">Save Member</button>

<table>
<thead><tr><th>Name</th><th>Balance</th><th>Action</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div class="section">
<h3>📦 Stock</h3>

<input id="s_search" placeholder="Search stock" onkeyup="searchStock()">

<input id="s_name" placeholder="Item">
<input id="s_qty" placeholder="Qty">
<button onclick="saveStock()">Save Stock</button>

<table>
<thead><tr><th>Item</th><th>Qty</th><th>Action</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- TRANSACTION -->
<div class="section">
<h3>💰 Transaction</h3>

<select id="t_member"></select>

<select id="t_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="t_amount" placeholder="Amount">
<button onclick="addTransaction()">Submit</button>
</div>

<!-- TRANSFER -->
<div class="section">
<h3>💸 Transfer</h3>

<select id="f_member"></select>
<select id="t_member2"></select>

<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Send</button>
</div>

<!-- DASHBOARD -->
<div class="section">
<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>
</div>

<script>

let db, chart;

// ================= DB =================
let req = indexedDB.open("ERP_ULTRA_FINAL",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ================= MEMBERS =================
function saveMember(){

 let tx = db.transaction("members","readwrite");
 let store = tx.objectStore("members");

 store.put({
  id: crypto.randomUUID(),
  name: m_name.value,
  balance: 0
 });

 tx.oncomplete = ()=>{
  m_name.value="";
  loadAll();
 };
}

function loadMembers(){

 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.balance}</td>
    <td><button onclick="deleteMember('${m.id}')">Delete</button></td>
   </tr>
  `).join("");
 };
}

function deleteMember(id){
 db.transaction("members","readwrite")
 .objectStore("members").delete(id);
 loadAll();
}

// ================= STOCK =================
function saveStock(){

 let tx = db.transaction("stock","readwrite");
 tx.objectStore("stock").put({
  id: crypto.randomUUID(),
  name: s_name.value,
  qty: +s_qty.value
 });

 tx.oncomplete = loadAll;
}

function loadStock(){

 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess = e=>{
  stockTable.innerHTML = e.target.result.map(s=>`
   <tr>
    <td>${s.name}</td>
    <td>${s.qty}</td>
    <td><button onclick="deleteStock('${s.id}')">Delete</button></td>
   </tr>
  `).join("");
 };
}

function deleteStock(id){
 db.transaction("stock","readwrite")
 .objectStore("stock").delete(id);
 loadAll();
}

// ================= TRANSACTION =================
function addTransaction(){

 let tx = db.transaction("transactions","readwrite");
 let store = tx.objectStore("transactions");

 store.put({
  id: crypto.randomUUID(),
  member: t_member.value,
  type: t_type.value,
  amount: +t_amount.value
 });

 tx.oncomplete = ()=>{
  t_amount.value="";
  loadAll();
 };
}

// ================= TRANSFER =================
function transfer(){

 let f = f_member.value;
 let t = t_member2.value;
 let amt = +t_amt.value;

 let store = db.transaction("members","readwrite").objectStore("members");

 store.getAll().onsuccess = e=>{
  let list = e.target.result;

  let A = list.find(x=>x.id===f);
  let B = list.find(x=>x.id===t);

  if(!A || !B) return;

  if(A.balance < amt) return alert("No balance");

  A.balance -= amt;
  B.balance += amt;

  store.put(A);
  store.put(B);

  loadAll();
 };
}

// ================= SEARCH =================
function searchMembers(){
 let val = m_search.value.toLowerCase();
 [...memberTable.rows].forEach(r=>{
  r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
 });
}

function searchStock(){
 let val = s_search.value.toLowerCase();
 [...stockTable.rows].forEach(r=>{
  r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
 });
}

// ================= LOAD =================
function loadAll(){
 loadMembers();
 loadStock();
 loadDropdown();
 drawChart();
}

// ================= DROPDOWN =================
function loadDropdown(){

 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  let opt = e.target.result.map(m=>
   `<option value="${m.id}">${m.name}</option>`
  ).join("");

  t_member.innerHTML = opt;
  f_member.innerHTML = opt;
  t_member2.innerHTML = opt;
 };
}

// ================= CHART =================
function drawChart(){

 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{

  let inc=0, exp=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") inc+=t.amount;
   if(t.type==="withdraw") exp+=t.amount;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{
    labels:["Income","Expense"],
    datasets:[{data:[inc,exp]}]
   }
  });
 };
}

</script>

</body>
</html>
