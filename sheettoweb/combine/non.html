<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
.tabs{display:flex;background:#2563eb;color:#fff;}
.tabs button{flex:1;padding:10px;border:none;background:#2563eb;color:#fff;}
.tabs button:hover{background:#1e40af;}
.section{display:none;padding:10px;}
.active{display:block;}
input,select,button{width:100%;padding:8px;margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center">🚀 ERP PRO MAX SYSTEM</h2>

<div class="tabs">
<button onclick="showTab('members')">Members</button>
<button onclick="showTab('bank')">Bank</button>
<button onclick="showTab('stock')">Stock</button>
<button onclick="showTab('transfer')">Transfer</button>
<button onclick="showTab('buysell')">Buy/Sell</button>
<button onclick="showTab('report')">Report</button>
</div>

<!-- MEMBERS -->
<div id="members" class="section active">
<h3>Members</h3>

<input id="searchMember" placeholder="Search..." onkeyup="filterMembers()">

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<button onclick="saveMember()">Save</button>

<table>
<thead><tr>
<th>Name</th><th>Phone</th><th>Balance</th><th>Action</th>
</tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANK -->
<div id="bank" class="section">
<h3>Bank</h3>

<select id="b_member"></select>
<select id="b_type"><option>deposit</option><option>withdraw</option></select>
<input id="b_amount" placeholder="Amount">
<button onclick="bank()">Submit</button>

<table>
<thead><tr>
<th>Name</th><th>Type</th><th>Amount</th><th>Date</th>
</tr></thead>
<tbody id="bankTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div id="stock" class="section">
<h3>Stock</h3>

<input id="item" placeholder="Item">
<input id="qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr>
<th>Item</th><th>Qty</th><th>Action</th>
</tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<div id="transfer" class="section">
<h3>💸 Transfer</h3>

<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amount" placeholder="Amount">

<button onclick="doTransfer()">Send</button>

<table>
<thead>
<tr>
<th>From</th>
<th>To</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody id="transferTable"></tbody>
</table>
</div>

<div id="buysell" class="section">
<h3>🛒 Buy / Sell</h3>

<select id="bs_item"></select>
<select id="bs_type">
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="bs_qty" placeholder="Qty">
<input id="bs_price" placeholder="Price">

<button onclick="doBuySell()">Submit</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Type</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Date</th>
</tr>
</thead>
<tbody id="bsTable"></tbody>
</table>
</div>



<!-- REPORT -->
<div id="report" class="section">
<h3>Report</h3>
<button onclick="exportExcel()">Export Excel</button>
<canvas id="chart"></canvas>
</div>

<script>

let db, chart, editId=null;

// DB
let req=indexedDB.open("ERP_PRO",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("bank",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
 db.createObjectStore("transfer",{keyPath:"id"});
db.createObjectStore("buysell",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;

 setTimeout(loadAll, 300); // ⬅️ more safe
};

// TAB
function showTab(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// MEMBERS
function saveMember(){

 let name = document.getElementById("m_name").value.trim();
 let phone = document.getElementById("m_phone").value.trim();

 if(!name) return alert("Enter name");

 let tx = db.transaction("members","readwrite");
 let store = tx.objectStore("members");

 if(editId){

  store.get(editId).onsuccess = e=>{
   let m = e.target.result;
   if(!m) return alert("Member not found");

   m.name = name;
   m.phone = phone;

   store.put(m);
  };

 }else{

  store.put({
   id: crypto.randomUUID(),
   name: name,
   phone: phone,
   balance: 0
  });
 }

 // ✅ KEY FIX — wait for complete
 tx.oncomplete = ()=>{
  resetForm();
  loadAll();
 };

 tx.onerror = ()=>{
  alert("Save failed");
 };
}

function resetForm(){
 editId=null;
 m_name.value="";
 m_phone.value="";
}

function editMember(id){
 db.transaction("members").objectStore("members").get(id).onsuccess=e=>{
  let m=e.target.result;
  m_name.value=m.name;
  m_phone.value=m.phone;
  editId=id;
 };
}

function deleteMember(id){
 db.transaction("members","readwrite").objectStore("members").delete(id);
 loadAll();
}

// BANK
function bank(){

 let memberId = document.getElementById("b_member").value;
 let amt = +b_amount.value;

 if(!memberId) return alert("Please select member");
 if(!amt || amt<=0) return alert("Invalid amount");

 let store=db.transaction("members","readwrite").objectStore("members");

 store.get(memberId).onsuccess=e=>{
  let m=e.target.result;

  if(!m) return alert("Member not found");

  if(b_type.value==="withdraw" && m.balance<amt){
   return alert("Low balance");
  }

  if(b_type.value==="deposit") m.balance+=amt;
  else m.balance-=amt;

  store.put(m);

  db.transaction("bank","readwrite").objectStore("bank")
  .put({
   id:crypto.randomUUID(),
   name:m.name,
   type:b_type.value,
   amount:amt,
   date:new Date().toLocaleString()
  });

  b_amount.value="";
  loadAll();
 };
}

// STOCK
function addStock(){
 db.transaction("stock","readwrite").objectStore("stock")
 .put({id:crypto.randomUUID(),name:item.value,qty:+qty.value});
 loadAll();
}

function deleteStock(id){
 db.transaction("stock","readwrite").objectStore("stock").delete(id);
 loadAll();
}

function doTransfer(){

 let fromId = t_from.value;
 let toId = t_to.value;
 let amt = +t_amount.value;

 if(!fromId || !toId) return alert("Select members");
 if(fromId===toId) return alert("Same member not allowed");
 if(!amt || amt<=0) return alert("Invalid amount");

 let store=db.transaction("members","readwrite").objectStore("members");

 store.getAll().onsuccess=e=>{
  let data=e.target.result;

  let A=data.find(x=>x.id==fromId);
  let B=data.find(x=>x.id==toId);

  if(!A || !B) return alert("Member missing");
  if(A.balance < amt) return alert("Insufficient balance");

  A.balance -= amt;
  B.balance += amt;

  store.put(A);
  store.put(B);

  db.transaction("transfer","readwrite").objectStore("transfer")
  .put({
   id:crypto.randomUUID(),
   from:A.name,
   to:B.name,
   amount:amt,
   date:new Date().toLocaleString()
  });

  t_amount.value="";
  loadAll();
 };
}

function doBuySell(){

 let id = bs_item.value;
 let qty = +bs_qty.value;
 let price = +bs_price.value;

 if(!qty || qty<=0) return alert("Invalid qty");
 if(!price || price<=0) return alert("Invalid price");

 let store=db.transaction("stock","readwrite").objectStore("stock");

 store.get(id).onsuccess=e=>{
  let s=e.target.result;

  if(bs_type.value==="sell" && s.qty<qty){
   return alert("Stock low");
  }

  if(bs_type.value==="buy") s.qty+=qty;
  else s.qty-=qty;

  store.put(s);

  db.transaction("buysell","readwrite").objectStore("buysell")
  .put({
   id:crypto.randomUUID(),
   item:s.name,
   type:bs_type.value,
   qty,
   price,
   total:qty*price,
   date:new Date().toLocaleString()
  });

  bs_qty.value="";
  bs_price.value="";
  loadAll();
 };
}

function loadTransfer(){
 db.transaction("transfer").objectStore("transfer")
 .getAll().onsuccess=e=>{
  transferTable.innerHTML=e.target.result.map(t=>`
   <tr>
    <td>${t.from}</td>
    <td>${t.to}</td>
    <td>${t.amount}</td>
    <td>${t.date}</td>
   </tr>
  `).join("");
 };
}

function loadBS(){
 db.transaction("buysell").objectStore("buysell")
 .getAll().onsuccess=e=>{
  bsTable.innerHTML=e.target.result.map(b=>`
   <tr>
    <td>${b.item}</td>
    <td>${b.type}</td>
    <td>${b.qty}</td>
    <td>${b.price}</td>
    <td>${b.total}</td>
    <td>${b.date}</td>
   </tr>
  `).join("");
 };
}






// LOAD
function loadAll(){
 loadMembers();
 loadBank();
 loadStock();
 loadTransfer();
 loadBS();
 loadDropdown();
 drawChart();
}

function loadDropdown(){

 let memberStore = db.transaction("members").objectStore("members");

 memberStore.getAll().onsuccess = e=>{
  let list = e.target.result;

  let b = document.getElementById("b_member");
  let f = document.getElementById("t_from");
  let t = document.getElementById("t_to");

  if(!b || !f || !t) return; // 🔥 important safety

  let options = `<option value="" disabled selected>Select Member</option>`;

  list.forEach(m=>{
   options += `<option value="${m.id}">${m.name}</option>`;
  });

  b.innerHTML = options;
  f.innerHTML = options;
  t.innerHTML = options;
 };

 // STOCK
 let stockStore = db.transaction("stock").objectStore("stock");

 stockStore.getAll().onsuccess = e=>{
  let list = e.target.result;

  let s = document.getElementById("bs_item");
  if(!s) return;

  let options = `<option value="" disabled selected>Select Item</option>`;

  list.forEach(i=>{
   options += `<option value="${i.id}">${i.name}</option>`;
  });

  s.innerHTML = options;
 };
}

function loadBank(){
 db.transaction("bank").objectStore("bank").getAll().onsuccess=e=>{
  bankTable.innerHTML=e.target.result.map(b=>`
   <tr>
    <td>${b.name}</td>
    <td>${b.type}</td>
    <td>${b.amount}</td>
    <td>${b.date}</td>
   </tr>
  `).join("");
 };
}

function loadStock(){
 db.transaction("stock").objectStore("stock").getAll().onsuccess=e=>{
  stockTable.innerHTML=e.target.result.map(s=>`
   <tr>
    <td>${s.name}</td>
    <td>${s.qty}</td>
    <td><button onclick="deleteStock('${s.id}')">Delete</button></td>
   </tr>
  `).join("");
 };
}

function loadDropdown(){

 let memberStore = db.transaction("members").objectStore("members");

 memberStore.getAll().onsuccess = e=>{
  let list = e.target.result;

  let options = `<option value="" disabled selected>Select Member</option>`;

  list.forEach(m=>{
   options += `<option value="${m.id}">${m.name}</option>`;
  });

  document.getElementById("b_member").innerHTML = options;
  document.getElementById("t_from").innerHTML = options;
  document.getElementById("t_to").innerHTML = options;
 };

 // STOCK DROPDOWN
 let stockStore = db.transaction("stock").objectStore("stock");

 stockStore.getAll().onsuccess = e=>{
  let list = e.target.result;

  let options = `<option value="">Select Item</option>`;

  list.forEach(s=>{
   options += `<option value="${s.id}">${s.name}</option>`;
  });

  document.getElementById("bs_item").innerHTML = options;
 };
}

// SEARCH
function filterMembers(){
 let val=searchMember.value.toLowerCase();
 [...memberTable.rows].forEach(r=>{
  r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
 });
}

function getValue(id){
 let v = document.getElementById(id).value;
 if(!v) throw new Error("Invalid selection");
 return v;
}

// EXPORT EXCEL
function exportExcel(){
 let rows=[...document.querySelectorAll("table tr")];
 let csv=rows.map(r=>[...r.children].map(c=>c.innerText).join(",")).join("\n");

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="erp.csv";
 a.click();
}

// CHART
function drawChart(){
 db.transaction("bank").objectStore("bank").getAll().onsuccess=e=>{
  let inc=0,exp=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") inc+=t.amount;
   else exp+=t.amount;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{labels:["Income","Expense"],datasets:[{data:[inc,exp]}]}
  });
 };
}

</script>

</body>
</html>
