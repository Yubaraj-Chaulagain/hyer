<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Generator</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#eef2f7;
}

/* FORM */
.form{
  padding:15px;
  background:#fff;
}
input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  background:#0f766e;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* CV DESIGN */
.cv{
  display:flex;
  max-width:900px;
  margin:20px auto;
  background:#fff;
}

/* LEFT */
.left{
  width:35%;
  background:#4b6b70;
  color:#fff;
  padding:20px;
}
.left img{
  width:120px;
  height:120px;
  border-radius:10px;
  object-fit:cover;
}

/* RIGHT */
.right{
  width:65%;
  padding:20px;
}
h1{
  margin:0;
}
.section{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="form">
<h2>Fill Your CV</h2>

<input type="file" id="photo">
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="email" placeholder="Email">
<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="skills" placeholder="Skills (comma separated)"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="education" placeholder="Education"></textarea>

<button onclick="generateCV()">Generate CV</button>
</div>

<div class="cv">

<div class="left">
<img id="cvPhoto">

<h3>Contact</h3>
<p id="cvEmail"></p>

<h3>Skills</h3>
<p id="cvSkills"></p>
</div>

<div class="right">
<h1 id="cvName">Your Name</h1>

<div class="section">
<h3>Professional Summary</h3>
<p id="cvSummary"></p>
</div>

<div class="section">
<h3>Work History</h3>
<p id="cvExperience"></p>
</div>

<div class="section">
<h3>Education</h3>
<p id="cvEducation"></p>
</div>

</div>
</div>

<script>
function generateCV(){
  document.getElementById("cvName").innerText =
    document.getElementById("name").value;

  document.getElementById("cvEmail").innerText =
    document.getElementById("email").value;

  document.getElementById("cvSummary").innerText =
    document.getElementById("summary").value;

  document.getElementById("cvSkills").innerText =
    document.getElementById("skills").value;

  document.getElementById("cvExperience").innerText =
    document.getElementById("experience").value;

  document.getElementById("cvEducation").innerText =
    document.getElementById("education").value;

  // Photo Upload
  let file = document.getElementById("photo").files[0];
  if(file){
    let reader = new FileReader();
    reader.onload = function(e){
      document.getElementById("cvPhoto").src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
