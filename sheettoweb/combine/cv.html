<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f3f4f6;
  display:flex;
  flex-wrap:wrap;
}

/* FORM */
.form{
  width:40%;
  padding:20px;
  background:#fff;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
}

/* CV DESIGN */
.cv{
  width:60%;
  padding:20px;
}

#cv-template{
  background:#fff;
  padding:25px;
  border-radius:10px;
}

h1{color:#2563eb;margin-bottom:5px;}
h3{border-bottom:1px solid #ddd;padding-bottom:5px;}

@media(max-width:768px){
  .form, .cv{width:100%;}
}
</style>
</head>

<body>

<!-- FORM -->
<div class="form">
<h2>Fill Your Details</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="location" placeholder="Location">

<textarea id="job" placeholder="Job Target"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="language" placeholder="Languages"></textarea>

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- CV OUTPUT -->
<div class="cv">
<div id="cv-template">

<h1 id="cv-name">Your Name</h1>
<p id="cv-contact"></p>

<h3>Objective</h3>
<p id="cv-job"></p>

<h3>Experience</h3>
<p id="cv-exp"></p>

<h3>Education</h3>
<p id="cv-edu"></p>

<h3>Skills</h3>
<p id="cv-skills"></p>

<h3>Languages</h3>
<p id="cv-lang"></p>

</div>
</div>

<script>
function generateCV(){
  document.getElementById("cv-name").innerText =
    document.getElementById("name").value;

  document.getElementById("cv-contact").innerText =
    document.getElementById("phone").value + " | " +
    document.getElementById("email").value + " | " +
    document.getElementById("location").value;

  document.getElementById("cv-job").innerText =
    document.getElementById("job").value;

  document.getElementById("cv-exp").innerText =
    document.getElementById("experience").value;

  document.getElementById("cv-edu").innerText =
    document.getElementById("education").value;

  document.getElementById("cv-skills").innerText =
    document.getElementById("skills").value;

  document.getElementById("cv-lang").innerText =
    document.getElementById("language").value;
}

function downloadPDF(){
  const element = document.getElementById("cv-template");

  html2pdf().from(element).save("My_CV.pdf");
}
</script>

</body>
</html>
