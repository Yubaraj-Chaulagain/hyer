<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP PERFECT SYSTEM</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:8px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2>🚀 ERP PERFECT SYSTEM</h2>

<!-- MEMBERS -->
<div class="section">
<h3>Members</h3>

<input id="m_name" placeholder="Name">
<button onclick="addMember()">Add Member</button>

<table>
<thead><tr><th>Name</th><th>Balance</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANK -->
<div class="section">
<h3>Bank</h3>

<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amt" placeholder="Amount">
<button onclick="bank()">Submit</button>
</div>

<!-- TRANSFER -->
<div class="section">
<h3>Transfer</h3>

<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Send</button>
</div>

<!-- STOCK -->
<div class="section">
<h3>Stock</h3>

<input id="item" placeholder="Item">
<input id="qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr><th>Item</th><th>Qty</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- BUY SELL -->
<div class="section">
<h3>Buy / Sell</h3>

<select id="stock_item"></select>
<select id="bs_type">
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="bs_qty" placeholder="Qty">
<button onclick="buySell()">Submit</button>
</div>

<script>

let db;

// INIT DB
let req = indexedDB.open("ERP_FINAL",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ================= MEMBERS =================
function addMember(){
 db.transaction("members","readwrite")
 .objectStore("members")
 .put({
  id:crypto.randomUUID(),
  name:m_name.value,
  balance:0
 });

 m_name.value="";
 loadAll();
}

// ================= BANK =================
function bank(){
 let id = b_member.value;
 let type = b_type.value;
 let amt = +b_amt.value;

 let tx = db.transaction("transactions","readwrite").objectStore("transactions");

 tx.put({
  id:crypto.randomUUID(),
  memberId:id,
  type,
  amount:amt
 });

 recalc(id);
}

// ================= TRANSFER =================
function transfer(){

 let f=t_from.value;
 let t=t_to.value;
 let amt=+t_amt.value;

 if(!f||!t||amt<=0) return;

 db.transaction("transactions","readwrite").objectStore("transactions")
 .put({id:crypto.randomUUID(),memberId:f,type:"withdraw",amount:amt});

 db.transaction("transactions","readwrite").objectStore("transactions")
 .put({id:crypto.randomUUID(),memberId:t,type:"deposit",amount:amt});

 recalc(f);
 recalc(t);
}

// ================= STOCK =================
function addStock(){
 db.transaction("stock","readwrite")
 .objectStore("stock")
 .put({
  id:crypto.randomUUID(),
  name:item.value,
  qty:+qty.value
 });

 loadAll();
}

// ================= BUY SELL =================
function buySell(){
 let id = stock_item.value;
 let qty = +bs_qty.value;

 let store = db.transaction("stock","readwrite").objectStore("stock");

 store.get(id).onsuccess=e=>{
  let s=e.target.result;

  if(bs_type.value==="buy") s.qty+=qty;
  else{
   if(s.qty<qty) return alert("Low stock");
   s.qty-=qty;
  }

  store.put(s);
  loadAll();
 };
}

// ================= BALANCE CALC =================
function recalc(memberId){

 let tx = db.transaction("transactions").objectStore("transactions");
 let mem = db.transaction("members","readwrite").objectStore("members");

 tx.getAll().onsuccess=e=>{
  let all=e.target.result;

  let bal=0;

  all.forEach(t=>{
   if(t.memberId===memberId){
    if(t.type==="deposit") bal+=t.amount;
    if(t.type==="withdraw") bal-=t.amount;
   }
  });

  mem.get(memberId).onsuccess=e2=>{
   let m=e2.target.result;
   if(!m) return;

   m.balance=bal;
   mem.put(m);

   loadAll();
  };
 };
}

// ================= LOAD =================
function loadAll(){
 loadMembers();
 loadDropdowns();
 loadStock();
}

// ================= TABLE =================
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  memberTable.innerHTML=e.target.result.map(m=>`
   <tr><td>${m.name}</td><td>${m.balance}</td></tr>
  `).join("");
 };
}

// ================= DROPDOWN =================
function loadDropdowns(){

 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  let opt=e.target.result.map(m=>`<option value="${m.id}">${m.name}</option>`).join("");
  b_member.innerHTML=opt;
  t_from.innerHTML=opt;
  t_to.innerHTML=opt;
 };

 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  stock_item.innerHTML=e.target.result.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
 };
}

// ================= STOCK TABLE =================
function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  stockTable.innerHTML=e.target.result.map(s=>`
   <tr><td>${s.name}</td><td>${s.qty}</td></tr>
  `).join("");
 };
}

</script>

</body>
</html>
