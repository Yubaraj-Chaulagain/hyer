<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP FIXED SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
.section{padding:10px;background:#fff;margin:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center">🚀 ERP FIXED SYSTEM</h2><button onclick="exportExcel()">📤 Export Excel</button>

<div class="section">
<h3>Members</h3>
<input id="m_name" placeholder="Name">
<button onclick="saveMember()">Save Member</button>
<table>
<tbody id="memberTable"></tbody>
</table>
</div>

<div class="section">
<h3>Bank</h3>
<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amount" placeholder="Amount">
<button onclick="bank()">Submit</button>
</div>

<div class="section">
<h3>Transfer</h3>
<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amt">
<button onclick="transfer()">Send</button>
</div>

<div class="section">
<h3>Stock</h3>
<input id="item">
<input id="qty">
<button onclick="addStock()">Add</button>
<table><tbody id="stockTable"></tbody></table>
</div>

<div class="section">
<h3>Buy/Sell</h3>
<select id="bs_member"></select>
<select id="bs1_item"></select>
<select id="bs_type">
  <option value="buy">Buy</option>
  <option value="sell">Sell</option>
</select>

<input id="bs_qty" placeholder="Qty">
<input id="bs_price" placeholder="Price">

<button onclick="buySell()">Submit</button>
</div>

<script>

let db;

let req=indexedDB.open("ERP_FIXED",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess=e=>{
 db=e.target.result;
 loadAll();
};

// ---------- MEMBER ----------
function saveMember(){

 let name = m_name.value.trim();
 if(!name) return alert("Enter name");

 let obj = {
  id: crypto.randomUUID(),
  name,
  balance: 0
 };

 let tx = db.transaction("members","readwrite");
 let store = tx.objectStore("members");

 store.put(obj);

 tx.oncomplete = ()=>{
  m_name.value = "";
  loadAll();   // ✅ refresh after save
 };
}

function loadMembers(){

 db.transaction("members")
 .objectStore("members")
 .getAll().onsuccess = e=>{

  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.balance}</td>
   </tr>
  `).join("");

 };
}


// ---------- BANK (AUTO BALANCE FIX) ----------
function bank(){
 let id=b_member.value;
 let amt=+b_amount.value;

 let tx=db.transaction("members","readwrite");
 let store=tx.objectStore("members");

 store.get(id).onsuccess=e=>{
  let m=e.target.result;

  if(b_type.value==="deposit") m.balance+=amt;
  else{
   if(m.balance<amt) return alert("Low balance");
   m.balance-=amt;
  }

  store.put(m);
  tx.oncomplete=loadAll;   // ✅ FIXED
 };
}

// ---------- TRANSFER (AUTO BALANCE FIX) ----------
function transfer(){
 let a=t_from.value;
 let b=t_to.value;
 let amt=+t_amt.value;

 let tx=db.transaction("members","readwrite");
 let store=tx.objectStore("members");

 store.getAll().onsuccess=e=>{
  let list=e.target.result;

  let A=list.find(x=>x.id===a);
  let B=list.find(x=>x.id===b);

  if(A.balance<amt) return alert("No balance");

  A.balance-=amt;
  B.balance+=amt;

  store.put(A);
  store.put(B);

  tx.oncomplete=loadAll;   // ✅ FIXED
 };
}

// ---------- STOCK ----------
function addStock(){
 let tx=db.transaction("stock","readwrite");
 let store=tx.objectStore("stock");

 store.put({
  id:crypto.randomUUID(),
  name:item.value,
  qty:+qty.value
 });

 tx.oncomplete=loadAll;
}

// ---------- BUY SELL (AUTO STOCK UPDATE) ----------
function buySell(){

 let memberId = bs_member.value;
 let id = bs_item.value;
 let qty = +bs_qty.value;
 let price = +bs_price.value;

 if(!memberId) return alert("Select member");

 let tx = db.transaction(["stock","members","buysell"],"readwrite");

 let stockStore = tx.objectStore("stock");
 let memberStore = tx.objectStore("members");
 let bsStore = tx.objectStore("buysell");

 stockStore.get(id).onsuccess = e=>{
  let s = e.target.result;

  memberStore.get(memberId).onsuccess = e2=>{
   let m = e2.target.result;

   let total = qty * price;

   if(bs_type.value==="sell"){
    if(s.qty < qty) return alert("Stock low");

    s.qty -= qty;
    m.balance += total;   // 💰 profit to member
   }

   if(bs_type.value==="buy"){
    s.qty += qty;
    m.balance -= total;   // 💸 cost
   }

   stockStore.put(s);
   memberStore.put(m);

   bsStore.put({
    id:crypto.randomUUID(),
    memberId:m.id,
    memberName:m.name,
    item:s.name,
    type:bs_type.value,
    qty,
    price,
    total,
    date:new Date().toLocaleString()
   });

   tx.oncomplete = loadAll;
  };
 };
}

// ---------- LOAD ----------
function loadAll(){
 loadMembers();
 loadStock();
 loadDropdowns();
}

// ---------- MEMBERS TABLE ----------
function loadDropdowns(){

 // MEMBERS DROPDOWN
 let tx1 = db.transaction("members","readonly");
 let store1 = tx1.objectStore("members");

 store1.getAll().onsuccess = e=>{
  let members = e.target.result;

  let opt = `<option value="">Select Member</option>`;
  members.forEach(m=>{
   opt += `<option value="${m.id}">${m.name}</option>`;
  });

  bs_member.innerHTML = opt;
  b_member.innerHTML = opt;
  t_from.innerHTML = opt;
  t_to.innerHTML = opt;
 };

 // STOCK DROPDOWN
 let tx2 = db.transaction("stock","readonly");
 let store2 = tx2.objectStore("stock");

 store2.getAll().onsuccess = e=>{
  let items = e.target.result;

  let opt = `<option value="">Select Item</option>`;
  items.forEach(s=>{
   opt += `<option value="${s.id}">${s.name}</option>`;
  });

  bs_item.innerHTML = opt;
 };
}

function exportExcel(){

 let wb = XLSX.utils.book_new();

 // helper function
 function addSheet(storeName, sheetName, cb){
  return new Promise(resolve=>{
   db.transaction(storeName).objectStore(storeName)
   .getAll().onsuccess = e=>{
    let data = e.target.result;
    let ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    resolve();
    if(cb) cb(data);
   };
  });
 }

 // run all exports in order
 Promise.all([
  addSheet("members","Members"),
  addSheet("stock","Stock"),
  addSheet("bank","Bank"),
  addSheet("transfer","Transfer"),
  addSheet("buysell","BuySell")
 ]).then(()=>{

  XLSX.writeFile(wb,"ERP_FULL_REPORT.xlsx");

 });

}


// ---------- STOCK TABLE ----------
function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  let html=e.target.result.map(s=>
   `<tr><td>${s.name}</td><td>${s.qty}</td></tr>`
  ).join("");
  stockTable.innerHTML=html;
 };
}

// ---------- DROPDOWNS ----------
function loadDropdowns(){

 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  let opt=e.target.result.map(m=>
   `<option value="${m.id}">${m.name}</option>`
  ).join("");

  b_member.innerHTML=opt;
  t_from.innerHTML=opt;
  t_to.innerHTML=opt;
 };

 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  let opt=e.target.result.map(s=>
   `<option value="${s.id}">${s.name}</option>`
  ).join("");

  bs_item.innerHTML=opt;
 };

document.getElementById("bs_member").innerHTML =
 e.target.result.map(m =>
  `<option value="${m.id}">${m.name}</option>`
 ).join("");

}

</script>

</body>
</html>
