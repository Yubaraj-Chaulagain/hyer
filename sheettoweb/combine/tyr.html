<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP FIXED SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:8px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center">🚀 ERP FIXED SYSTEM</h2>

<!-- MEMBERS -->
<div class="section">
<h3>Members</h3>

<input id="search" placeholder="Search member..." onkeyup="searchMember()">

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<button onclick="saveMember()">Save</button>

<table>
<thead><tr><th>Name</th><th>Phone</th><th>Balance</th><th>Action</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANK -->
<div class="section">
<h3>Bank</h3>

<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amount" placeholder="Amount">
<button onclick="bank()">Submit</button>

<table>
<thead><tr><th>Name</th><th>Type</th><th>Amount</th></tr></thead>
<tbody id="bankTable"></tbody>
</table>
</div>

<!-- TRANSFER -->
<div class="section">
<h3>Transfer</h3>

<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Send</button>

<table>
<thead><tr><th>From</th><th>To</th><th>Amount</th></tr></thead>
<tbody id="transferTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div class="section">
<h3>Stock</h3>

<input id="item" placeholder="Item">
<input id="qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr><th>Item</th><th>Qty</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- BUY SELL -->
<div class="section">
<h3>Buy / Sell</h3>

<select id="stock_item"></select>
<select id="bs_type">
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="bs_qty" placeholder="Qty">
<button onclick="buySell()">Submit</button>
</div>

<!-- DASHBOARD -->
<div class="section">
<h3>Dashboard</h3>
<canvas id="chart"></canvas>
<div id="profit"></div>
</div>

<script>

let db, chart;

// INIT DB
let req = indexedDB.open("ERP_FIXED",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("bank",{keyPath:"id"});
 db.createObjectStore("transfer",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ================= MEMBERS =================
function saveMember(){
 let name = m_name.value.trim();
 let phone = m_phone.value.trim();

 if(!name) return alert("Enter name");

 db.transaction("members","readwrite")
 .objectStore("members")
 .put({
  id: crypto.randomUUID(),
  name,
  phone,
  balance:0
 });

 m_name.value="";
 m_phone.value="";
 loadAll();
}

// ================= BANK =================
function bank(){
 let id = b_member.value;
 let type = b_type.value;
 let amt = +b_amount.value;

 let store = db.transaction("members","readwrite").objectStore("members");

 store.get(id).onsuccess = e=>{
  let m = e.target.result;
  if(!m) return;

  if(type==="withdraw" && m.balance < amt) return alert("Low balance");

  m.balance += (type==="deposit"?amt:-amt);
  store.put(m);

  db.transaction("bank","readwrite")
  .objectStore("bank")
  .put({id:crypto.randomUUID(),name:m.name,type,amount:amt});

  loadAll();
 };
}

// ================= TRANSFER =================
function transfer(){
 let f = t_from.value;
 let t = t_to.value;
 let amt = +t_amt.value;

 let store = db.transaction("members","readwrite").objectStore("members");

 store.getAll().onsuccess = e=>{
  let data = e.target.result;

  let A = data.find(x=>x.id===f);
  let B = data.find(x=>x.id===t);

  if(!A || !B) return;
  if(A.balance < amt) return alert("Insufficient");

  A.balance -= amt;
  B.balance += amt;

  store.put(A);
  store.put(B);

  db.transaction("transfer","readwrite")
  .objectStore("transfer")
  .put({id:crypto.randomUUID(),from:A.name,to:B.name,amount:amt});

  loadAll();
 };
}

// ================= STOCK =================
function addStock(){
 db.transaction("stock","readwrite")
 .objectStore("stock")
 .put({
  id:crypto.randomUUID(),
  name:item.value,
  qty:+qty.value
 });

 loadAll();
}

// ================= BUY SELL =================
function buySell(){
 let id = stock_item.value;
 let qty = +bs_qty.value;

 let store = db.transaction("stock","readwrite").objectStore("stock");

 store.get(id).onsuccess = e=>{
  let s = e.target.result;

  if(bs_type.value==="sell" && s.qty < qty)
   return alert("No stock");

  s.qty += (bs_type.value==="buy"?qty:-qty);

  store.put(s);
  loadAll();
 };
}

// ================= LOAD =================
function loadAll(){
 loadMembers();
 loadBank();
 loadTransfer();
 loadStock();
 loadDropdown();
 drawChart();
 calcProfit();
}

// ================= MEMBERS TABLE =================
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.phone}</td>
    <td>${m.balance}</td>
    <td><button onclick="deleteMember('${m.id}')">Del</button></td>
   </tr>
  `).join("");
 };
}

function deleteMember(id){
 db.transaction("members","readwrite")
 .objectStore("members").delete(id);
 loadAll();
}

// ================= BANK TABLE =================
function loadBank(){
 db.transaction("bank").objectStore("bank")
 .getAll().onsuccess = e=>{
  bankTable.innerHTML = e.target.result.map(b=>`
   <tr><td>${b.name}</td><td>${b.type}</td><td>${b.amount}</td></tr>
  `).join("");
 };
}

// ================= TRANSFER TABLE =================
function loadTransfer(){
 db.transaction("transfer").objectStore("transfer")
 .getAll().onsuccess = e=>{
  transferTable.innerHTML = e.target.result.map(t=>`
   <tr><td>${t.from}</td><td>${t.to}</td><td>${t.amount}</td></tr>
  `).join("");
 };
}

// ================= STOCK TABLE =================
function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess = e=>{
  stockTable.innerHTML = e.target.result.map(s=>`
   <tr><td>${s.name}</td><td>${s.qty}</td></tr>
  `).join("");
 };
}

// ================= DROPDOWN =================
function loadDropdown(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  let opt = e.target.result.map(m=>`<option value="${m.id}">${m.name}</option>`).join("");
  b_member.innerHTML = opt;
  t_from.innerHTML = opt;
  t_to.innerHTML = opt;
 };

 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess = e=>{
  stock_item.innerHTML = e.target.result.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
 };
}

// ================= SEARCH =================
function searchMember(){
 let v = search.value.toLowerCase();
 [...memberTable.rows].forEach(r=>{
  r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none";
 });
}

// ================= PROFIT =================
function calcProfit(){
 let profit = 0;
 profitBox.innerHTML = "Profit: "+profit;
}

// ================= CHART =================
function drawChart(){
 if(!db) return;

 db.transaction("bank").objectStore("bank")
 .getAll().onsuccess = e=>{

  let inc=0, exp=0;

  e.target.result.forEach(x=>{
   if(x.type==="deposit") inc+=x.amount;
   else exp+=x.amount;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{labels:["Income","Expense"],datasets:[{data:[inc,exp]}]}
  });
 };
}

</script>

</body>
</html>
