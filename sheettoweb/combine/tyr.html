<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP FINAL AUTO BALANCE SYSTEM</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
.tabs{display:flex;background:#2563eb;color:white;}
.tabs button{flex:1;padding:10px;border:none;background:#2563eb;color:white;}
.section{display:none;padding:10px;}
.active{display:block;}
input,select,button{width:100%;padding:8px;margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center">🚀 ERP AUTO BALANCE SYSTEM</h2>

<div class="tabs">
<button onclick="tab('members')">Members</button>
<button onclick="tab('tx')">Transactions</button>
<button onclick="tab('stock')">Stock</button>
</div>

<!-- MEMBERS -->
<div id="members" class="section active">
<h3>Members</h3>

<input id="m_name" placeholder="Name">
<button onclick="saveMember()">Save</button>

<table>
<thead>
<tr><th>Name</th><th>Balance</th><th>Action</th></tr>
</thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- TRANSACTIONS -->
<div id="tx" class="section">
<h3>Transactions</h3>

<select id="t_member"></select>
<select id="t_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
<option value="transfer">Transfer (+/-)</option>
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="t_amount" placeholder="Amount">

<button onclick="addTx()">Submit</button>

<table>
<thead>
<tr><th>Member</th><th>Type</th><th>Amount</th></tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div id="stock" class="section">
<h3>Stock</h3>

<input id="s_name" placeholder="Item">
<input id="s_qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead>
<tr><th>Item</th><th>Qty</th><th>Action</th></tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<script>

let db;

// ---------------- DB ----------------
let req = indexedDB.open("ERP_AUTO",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ---------------- TAB ----------------
function tab(id){
 document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ---------------- MEMBERS ----------------
function saveMember(){

 let tx = db.transaction("members","readwrite");
 let store = tx.objectStore("members");

 store.put({
  id: crypto.randomUUID(),
  name: m_name.value,
  balance: 0
 });

 tx.oncomplete = ()=>{
  m_name.value="";
  loadAll();
 };
}

// ---------------- AUTO BALANCE ENGINE ----------------
function updateBalance(memberId){

 let txStore = db.transaction("transactions").objectStore("transactions");

 txStore.getAll().onsuccess = e=>{
  let list = e.target.result;

  let balance = 0;

  list.forEach(t=>{
   if(t.memberId !== memberId) return;

   if(t.type==="deposit") balance += t.amount;
   if(t.type==="withdraw") balance -= t.amount;
   if(t.type==="sell") balance += t.amount;
   if(t.type==="buy") balance -= t.amount;
  });

  let mStore = db.transaction("members","readwrite").objectStore("members");

  mStore.get(memberId).onsuccess = e2=>{
   let m = e2.target.result;
   if(!m) return;

   m.balance = balance;
   mStore.put(m);
  };
 };
}

// ---------------- TRANSACTIONS ----------------
function addTx(){

 let memberId = t_member.value;
 let amount = +t_amount.value;
 let type = t_type.value;

 if(!memberId || !amount) return alert("Select + Amount");

 let tx = db.transaction("transactions","readwrite");
 let store = tx.objectStore("transactions");

 store.put({
  id: crypto.randomUUID(),
  memberId,
  type,
  amount
 });

 tx.oncomplete = ()=>{
  updateBalance(memberId);   // 🔥 AUTO BALANCE
  t_amount.value="";
  loadAll();
 };
}

// ---------------- STOCK ----------------
function addStock(){

 let tx = db.transaction("stock","readwrite");
 tx.objectStore("stock").put({
  id: crypto.randomUUID(),
  name: s_name.value,
  qty: +s_qty.value
 });

 tx.oncomplete = ()=>{
  s_name.value="";
  s_qty.value="";
  loadAll();
 };
}

// ---------------- LOAD ALL ----------------
function loadAll(){
 loadMembers();
 loadTx();
 loadStock();
 loadDropdown();
}

// ---------------- MEMBERS TABLE ----------------
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.balance}</td>
    <td><button onclick="delMember('${m.id}')">Delete</button></td>
   </tr>
  `).join("");
 };
}

// ---------------- DELETE MEMBER ----------------
function delMember(id){
 db.transaction("members","readwrite")
 .objectStore("members").delete(id);
 loadAll();
}

// ---------------- TRANSACTIONS TABLE ----------------
function loadTx(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{
  txTable.innerHTML = e.target.result.map(t=>`
   <tr>
    <td>${t.memberId}</td>
    <td>${t.type}</td>
    <td>${t.amount}</td>
   </tr>
  `).join("");
 };
}

// ---------------- STOCK TABLE ----------------
function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess = e=>{
  stockTable.innerHTML = e.target.result.map(s=>`
   <tr>
    <td>${s.name}</td>
    <td>${s.qty}</td>
    <td><button onclick="delStock('${s.id}')">Delete</button></td>
   </tr>
  `).join("");
 };
}

// ---------------- DELETE STOCK ----------------
function delStock(id){
 db.transaction("stock","readwrite")
 .objectStore("stock").delete(id);
 loadAll();
}

// ---------------- DROPDOWN ----------------
function loadDropdown(){

 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  let opt = e.target.result.map(m=>
   `<option value="${m.id}">${m.name}</option>`
  ).join("");

  t_member.innerHTML = opt;
 };
}

</script>

</body>
</html>
