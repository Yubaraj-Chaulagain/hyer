<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank ERP Final Master</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f5f6fa;max-width:1000px;margin:auto;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
h2{text-align:center;}
</style>
</head>

<body>

<h2>🏦 BANK ERP FINAL MASTER SYSTEM</h2>

<!-- 👤 MEMBERS -->
<div class="section">
<h3>👤 Members</h3>

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">

<button onclick="saveMember()">Save Member</button>

<table>
<thead>
<tr><th>Name</th><th>Phone</th><th>Action</th></tr>
</thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- 💰 TRANSACTIONS -->
<div class="section">
<h3>💰 Transaction</h3>

<!-- 👤 MEMBER SELECT -->
<select id="t_member"></select>

<!-- 🔄 TYPE -->
<select id="t_type">
 <option value="deposit">Deposit</option>
 <option value="withdraw">Withdraw</option>
 <option value="loan">Loan</option>
<option value="transfer">Transfer</option>
</select>

<select id="t_receiver">
<option value="">Select Receiver</option>
</select>

<!-- 💵 AMOUNT -->
<input id="t_amount" placeholder="Amount">

<button onclick="saveTransaction()">Submit</button>

<table>
<thead>
<tr>
<th>From</th>
<th>Type</th>
<th>Amount</th>
<th>To</th>
<th>Action</th>
</tr>
</thead>
<tbody id="transactionTable"></tbody>
</table>
</div>

<!-- 📊 DASHBOARD -->
<div class="section">
<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>
</div>

<script>

let db;
let chart;
let editMemberId = null;
let editTxnId = null;

// ---------------- DB ----------------
let req = indexedDB.open("BANK_FINAL",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ---------------- MEMBERS ----------------
function saveMember(){

 let name = document.getElementById("m_name").value.trim();
 let phone = document.getElementById("m_phone").value.trim();

 if(!name) return alert("Name required");

 let obj = {
 id: editMemberId || crypto.randomUUID(),
 name,
 phone,
 balance: 0 // ⭐ ADD THIS
};

 db.transaction("members","readwrite")
 .objectStore("members")
 .put(obj);

 editMemberId = null;

 document.getElementById("m_name").value="";
 document.getElementById("m_phone").value="";

 loadAll();
}

function editMember(id){
 db.transaction("members").objectStore("members")
 .get(id).onsuccess = e=>{
  let m = e.target.result;
  document.getElementById("m_name").value = m.name;
  document.getElementById("m_phone").value = m.phone;
  editMemberId = m.id;
 };
}

function deleteMember(id){
 db.transaction("members","readwrite")
 .objectStore("members")
 .delete(id);

 loadAll();
}

// ---------------- TRANSACTIONS ----------------
function saveTransaction(){

 let senderId = document.getElementById("t_member").value;
 let receiverId = document.getElementById("t_receiver").value;
 let type = document.getElementById("t_type").value;
 let amount = Number(document.getElementById("t_amount").value);

 if(!senderId) return alert("Select member");
 if(!amount || amount<=0) return alert("Invalid amount");

 let memberStore = db.transaction("members","readwrite").objectStore("members");

 memberStore.getAll().onsuccess = e=>{
  let members = e.target.result;

  let sender = members.find(m=>m.id===senderId);
  let receiver = members.find(m=>m.id===receiverId);

  if(type==="deposit"){
    sender.balance += amount;
  }

  else if(type==="withdraw"){
    if(sender.balance < amount) return alert("Insufficient Balance ❌");
    sender.balance -= amount;
  }

  else if(type==="transfer"){
    if(!receiverId) return alert("Select receiver");
    if(senderId === receiverId) return alert("Same member not allowed");
    if(sender.balance < amount) return alert("Insufficient Balance ❌");

    sender.balance -= amount;
    receiver.balance += amount;

    memberStore.put(receiver);
  }

  memberStore.put(sender);

  // save transaction
  db.transaction("transactions","readwrite")
  .objectStore("transactions")
  .put({
    id: crypto.randomUUID(),
    name: sender.name,
    to: receiver ? receiver.name : "",
    type,
    amount,
    time: Date.now()
  });

  document.getElementById("t_amount").value="";

  loadAll();
 };
}

function editTransaction(id){
 db.transaction("transactions").objectStore("transactions")
 .get(id).onsuccess = e=>{
  let t = e.target.result;

  document.getElementById("t_name").value = t.name;
  document.getElementById("t_type").value = t.type;
  document.getElementById("t_amount").value = t.amount;

  editTxnId = t.id;
 };
}

function deleteTransaction(id){
 db.transaction("transactions","readwrite")
 .objectStore("transactions")
 .delete(id);

 loadAll();
}

// ---------------- LOAD ----------------
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.phone}</td>
    <td>
     <button onclick="editMember('${m.id}')">Edit</button>
     <button onclick="deleteMember('${m.id}')">Delete</button>
    </td>
   </tr>
  `).join("");
 };
}

function loadTransactions(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{
  transactionTable.innerHTML = e.target.result.map(t=>`
   <tr>
    <td>${t.name}</td>
    <td>${t.type}</td>
    <td>${t.amount}</td>
    <td>${t.to || "-"}</td>
    <td>
     <button onclick="deleteTransaction('${t.id}')">Delete</button>
    </td>
   </tr>
  `).join("");
 };
}

function loadMemberDropdown(){

 let store = db.transaction("members").objectStore("members");

 store.getAll().onsuccess = e=>{
  let sender = `<option value="">Select Sender</option>`;
  let receiver = `<option value="">Select Receiver</option>`;

  e.target.result.forEach(m=>{
   sender += `<option value="${m.id}">${m.name}</option>`;
   receiver += `<option value="${m.id}">${m.name}</option>`;
  });

  document.getElementById("t_member").innerHTML = sender;
  document.getElementById("t_receiver").innerHTML = receiver;
 };
}

// ---------------- CHART ----------------
function drawChart(){

 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{

  let income=0, expense=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") income += t.amount;
   else expense += t.amount;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{
    labels:["Income","Expense"],
    datasets:[{data:[income,expense]}]
   }
  });

 };
}

// ---------------- MAIN ----------------
function loadAll(){
 loadMembers();
 loadTransactions();
 loadMemberDropdown(); // ⭐ ADD THIS
 drawChart();
}

</script>

</body>
</html>
