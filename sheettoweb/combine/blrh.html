<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP PRO 2.0 FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
.section{background:#fff;margin:10px;padding:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
th{background:#2563eb;color:#fff;}
.tab-section{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="section">
<h2>🔐 Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showSignup()">Signup</button>
<button onclick="forgotPass()">ForgotPassword</button>
<button onclick="resetPassword()">Reset Password</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="section" style="display:none;">
<h2>Signup</h2>
<input id="s_user" placeholder="Username">
<input id="s_pass" placeholder="Password">
<select id="s_role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>
<button onclick="signup()">Create</button>
<button onclick="backLogin()">Back</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2 style="text-align:center">🚀 ERP PRO 2.0</h2>

<button onclick="showTab('members')">Members</button>
<button onclick="showTab('bank')">Bank</button>
<button onclick="showTab('transfer')">Transfer</button>
<button onclick="showTab('stock')">Stock</button>
<button onclick="showTab('buysell')">Buy/Sell</button>
<button onclick="showTab('chartTab')">Chart</button>
<button onclick="logout()">Logout</button>

<button onclick="exportExcel()">Export Excel</button>

<!-- MEMBERS -->
<div id="members" class="section tab-section active">
<h3>Members</h3>
<input id="m_name" placeholder="Name">
<button onclick="saveMember()">Add</button>

<table>
<thead><tr><th>Name</th><th>Balance</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANK -->
<div id="bank" class="section tab-section">
<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amount" placeholder="Amount">
<button onclick="bank()">Submit</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="section tab-section">
<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Send</button>
</div>

<!-- STOCK -->
<div id="stock" class="section tab-section">
<input id="item" placeholder="Item">
<input id="qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr><th>Item</th><th>Qty</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- BUY SELL -->
<div id="buysell" class="section tab-section">
<select id="bs_member"></select>
<select id="bs_item"></select>
<select id="bs_type">
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>
<input id="bs_qty" placeholder="Qty">
<input id="bs_price" placeholder="Price">
<button onclick="buySell()">Submit</button>
</div>

<!-- CHART -->
<div id="chartTab" class="section tab-section">
<canvas id="myChart"></canvas>
</div>

</div>

<script>

let db, chartInstance;

// DB INIT
let req = indexedDB.open("ERP_PRO_V2",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
 db.createObjectStore("bank",{keyPath:"id"});
 db.createObjectStore("transfer",{keyPath:"id"});
 db.createObjectStore("buysell",{keyPath:"id"});
 db.createObjectStore("users",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 initAdmin();
 loadAll();
};

// ADMIN INIT
function initAdmin(){
 let tx = db.transaction("users","readwrite");
 let store = tx.objectStore("users");

 store.getAll().onsuccess = e=>{
  if(e.target.result.length===0){
   store.put({
    id:crypto.randomUUID(),
    username:"admin",
    password:"1234",
    role:"admin"
   });
  }
 };
}

// LOGIN
function login(){
 let u=loginUser.value, p=loginPass.value;

 db.transaction("users")
 .objectStore("users")
 .getAll().onsuccess=e=>{
  let user = e.target.result.find(x=>x.username===u && x.password===p);
  if(!user) return alert("Invalid");

  localStorage.setItem("user",JSON.stringify(user));
  loginPage.style.display="none";
  app.style.display="block";
  loadAll();
 };
}

function logout(){
 localStorage.removeItem("user");
 location.reload();
}

// SIGNUP
function signup(){
 let tx = db.transaction("users","readwrite");
 tx.objectStore("users").put({
  id:crypto.randomUUID(),
  username:s_user.value,
  password:s_pass.value,
  role:s_role.value
 });
 alert("Created");
 backLogin();
}

function showSignup(){
 loginPage.style.display="none";
 signupPage.style.display="block";
}

function backLogin(){
 signupPage.style.display="none";
 loginPage.style.display="block";
}

// MEMBERS
function saveMember(){
 let tx = db.transaction("members","readwrite");
 tx.objectStore("members").put({
  id:crypto.randomUUID(),
  name:m_name.value
 });
 tx.oncomplete=loadAll;
}

// BALANCE CALC
function getBalance(name,bank,transfer,bs){
 let bal=0;

 bank.forEach(b=>{
  if(b.name===name){
   bal += (b.type==="deposit"?b.amount:-b.amount);
  }
 });

 transfer.forEach(t=>{
  if(t.from===name) bal-=t.amount;
  if(t.to===name) bal+=t.amount;
 });

 bs.forEach(b=>{
  if(b.member===name){
   bal += (b.type==="sell"?b.total:-b.total);
  }
 });

 return bal;
}

// LOAD MEMBERS
function loadMembers(){

 let tx = db.transaction(["members","bank","transfer","buysell"]);

 Promise.all([
  tx.objectStore("members").getAll(),
  tx.objectStore("bank").getAll(),
  tx.objectStore("transfer").getAll(),
  tx.objectStore("buysell").getAll()
 ]).then(([m,b,t,bs])=>{

  memberTable.innerHTML = m.map(x=>`
   <tr>
    <td>${x.name}</td>
    <td>${getBalance(x.name,b,t,bs)}</td>
   </tr>
  `).join("");

 });
}

// BANK
function bank(){
 let tx = db.transaction("bank","readwrite");
 tx.objectStore("bank").put({
  id:crypto.randomUUID(),
  name:b_member.value,
  type:b_type.value,
  amount:+b_amount.value
 });
 tx.oncomplete=loadAll;
}

// TRANSFER
function transfer(){
 let tx = db.transaction("transfer","readwrite");
 tx.objectStore("transfer").put({
  id:crypto.randomUUID(),
  from:t_from.value,
  to:t_to.value,
  amount:+t_amt.value
 });
 tx.oncomplete=loadAll;
}

// STOCK
function addStock(){
 let tx = db.transaction("stock","readwrite");
 tx.objectStore("stock").put({
  id:crypto.randomUUID(),
  name:item.value
 });
 tx.oncomplete=loadAll;
}

function loadStock(){

 let tx = db.transaction(["stock","buysell"]);

 Promise.all([
  tx.objectStore("stock").getAll(),
  tx.objectStore("buysell").getAll()
 ]).then(([s,bs])=>{

  stockTable.innerHTML = s.map(x=>{
   let qty=0;

   bs.forEach(b=>{
    if(b.item===x.name){
     qty += (b.type==="buy"?b.qty:-b.qty);
    }
   });

   return `<tr><td>${x.name}</td><td>${qty}</td></tr>`;
  }).join("");

 });
}

// BUY SELL
function buySell(){
 let tx = db.transaction("buysell","readwrite");

 let total = bs_qty.value * bs_price.value;

 tx.objectStore("buysell").put({
  id:crypto.randomUUID(),
  member:bs_member.value,
  item:bs_item.value,
  type:bs_type.value,
  qty:+bs_qty.value,
  price:+bs_price.value,
  total
 });

 tx.oncomplete=loadAll;
}

// DROPDOWN
function loadDropdowns(){

 db.transaction("members")
 .objectStore("members")
 .getAll().onsuccess=e=>{
  let opt="";
  e.target.result.forEach(x=>{
   opt += `<option>${x.name}</option>`;
  });

  b_member.innerHTML=opt;
  t_from.innerHTML=opt;
  t_to.innerHTML=opt;
  bs_member.innerHTML=opt;
 };

 db.transaction("stock")
 .objectStore("stock")
 .getAll().onsuccess=e=>{
  let opt="";
  e.target.result.forEach(x=>{
   opt += `<option>${x.name}</option>`;
  });

  bs_item.innerHTML=opt;
 };
}

// CHART
function loadChart(){

 let tx = db.transaction(["members","bank","transfer","buysell"]);

 Promise.all([
  tx.objectStore("members").getAll(),
  tx.objectStore("bank").getAll(),
  tx.objectStore("transfer").getAll(),
  tx.objectStore("buysell").getAll()
 ]).then(([m,b,t,bs])=>{

  let names = m.map(x=>x.name);
  let balances = m.map(x=>getBalance(x.name,b,t,bs));

  let ctx = document.getElementById("myChart");

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx,{
   type:"bar",
   data:{labels:names,datasets:[{data:balances}]}
  });

 });
}

// LOAD ALL
function loadAll(){
 loadMembers();
 loadStock();
 loadDropdowns();
 loadChart();
}

// TAB
function showTab(id){
 document.querySelectorAll(".tab-section")
 .forEach(x=>x.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// EXPORT
function exportExcel(){
 let wb = XLSX.utils.book_new();

 db.transaction("members")
 .objectStore("members")
 .getAll().onsuccess=e=>{
  let ws = XLSX.utils.json_to_sheet(e.target.result);
  XLSX.utils.book_append_sheet(wb,ws,"Members");
  XLSX.writeFile(wb,"ERP.xlsx");
 };
}

function forgotPass(){
 let username = prompt("Enter your username");

 if(!username) return;

 db.transaction("users","readwrite")
 .objectStore("users")
 .getAll().onsuccess = e=>{

  let users = e.target.result;
  let user = users.find(x=>x.username===username);

  if(!user){
   alert("❌ User not found");
   return;
  }

  let newPass = prompt("Enter new password");

  if(!newPass) return;

  user.password = newPass;

  let tx = db.transaction("users","readwrite");
  tx.objectStore("users").put(user);

  tx.oncomplete = ()=>{
   alert("✅ Password reset successful");
  };
 };
}

function resetPassword(){
 let username = prompt("Enter username to reset password:");

 if(!username) return;

 db.transaction("users","readonly")
 .objectStore("users")
 .getAll().onsuccess = e=>{

  let users = e.target.result;
  let user = users.find(x=>x.username===username);

  if(!user){
   alert("❌ User not found");
   return;
  }

  // simple security check
  let confirmAdmin = prompt("Enter ADMIN password to continue:");

  if(confirmAdmin !== "1234"){   // default admin password
   alert("❌ Not authorized");
   return;
  }

  let newPass = prompt("Enter NEW password:");

  if(!newPass) return;

  user.password = newPass;

  let tx = db.transaction("users","readwrite");
  tx.objectStore("users").put(user);

  tx.oncomplete = ()=>{
   alert("✅ Password reset successful");
  };
 };
}

function loadUsers(){
 db.transaction("users")
 .objectStore("users")
 .getAll().onsuccess = e=>{

  userTable.innerHTML = e.target.result.map(u=>`
   <tr>
    <td>${u.username}</td>
    <td>${u.role}</td>
    <td>
      <button onclick="editUser('${u.id}')">✏️ Edit</button>
      <button onclick="deleteUser('${u.id}')">❌ Delete</button>
    </td>
   </tr>
  `).join("");
 };
}

function editUser(id){

 let tx = db.transaction("users","readwrite");
 let store = tx.objectStore("users");

 store.get(id).onsuccess = e=>{
  let u = e.target.result;

  let newName = prompt("Edit Username", u.username);
  if(!newName) return;

  let newPass = prompt("Edit Password", u.password);
  if(!newPass) return;

  let newRole = prompt("Edit Role (admin/user)", u.role);
  if(!newRole) return;

  u.username = newName;
  u.password = newPass;
  u.role = newRole;

  store.put(u);

  tx.oncomplete = ()=>{
   alert("✅ User updated");
   loadUsers();
  };
 };
}

function deleteUser(id){

 if(!confirm("Are you sure to delete this user?")) return;

 let tx = db.transaction("users","readwrite");
 tx.objectStore("users").delete(id);

 tx.oncomplete = ()=>{
  alert("🗑️ User deleted");
  loadUsers();
 };
}



// AUTO LOGIN
window.onload = ()=>{
 let user = JSON.parse(localStorage.getItem("user"));
 if(user){
  loginPage.style.display="none";
  app.style.display="block";
  loadAll();
 }
};

</script>

</body>
</html>
