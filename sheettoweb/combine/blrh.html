<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank ERP Final Master</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f5f6fa;max-width:1000px;margin:auto;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
h2{text-align:center;}
</style>
</head>

<body>

<h2>🏦 BANK ERP FINAL MASTER SYSTEM</h2>

<!-- 👤 MEMBERS -->
<div class="section">
<h3>👤 Members</h3>

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">

<button onclick="saveMember()">Save Member</button>

<table>
<thead>
<tr><th>Name</th><th>Phone</th><th>Action</th></tr>
</thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- 💰 TRANSACTIONS -->
<div class="section">
<h3>💰 Transactions</h3>

<select id="t_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
<option value="loan">Loan</option>
</select>

<input id="t_name" placeholder="Member Name">
<input id="t_amount" placeholder="Amount">

<button onclick="saveTransaction()">Save Transaction</button>

<table>
<thead>
<tr><th>Name</th><th>Type</th><th>Amount</th><th>Action</th></tr>
</thead>
<tbody id="transactionTable"></tbody>
</table>
</div>

<!-- 📊 DASHBOARD -->
<div class="section">
<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>
</div>

<script>

let db;
let chart;
let editMemberId = null;
let editTxnId = null;

// ---------------- DB ----------------
let req = indexedDB.open("BANK_FINAL",1);

req.onupgradeneeded = e=>{
 db = e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
};

req.onsuccess = e=>{
 db = e.target.result;
 loadAll();
};

// ---------------- MEMBERS ----------------
function saveMember(){

 let name = document.getElementById("m_name").value.trim();
 let phone = document.getElementById("m_phone").value.trim();

 if(!name) return alert("Name required");

 let obj = {
  id: editMemberId || crypto.randomUUID(),
  name,
  phone
 };

 db.transaction("members","readwrite")
 .objectStore("members")
 .put(obj);

 editMemberId = null;

 document.getElementById("m_name").value="";
 document.getElementById("m_phone").value="";

 loadAll();
}

function editMember(id){
 db.transaction("members").objectStore("members")
 .get(id).onsuccess = e=>{
  let m = e.target.result;
  document.getElementById("m_name").value = m.name;
  document.getElementById("m_phone").value = m.phone;
  editMemberId = m.id;
 };
}

function deleteMember(id){
 db.transaction("members","readwrite")
 .objectStore("members")
 .delete(id);

 loadAll();
}

// ---------------- TRANSACTIONS ----------------
function saveTransaction(){

 let obj = {
  id: editTxnId || crypto.randomUUID(),
  name: document.getElementById("t_name").value.trim(),
  type: document.getElementById("t_type").value,
  amount: Number(document.getElementById("t_amount").value)
 };

 if(!obj.name || !obj.amount){
  alert("Fill all fields");
  return;
 }

 db.transaction("transactions","readwrite")
 .objectStore("transactions")
 .put(obj);

 editTxnId = null;

 document.getElementById("t_name").value="";
 document.getElementById("t_amount").value="";

 loadAll();
}

function editTransaction(id){
 db.transaction("transactions").objectStore("transactions")
 .get(id).onsuccess = e=>{
  let t = e.target.result;

  document.getElementById("t_name").value = t.name;
  document.getElementById("t_type").value = t.type;
  document.getElementById("t_amount").value = t.amount;

  editTxnId = t.id;
 };
}

function deleteTransaction(id){
 db.transaction("transactions","readwrite")
 .objectStore("transactions")
 .delete(id);

 loadAll();
}

// ---------------- LOAD ----------------
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess = e=>{
  memberTable.innerHTML = e.target.result.map(m=>`
   <tr>
    <td>${m.name}</td>
    <td>${m.phone}</td>
    <td>
     <button onclick="editMember('${m.id}')">Edit</button>
     <button onclick="deleteMember('${m.id}')">Delete</button>
    </td>
   </tr>
  `).join("");
 };
}

function loadTransactions(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{
  transactionTable.innerHTML = e.target.result.map(t=>`
   <tr>
    <td>${t.name}</td>
    <td>${t.type}</td>
    <td>${t.amount}</td>
    <td>
     <button onclick="editTransaction('${t.id}')">Edit</button>
     <button onclick="deleteTransaction('${t.id}')">Delete</button>
    </td>
   </tr>
  `).join("");
 };
}

// ---------------- CHART ----------------
function drawChart(){

 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess = e=>{

  let income=0, expense=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") income += t.amount;
   else expense += t.amount;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{
    labels:["Income","Expense"],
    datasets:[{data:[income,expense]}]
   }
  });

 };
}

// ---------------- MAIN ----------------
function loadAll(){
 loadMembers();
 loadTransactions();
 drawChart();
}

</script>

</body>
</html>
