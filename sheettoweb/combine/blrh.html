<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank ERP 4.0 AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;max-width:1000px;margin:auto;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;box-shadow:0 0 5px #ddd;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#007bff;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
.hidden{display:none;}
.bad{color:red;font-weight:bold;}
.good{color:green;font-weight:bold;}
</style>
</head>

<body>

<h2>🏦 BANK ERP 4.0 ULTRA AI</h2>

<!-- LOGIN -->
<div class="section" id="loginBox">
<h3>🔐 Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- CUSTOMER -->
<div class="section">
<h3>👤 Customer</h3>
<input id="name">
<input id="phone">
<button onclick="addCustomer()">Add</button>
<table>
<tbody id="customerTable"></tbody>
</table>
</div>

<!-- TRANSACTION -->
<div class="section">
<h3>💰 Transaction</h3>
<select id="type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
<option value="loanpay">Loan Pay</option>
</select>

<input id="t_member">
<input id="amount">
<button onclick="transaction()">Submit</button>
</div>

<!-- LOAN -->
<div class="section">
<h3>🏦 Loan System</h3>

<input id="loan_member">
<input id="loan_amount">
<input id="loan_months">
<button onclick="createLoan()">Create Loan</button>

<table>
<tbody id="loanTable"></tbody>
</table>
</div>

<!-- AI PANEL -->
<div class="section">
<h3>🧠 AI Risk Engine</h3>
<div id="aiPanel"></div>
</div>

<!-- CHART -->
<div class="section">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let db;
let chart;

// ---------------- LOGIN ----------------
function login(){
 if(user.value==="admin" && pass.value==="1234"){
  loginBox.classList.add("hidden");
  app.classList.remove("hidden");
  initDB();
 } else alert("Wrong login");
}

// ---------------- DB ----------------
function initDB(){
 let req = indexedDB.open("BANK4",1);

 req.onupgradeneeded=e=>{
  db=e.target.result;

  db.createObjectStore("customers",{keyPath:"id"});
  db.createObjectStore("transactions",{keyPath:"id"});
  db.createObjectStore("loans",{keyPath:"id"});
 };

 req.onsuccess=e=>{
  db=e.target.result;
  loadAll();
  setInterval(aiEngine,5000);
 };
}

// ---------------- CUSTOMER ----------------
function addCustomer(){
 let nameVal = document.getElementById("name").value.trim();
 let phoneVal = document.getElementById("phone").value.trim();

 if(!nameVal){
  alert("Name required");
  return;
 }

 let customer = {
  id: crypto.randomUUID(),
  name: nameVal,
  phone: phoneVal || "-",
  balance: 0
 };

 db.transaction("customers","readwrite")
 .objectStore("customers")
 .put(customer);

 document.getElementById("name").value = "";
 document.getElementById("phone").value = "";

 loadAll();
}

// ---------------- TRANSACTION ----------------
function transaction(){

 if(!db){
  alert("DB not ready");
  return;
 }

 let t = {
  id: crypto.randomUUID(),
  name: document.getElementById("t_member").value.trim(),
  type: document.getElementById("type").value,
  amount: Number(document.getElementById("amount").value),
  time: Date.now()
 };

 if(!t.name || !t.amount){
  alert("Fill all fields");
  return;
 }

 let store = db.transaction("transactions","readwrite")
 .objectStore("transactions");

 let req = store.put(t);

 req.onsuccess = ()=>{
  alert("Transaction saved ✅");
  loadAll();
 };

 req.onerror = ()=>{
  alert("Transaction failed ❌");
  console.log(req.error);
 };
}

// ---------------- LOAN ----------------
function createLoan(){
 let loan={
  id:crypto.randomUUID(),
  name:loan_member.value,
  amount:+loan_amount.value,
  months:+loan_months.value,
  paid:0,
  created:Date.now()
 };

 db.transaction("loans","readwrite").objectStore("loans").put(loan);
 loadAll();
}

// ---------------- AI ENGINE ----------------
function aiEngine(){
 let tx=db.transaction("transactions").objectStore("transactions");

 tx.getAll().onsuccess=e=>{
  let data=e.target.result;

  let riskMap={};

  data.forEach(t=>{
   if(!riskMap[t.name]) riskMap[t.name]=0;

   if(t.type==="withdraw" && t.amount>5000) riskMap[t.name]+=2;
   if(t.amount>10000) riskMap[t.name]+=3;
  });

  let html="";

  for(let k in riskMap){
   let score=riskMap[k];

   let status = score>=5
   ? `<span class="bad">HIGH RISK</span>`
   : score>=3
   ? `<span style="color:orange">MEDIUM</span>`
   : `<span class="good">LOW</span>`;

   html+=`<p>${k} → Risk Score: ${score} ${status}</p>`;
  }

  aiPanel.innerHTML = html || "No risk detected";
 };
}

// ---------------- LOAD ----------------
function loadAll(){
 loadCustomers();
 loadLoans();
 drawChart();
}

function loadCustomers(){
 db.transaction("customers").objectStore("customers")
 .getAll().onsuccess = e => {

  customerTable.innerHTML = e.target.result.map(c => `
   <tr>
     <td>${c.name ?? "N/A"}</td>
     <td>${c.phone ?? "-"}</td>
     <td>${c.balance ?? 0}</td>
   </tr>
  `).join("");

 };
}

function loadLoans(){
 db.transaction("loans").objectStore("loans")
 .getAll().onsuccess=e=>{
  loanTable.innerHTML=e.target.result.map(l=>
   `<tr><td>${l.name}</td><td>${l.amount}</td><td>${l.months}</td><td>${l.paid}</td></tr>`
  ).join("");
 };
}

// ---------------- CHART ----------------
function drawChart(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess=e=>{

  let income=0,expense=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") income+=t.amount;
   else expense+=t.amount;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}
  });
 };
}
</script>

</body>
</html>
