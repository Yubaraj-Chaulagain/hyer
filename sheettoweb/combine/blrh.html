<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP ULTRA SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;max-width:1100px;margin:auto;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
h2{text-align:center;}
</style>
</head>

<body>

<h2>🚀 ERP ULTRA FULL BUSINESS SYSTEM</h2>

<!-- MEMBERS -->
<div class="section">
<h3>👤 Members</h3>
<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<button onclick="saveMember()">Save</button>
<table>
<thead><tr><th>Name</th><th>Balance</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANKING -->
<div class="section">
<h3>🏦 Banking</h3>
<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amount" placeholder="Amount">
<button onclick="banking()">Submit</button>
</div>

<!-- TRANSFER -->
<div class="section">
<h3>💸 Transfer (ABBS)</h3>
<select id="from"></select>
<select id="to"></select>
<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Transfer</button>
</div>

<!-- STOCK -->
<div class="section">
<h3>📦 Stock</h3>
<input id="item_name" placeholder="Item">
<input id="item_qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr><th>Item</th><th>Qty</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- BUY/SELL -->
<div class="section">
<h3>🛒 Buy / Sell</h3>
<select id="stock_item"></select>
<select id="bs_type">
<option value="buy">Buying</option>
<option value="sell">Selling</option>
</select>
<input id="bs_qty" placeholder="Qty">
<button onclick="stockAction()">Submit</button>
</div>

<!-- DASHBOARD -->
<div class="section">
<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>
<div id="profitBox"></div>
</div>

<script>

let db, chart;

// DB
let req=indexedDB.open("ERP_ULTRA",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess=e=>{
 db=e.target.result;
 loadAll();
};

// MEMBERS
function saveMember(){
 let obj={
  id:crypto.randomUUID(),
  name:m_name.value,
  balance:0
 };
 db.transaction("members","readwrite").objectStore("members").put(obj);
 loadAll();
}

// BANKING
function banking(){
 let id=b_member.value;
 let type=b_type.value;
 let amt=+b_amount.value;

 let store=db.transaction("members","readwrite").objectStore("members");

 store.get(id).onsuccess=e=>{
  let m=e.target.result;

  if(type==="deposit") m.balance+=amt;
  if(type==="withdraw"){
   if(m.balance<amt) return alert("Low balance");
   m.balance-=amt;
  }

  store.put(m);

  db.transaction("transactions","readwrite").objectStore("transactions")
  .put({id:crypto.randomUUID(),type,name:m.name,amount:amt});

  loadAll();
 };
}

// TRANSFER
function transfer(){
 let f=from.value, t=to.value, amt=+t_amt.value;

 let store=db.transaction("members","readwrite").objectStore("members");

 store.getAll().onsuccess=e=>{
  let data=e.target.result;

  let A=data.find(x=>x.id===f);
  let B=data.find(x=>x.id===t);

  if(A.balance<amt) return alert("Insufficient");

  A.balance-=amt;
  B.balance+=amt;

  store.put(A); store.put(B);

  loadAll();
 };
}

// STOCK
function addStock(){
 db.transaction("stock","readwrite").objectStore("stock")
 .put({id:crypto.randomUUID(),name:item_name.value,qty:+item_qty.value});
 loadAll();
}

// BUY/SELL
let totalBuy=0, totalSell=0;

function stockAction(){
 let id=stock_item.value;
 let type=bs_type.value;
 let qty=+bs_qty.value;

 let store=db.transaction("stock","readwrite").objectStore("stock");

 store.get(id).onsuccess=e=>{
  let s=e.target.result;

  if(type==="buy"){ s.qty+=qty; totalBuy+=qty; }
  if(type==="sell"){
   if(s.qty<qty) return alert("Out of stock");
   s.qty-=qty;
   totalSell+=qty;
  }

  store.put(s);
  loadAll();
 };
}

// LOAD
function loadAll(){
 loadMembers();
 loadDropdowns();
 loadStock();
 drawChart();
 calcProfit();
}

function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  memberTable.innerHTML=e.target.result.map(m=>`
   <tr><td>${m.name}</td><td>${m.balance}</td></tr>
  `).join("");
 };
}

function loadDropdowns(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  let opt="";
  e.target.result.forEach(m=>{
   opt+=`<option value="${m.id}">${m.name}</option>`;
  });
  b_member.innerHTML=opt;
  from.innerHTML=opt;
  to.innerHTML=opt;
 };

 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  let opt="";
  e.target.result.forEach(s=>{
   opt+=`<option value="${s.id}">${s.name}</option>`;
  });
  stock_item.innerHTML=opt;
 };
}

function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  stockTable.innerHTML=e.target.result.map(s=>`
   <tr><td>${s.name}</td><td>${s.qty}</td></tr>
  `).join("");
 };
}

// PROFIT
function calcProfit(){
 let profit = totalSell - totalBuy;
 profitBox.innerHTML = "Profit: "+profit;
}

// CHART
function drawChart(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess=e=>{

  let inc=0, exp=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") inc+=t.amount;
   else exp+=t.amount;
  });

  if(chart) chart.destroy();

  chart=new Chart(chart,{
   type:"bar",
   data:{labels:["Income","Expense"],datasets:[{data:[inc,exp]}]}
  });
 };
}

</script>

</body>
</html>
