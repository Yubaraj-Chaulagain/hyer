<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank ERP 3.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4;max-width:1000px;margin:auto;padding:10px;}
.section{background:#fff;padding:10px;margin-top:10px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#007bff;color:#fff;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
.hidden{display:none;}
</style>
</head>

<body>

<h2>🏦 BANK ERP 3.0 SUPER ADVANCE</h2>

<!-- LOGIN -->
<div class="section" id="loginBox">
<h3>🔐 Admin Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- CUSTOMER -->
<div class="section">
<h3>👤 Customer</h3>
<input id="name">
<input id="phone">
<button onclick="addCustomer()">Add</button>
<table>
<tbody id="customerTable"></tbody>
</table>
</div>

<!-- TRANSACTION -->
<div class="section">
<h3>💰 Transaction</h3>

<select id="type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
<option value="loan">Loan Payment</option>
<option value="saving">Saving</option>
</select>

<input id="t_member">
<input id="amount">
<button onclick="transaction()">Submit</button>
</div>

<!-- LOAN -->
<div class="section">
<h3>🏦 Loan System</h3>

<input id="loan_member">
<input id="loan_amount">
<input id="loan_months">
<button onclick="createLoan()">Create Loan</button>

<table>
<tbody id="loanTable"></tbody>
</table>
</div>

<!-- EMI -->
<div class="section">
<h3>📅 EMI</h3>

<input id="loan_id">
<button onclick="payEMI()">Pay EMI</button>

<table>
<tbody id="emiTable"></tbody>
</table>
</div>

<!-- CHART -->
<div class="section">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let db;
let chart;
let queue = JSON.parse(localStorage.getItem("queue")||"[]");

// ---------------- LOGIN ----------------
function login(){
 let u = user.value;
 let p = pass.value;

 if(u==="admin" && p==="1234"){
  loginBox.classList.add("hidden");
  app.classList.remove("hidden");
  initDB();
 } else alert("Wrong login");
}

// ---------------- DB ----------------
function initDB(){
 let req = indexedDB.open("BANK3",1);

 req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("customers",{keyPath:"id"});
  db.createObjectStore("transactions",{keyPath:"id"});
  db.createObjectStore("loans",{keyPath:"id"});
  db.createObjectStore("emis",{keyPath:"id"});
  db.createObjectStore("audit",{keyPath:"id"});
 };

 req.onsuccess=e=>{
  db=e.target.result;
  loadAll();
  syncQueue();
  setInterval(checkOverdue,10000);
 };
}

// ---------------- CUSTOMER ----------------
function addCustomer(){
 let obj={
  id:crypto.randomUUID(),
  name:name.value,
  phone:phone.value,
  balance:0
 };

 db.transaction("customers","readwrite")
 .objectStore("customers").put(obj);

 loadAll();
}

// ---------------- TRANSACTION (OFFLINE QUEUE) ----------------
function transaction(){
 let t={
  id:crypto.randomUUID(),
  name:t_member.value,
  type:type.value,
  amount:+amount.value,
  time:Date.now()
 };

 queue.push(t);
 localStorage.setItem("queue",JSON.stringify(queue));

 processQueue();
}

// ---------------- SYNC ENGINE ----------------
function processQueue(){
 let tx=db.transaction("transactions","readwrite").objectStore("transactions");

 queue.forEach(q=>{
  tx.put(q);

  db.transaction("audit","readwrite")
  .objectStore("audit")
  .put({id:q.id,action:"sync",data:q});
 });

 queue=[];
 localStorage.removeItem("queue");

 loadAll();
}

// ---------------- LOAN ----------------
function createLoan(){
 let loan={
  id:crypto.randomUUID(),
  name:loan_member.value,
  amount:+loan_amount.value,
  months:+loan_months.value,
  interest:18
 };

 db.transaction("loans","readwrite").objectStore("loans").put(loan);
 loadAll();
}

// ---------------- EMI ----------------
function payEMI(){
 let id = loan_id.value;

 let store = db.transaction("loans","readwrite").objectStore("loans");

 store.getAll().onsuccess=e=>{
  let loan = e.target.result.find(l=>l.id===id);
  if(!loan) return alert("Not found");

  loan.paid = (loan.paid||0)+1;
  store.put(loan);

  db.transaction("audit","readwrite")
  .objectStore("audit")
  .put({id:crypto.randomUUID(),action:"emi",loan:id});

  loadAll();
 };
}

// ---------------- OVERDUE ----------------
function checkOverdue(){
 let store = db.transaction("loans").objectStore("loans");

 store.getAll().onsuccess=e=>{
  e.target.result.forEach(l=>{
   if(l.paid && l.paid < l.months){
    console.log("OVERDUE:",l.name);
   }
  });
 };
}

// ---------------- LOAD ----------------
function loadAll(){
 loadCustomers();
 loadLoans();
 loadEMI();
 drawChart();
}

function loadCustomers(){
 db.transaction("customers").objectStore("customers")
 .getAll().onsuccess=e=>{
  customerTable.innerHTML=e.target.result.map(c=>
   `<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.balance}</td></tr>`
  ).join("");
 };
}

function loadLoans(){
 db.transaction("loans").objectStore("loans")
 .getAll().onsuccess=e=>{
  loanTable.innerHTML=e.target.result.map(l=>
   `<tr><td>${l.name}</td><td>${l.amount}</td><td>${l.months}</td><td>${l.paid||0}</td></tr>`
  ).join("");
 };
}

function loadEMI(){
 loanTable.innerHTML = loanTable.innerHTML;
}

// ---------------- CHART ----------------
function drawChart(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess=e=>{

  let income=0,expense=0;

  e.target.result.forEach(t=>{
   if(t.type==="deposit") income+=t.amount;
   else expense+=t.amount;
  });

  if(chart) chart.destroy();

  chart = new Chart(chartCanvas,{
   type:"bar",
   data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}
  });
 };
}
</script>

</body>
</html>
