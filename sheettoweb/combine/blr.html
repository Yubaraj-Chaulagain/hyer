<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP CRUD Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px;max-width:1000px;margin:auto;}
input,select,button{width:100%;padding:10px;margin:5px 0;}
button{background:#007bff;color:white;border:none;}
table{width:100%;background:white;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}
.section{background:white;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>📒 ERP CRUD Ultimate</h2>

<!-- MEMBER -->
<div class="section">
<h3>👤 Member</h3>
<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<button onclick="saveMember()">Save</button>

<table>
<thead><tr><th>Name</th><th>Phone</th><th>Action</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- TRANSACTION -->
<div class="section">
<h3>💰 Transaction</h3>
<input id="t_member" placeholder="Member">
<input id="t_amount" placeholder="Amount">
<select id="t_type">
<option value="credit">Credit</option>
<option value="debit">Debit</option>
</select>
<button onclick="saveTransaction()">Save</button>

<table>
<thead><tr><th>Member</th><th>Amount</th><th>Type</th><th>Action</th></tr></thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div class="section">
<h3>📦 Stock</h3>
<input id="s_name" placeholder="Item">
<input id="s_qty" placeholder="Qty">
<button onclick="saveStock()">Save</button>

<table>
<thead><tr><th>Item</th><th>Qty</th><th>Action</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>

<h4>Sell</h4>
<input id="sell_item" placeholder="Item">
<input id="sell_qty" placeholder="Qty">
<input id="sell_price" placeholder="Price">
<button onclick="sellItem()">Sell</button>
</div>

<script>
let db, editId=null;

// DB INIT
let req=indexedDB.open("ERP",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("transactions",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
};

req.onsuccess=e=>{
 db=e.target.result;
 loadAll();
};

// MEMBER CRUD
function saveMember(){
 let name=m_name.value;
 let phone=m_phone.value;

 let obj={id:editId||Date.now(),name,phone};

 db.transaction("members","readwrite")
 .objectStore("members").put(obj);

 editId=null;
 m_name.value=""; m_phone.value="";
 loadMembers();
}

function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  memberTable.innerHTML=e.target.result.map(i=>`
   <tr>
   <td>${i.name}</td>
   <td>${i.phone}</td>
   <td>
   <button onclick='editMember(${i.id})'>Edit</button>
   <button onclick='deleteMember(${i.id})'>Delete</button>
   </td>
   </tr>
  `).join("");
 };
}

function editMember(id){
 db.transaction("members").objectStore("members")
 .get(id).onsuccess=e=>{
  let d=e.target.result;
  m_name.value=d.name;
  m_phone.value=d.phone;
  editId=id;
 };
}

function deleteMember(id){
 db.transaction("members","readwrite")
 .objectStore("members").delete(id);
 loadMembers();
}

// TRANSACTION CRUD
function saveTransaction(){
 let obj={
  id:editId||Date.now(),
  member:t_member.value,
  amount:+t_amount.value,
  type:t_type.value
 };

 db.transaction("transactions","readwrite")
 .objectStore("transactions").put(obj);

 editId=null;
 t_member.value=""; t_amount.value="";
 loadTx();
}

function loadTx(){
 db.transaction("transactions").objectStore("transactions")
 .getAll().onsuccess=e=>{
  txTable.innerHTML=e.target.result.map(i=>`
   <tr>
   <td>${i.member}</td>
   <td>${i.amount}</td>
   <td>${i.type}</td>
   <td>
   <button onclick='editTx(${i.id})'>Edit</button>
   <button onclick='deleteTx(${i.id})'>Delete</button>
   </td>
   </tr>
  `).join("");
 };
}

function editTx(id){
 db.transaction("transactions").objectStore("transactions")
 .get(id).onsuccess=e=>{
  let d=e.target.result;
  t_member.value=d.member;
  t_amount.value=d.amount;
  t_type.value=d.type;
  editId=id;
 };
}

function deleteTx(id){
 db.transaction("transactions","readwrite")
 .objectStore("transactions").delete(id);
 loadTx();
}

// STOCK CRUD
function saveStock(){
 let obj={
  id:editId||Date.now(),
  name:s_name.value,
  qty:+s_qty.value
 };

 db.transaction("stock","readwrite")
 .objectStore("stock").put(obj);

 editId=null;
 s_name.value=""; s_qty.value="";
 loadStock();
}

function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  stockTable.innerHTML=e.target.result.map(i=>`
   <tr>
   <td>${i.name}</td>
   <td>${i.qty}</td>
   <td>
   <button onclick='editStock(${i.id})'>Edit</button>
   <button onclick='deleteStock(${i.id})'>Delete</button>
   </td>
   </tr>
  `).join("");
 };
}

function editStock(id){
 db.transaction("stock").objectStore("stock")
 .get(id).onsuccess=e=>{
  let d=e.target.result;
  s_name.value=d.name;
  s_qty.value=d.qty;
  editId=id;
 };
}

function deleteStock(id){
 db.transaction("stock","readwrite")
 .objectStore("stock").delete(id);
 loadStock();
}

// SELL
function sellItem(){
 let item=sell_item.value;
 let qty=+sell_qty.value;
 let price=+sell_price.value;

 db.transaction("transactions","readwrite")
 .objectStore("transactions")
 .put({id:Date.now(),member:item,amount:qty*price,type:"credit"});

 // reduce stock
 let tx=db.transaction("stock","readwrite");
 tx.objectStore("stock").getAll().onsuccess=e=>{
  e.target.result.forEach(i=>{
   if(i.name===item){
    i.qty-=qty;
    tx.objectStore("stock").put(i);
   }
  });
 };

 loadStock();
 loadTx();
}

// LOAD ALL
function loadAll(){
 loadMembers();
 loadTx();
 loadStock();
}
</script>

</body>
</html>
