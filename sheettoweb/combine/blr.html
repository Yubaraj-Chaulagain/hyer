<div class="section">
<h3>👤 Members</h3>

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<button onclick="saveMember()">Save / Update</button>

<table>
<thead><tr><th>Name</th><th>Phone</th><th>Action</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<script>
let editMemberId = null;

function saveMember(){
 let data = {
  id: editMemberId || Date.now(),
  name: m_name.value,
  phone: m_phone.value
 };

 db.transaction("members","readwrite")
   .objectStore("members")
   .put(data);

 editMemberId = null;
 m_name.value = "";
 m_phone.value = "";

 loadMembers();
}

// LOAD
function loadMembers(){
 db.transaction("members","readonly")
 .objectStore("members")
 .getAll().onsuccess = e=>{
  let html="";
  e.target.result.forEach(m=>{
   html += `<tr>
   <td>${m.name}</td>
   <td>${m.phone}</td>
   <td>
     <button onclick='editMember(${m.id})'>Edits</button>
     <button onclick='deleteMember(${m.id})'>🗑️</button>
   </td></tr>`;
  });
  memberTable.innerHTML = html;
 };
}

// EDIT
<script>
function editMember(id){
 let tx = db.transaction("members","readonly");
 let store = tx.objectStore("members");

 store.get(id).onsuccess = e=>{
  let m = e.target.result;
  editMemberId = m.id;
  m_name.value = m.name;
  m_phone.value = m.phone;
 };
}
</script>

// DELETE
function deleteMember(id){
 if(confirm("Delete member?")){
  db.transaction("members","readwrite")
    .objectStore("members")
    .delete(id);
  loadMembers();
 }
}
</script>

<div class="section">
<h3>💰 Transactions</h3>

<input id="t_member" placeholder="Member">
<input id="t_amount" placeholder="Amount">
<select id="t_type">
<option value="credit">Credit</option>
<option value="debit">Debit</option>
</select>

<button onclick="saveTransaction()">Save / Update</button>

<table>
<thead><tr><th>Member</th><th>Amount</th><th>Type</th><th>Action</th></tr></thead>
<tbody id="transTable"></tbody>
</table>
</div>

<script>
let editTransId = null;

function saveTransaction(){
 let data = {
  id: editTransId || Date.now(),
  member: t_member.value,
  amount: +t_amount.value,
  type: t_type.value
 };

 db.transaction("transactions","readwrite")
   .objectStore("transactions")
   .put(data);

 editTransId = null;
 t_member.value="";
 t_amount.value="";

 loadTransactions();
}

function loadTransactions(){
 db.transaction("transactions","readonly")
 .objectStore("transactions")
 .getAll().onsuccess = e=>{
  let html="";
  e.target.result.forEach(t=>{
   html+=`<tr>
   <td>${t.member}</td>
   <td>${t.amount}</td>
   <td>${t.type}</td>
   <td>
     onclick='editTransaction(${t.id})'>✏️</button>
     <button onclick='deleteTransaction(${t.id})'>🗑️</button>
   </td></tr>`;
  });
  transTable.innerHTML=html;
 };
}

function editTransaction(t){
 editTransId = t.id;
 t_member.value = t.member;
 t_amount.value = t.amount;
 t_type.value = t.type;
}

function deleteTransaction(id){
 if(confirm("Delete transaction?")){
  db.transaction("transactions","readwrite")
    .objectStore("transactions")
    .delete(id);
  loadTransactions();
 }
}
</script>

   <td>${s.qty}</td>
   <td>onclick='editStock(${s.id})'>✏️</button>

<script>
const m_name = document.getElementById("m_name");
const m_phone = document.getElementById("m_phone");

const t_member = document.getElementById("t_member");
const t_amount = document.getElementById("t_amount");
const t_type = document.getElementById("t_type");

const s_name = document.getElementById("s_name");
const s_qty = document.getElementById("s_qty");

const memberTable = document.getElementById("memberTable");
const transTable = document.getElementById("transTable");
const stockTable = document.getElementById("stockTable");
</script>

<script>
let db;

let req = indexedDB.open("ERP_DB", 1);

req.onupgradeneeded = e => {
  db = e.target.result;

  if(!db.objectStoreNames.contains("members"))
    db.createObjectStore("members",{keyPath:"id"});

  if(!db.objectStoreNames.contains("transactions"))
    db.createObjectStore("transactions",{keyPath:"id"});

  if(!db.objectStoreNames.contains("stock"))
    db.createObjectStore("stock",{keyPath:"id"});
};

if(!m_name.value){
 alert("Enter name");
 return;
}

req.onsuccess = e => {
 db = e.target.result;

 loadMembers();
 loadTransactions();
 loadStock();
};
</script>
