<!DOCTYPE html>
<html>
<head>
<header>
  <nav>
    <label for="category">Category:</label>
    <select id="category" onchange="updateSubmenu()">
      <option value="">Select Category</option>
      <option value="fruits">Fruits</option>
      <option value="vegetables">Vegetables</option>
    </select>

    <label for="item">Item:</label>
    <select id="item" disabled>
      <option value="">Select Category First</option>
    </select>
  </nav>
</header>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP PRO SYSTEM</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#1e293b;
  color:#fff;
  height:100vh;
  padding:10px;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#334155;
  color:#fff;
  border:none;
}

.sidebar button:hover{
  background:#2563eb;
}

/* CONTENT */
.content{
  flex:1;
  padding:10px;
  background:#eef2f7;
}

.section{
  background:#fff;
  padding:10px;
  border-radius:10px;
  display:none;
}

.active{
  display:block;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#2563eb;
  color:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border:1px solid #ddd;
  padding:6px;
}

th{
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ERP</h2>

<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('members')">👤 Members</button>
<button onclick="show('bank')">🏦 Bank</button>
<button onclick="show('transfer')">💸 Transfer</button>
<button onclick="show('stock')">📦 Stock</button>
<button onclick="show('bs')">🛒 Buy/Sell</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<h2>📊 Dashboard</h2>

<div class="cards">
<div class="card">Total Members<br><h2 id="totalMembers">0</h2></div>
<div class="card">Total Balance<br><h2 id="totalBalance">0</h2></div>
<div class="card">Total Stock<br><h2 id="totalStock">0</h2></div>
<div class="card">Profit/Loss<br><h2 id="profit">0</h2></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- MEMBERS -->
<div id="members" class="section">
<h3>Members</h3>
<input id="m_name" placeholder="Name">
<button onclick="saveMember()">Add</button>

<table>
<thead><tr><th>Name</th><th>Balance</th></tr></thead>
<tbody id="memberTable"></tbody>
</table>
</div>

<!-- BANK -->
<div id="bank" class="section">
<h3>Bank</h3>
<select id="b_member"></select>
<select id="b_type">
<option value="deposit">Deposit</option>
<option value="withdraw">Withdraw</option>
</select>
<input id="b_amount" placeholder="Amount">
<button onclick="bank()">Submit</button>

<table>
<thead><tr><th>Member</th><th>Type</th><th>Amount</th></tr></thead>
<tbody id="bankTable"></tbody>
</table>
</div>

<!-- TRANSFER -->
<div id="transfer" class="section">
<h3>Transfer</h3>
<select id="t_from"></select>
<select id="t_to"></select>
<input id="t_amt" placeholder="Amount">
<button onclick="transfer()">Send</button>

<table>
<thead><tr><th>From</th><th>To</th><th>Amount</th></tr></thead>
<tbody id="transferTable"></tbody>
</table>
</div>

<!-- STOCK -->
<div id="stock" class="section">
<h3>Stock</h3>
<input id="item" placeholder="Item">
<input id="qty" placeholder="Qty">
<button onclick="addStock()">Add</button>

<table>
<thead><tr><th>Item</th><th>Qty</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- BUY SELL -->
<div id="bs" class="section">
<h3>Buy/Sell</h3>

<select id="bs_member"></select>
<select id="bs_item"></select>
<select id="bs_type">
<option value="buy">Buy</option>
<option value="sell">Sell</option>
</select>

<input id="bs_qty" placeholder="Qty">
<input id="bs_price" placeholder="Price">
<button onclick="buySell()">Submit</button>

<table>
<thead>
<tr><th>Member</th><th>Item</th><th>Type</th><th>Total</th></tr>
</thead>
<tbody id="bsTable"></tbody>
</table>
</div>

</div>

<script>

let db;
let req = indexedDB.open("ERP_PRO",1);

req.onupgradeneeded = e=>{
 db=e.target.result;
 db.createObjectStore("members",{keyPath:"id"});
 db.createObjectStore("stock",{keyPath:"id"});
 db.createObjectStore("bank",{keyPath:"id"});
 db.createObjectStore("transfer",{keyPath:"id"});
 db.createObjectStore("bs",{keyPath:"id"});
};

req.onsuccess = e=>{
 db=e.target.result;
 loadAll();
};

// NAVIGATION
function show(id){
 document.querySelectorAll(".section")
 .forEach(s=>s.classList.remove("active"));

 document.getElementById(id).classList.add("active");
}

// MEMBERS
function saveMember(){
 let tx=db.transaction("members","readwrite");
 tx.objectStore("members").put({
  id:crypto.randomUUID(),
  name:m_name.value,
  balance:0
 });
 tx.oncomplete=loadAll;
}

// BANK
function bank(){
 let tx=db.transaction(["members","bank"],"readwrite");
 let mStore=tx.objectStore("members");
 let bStore=tx.objectStore("bank");

 mStore.get(b_member.value).onsuccess=e=>{
  let m=e.target.result;
  let amt=+b_amount.value;

  if(b_type.value=="deposit") m.balance+=amt;
  else m.balance-=amt;

  mStore.put(m);

  bStore.put({
   id:crypto.randomUUID(),
   name:m.name,
   type:b_type.value,
   amount:amt
  });

  tx.oncomplete=loadAll;
 };
}

// TRANSFER
function transfer(){
 let tx=db.transaction(["members","transfer"],"readwrite");
 let store=tx.objectStore("members");

 store.getAll().onsuccess=e=>{
  let list=e.target.result;

  let A=list.find(x=>x.id==t_from.value);
  let B=list.find(x=>x.id==t_to.value);
  let amt=+t_amt.value;

  A.balance-=amt;
  B.balance+=amt;

  store.put(A);
  store.put(B);

  tx.objectStore("transfer").put({
   id:crypto.randomUUID(),
   from:A.name,
   to:B.name,
   amount:amt
  });

  tx.oncomplete=loadAll;
 };
}

// STOCK
function addStock(){
 let tx=db.transaction("stock","readwrite");
 tx.objectStore("stock").put({
  id:crypto.randomUUID(),
  name:item.value,
  qty:+qty.value
 });
 tx.oncomplete=loadAll;
}

// BUY SELL
function buySell(){
 let tx=db.transaction(["stock","members","bs"],"readwrite");

 let stock=tx.objectStore("stock");
 let members=tx.objectStore("members");

 stock.get(bs_item.value).onsuccess=e=>{
  let s=e.target.result;

  members.get(bs_member.value).onsuccess=e2=>{
   let m=e2.target.result;

   let total=bs_qty.value*bs_price.value;

   if(bs_type.value=="sell"){
    s.qty-=bs_qty.value;
    m.balance+=total;
   }else{
    s.qty+=+bs_qty.value;
    m.balance-=total;
   }

   stock.put(s);
   members.put(m);

   tx.objectStore("bs").put({
    id:crypto.randomUUID(),
    member:m.name,
    item:s.name,
    type:bs_type.value,
    total
   });

   tx.oncomplete=loadAll;
  };
 };
}

// LOAD
function loadAll(){
 loadMembers();
 loadStock();
 loadDashboard();
}

// MEMBERS TABLE
function loadMembers(){
 db.transaction("members").objectStore("members")
 .getAll().onsuccess=e=>{
  memberTable.innerHTML=e.target.result.map(m=>
   `<tr><td>${m.name}</td><td>${m.balance}</td></tr>`
  ).join("");

  totalMembers.innerText=e.target.result.length;

  let sum=e.target.result.reduce((a,b)=>a+b.balance,0);
  totalBalance.innerText=sum;
 };
}

// STOCK TABLE
function loadStock(){
 db.transaction("stock").objectStore("stock")
 .getAll().onsuccess=e=>{
  stockTable.innerHTML=e.target.result.map(s=>
   `<tr><td>${s.name}</td><td>${s.qty}</td></tr>`
  ).join("");

  let total=e.target.result.reduce((a,b)=>a+b.qty,0);
  totalStock.innerText=total;
 };
}

// DASHBOARD
function loadDashboard(){

 db.transaction("bs").objectStore("bs")
 .getAll().onsuccess=e=>{

  let profit=0;

  e.target.result.forEach(x=>{
   if(x.type=="sell") profit+=x.total;
   else profit-=x.total;
  });

  document.getElementById("profit").innerText=profit;

  new Chart(document.getElementById("chart"),{
   type:"bar",
   data:{
    labels:["Profit"],
    datasets:[{data:[profit]}]
   }
  });

 };
}


</script>
<script>
const data = {
  fruits: ["Apple", "Banana", "Cherry"],
  vegetables: ["Carrot", "Broccoli", "Spinach"]
};

function updateSubmenu() {
  const categorySelect = document.getElementById("category");
  const itemSelect = document.getElementById("item");
  const selectedCategory = categorySelect.value;

  // Clear existing options
  itemSelect.innerHTML = '<option value="">Select Item</option>';

  if (selectedCategory) {
    itemSelect.disabled = false;
    data[selectedCategory].forEach(item => {
      const option = document.createElement("option");
      option.value = item.toLowerCase();
      option.textContent = item;
      itemSelect.appendChild(option);
    });
  } else {
    itemSelect.disabled = true;
  }
}
</script>

</body>
</html>
