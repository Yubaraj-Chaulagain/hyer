<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Chat App</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}

/* Top bar */
.topbar{
  display:flex;
  align-items:center;
  padding:10px;
  background:#202c33;
}
.avatar{
  width:40px;height:40px;border-radius:50%;margin-right:10px;
}

/* Chat box */
#chat,#publicChat{
  height:60vh;
  overflow:auto;
  padding:10px;
}

.msgMe{
  background:#005c4b;
  padding:8px;
  margin:5px;
  border-radius:8px;
  max-width:70%;
  margin-left:auto;
}
.msgOther{
  background:#202c33;
  padding:8px;
  margin:5px;
  border-radius:8px;
  max-width:70%;
}

/* Input area */
.inputBox{
  display:flex;
  padding:10px;
  background:#202c33;
}
input{flex:1;padding:10px;border:none}
button{margin-left:5px;background:#075e54;color:#fff;border:none;padding:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="loginID" placeholder="ID"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chatArea" style="display:none">

  <div class="topbar">
    <img id="myPhoto" class="avatar">
    <span id="myName"></span>
  </div>

  <select id="member"></select>

  <div id="chat"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
    <button onclick="sendFile()">📎</button>
    <button onclick="recordVoice()">🎤</button>
  </div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwalMCiAaQ8CL7uutvNOJgmqecukye8ij7lK-1G2a0gy8Cz4H1srEQrPccipQVf050EfA/exec";

let ME="";

// Notification permission
if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

// LOGIN
async function login(){
  let res = await fetch(API,{
    method:'POST',
    body:new URLSearchParams({
      action:'login',
      id:loginID.value,
      pass:loginPass.value
    })
  });

  let text = await res.text();
  if(text==="FAIL"){alert("Wrong login");return;}

  let data = JSON.parse(text);

  ME=data.name;
  myName.innerText=data.name;
  myPhoto.src=data.photo || "https://ui-avatars.com/api/?name="+data.name;

  loginBox.style.display="none";
  chatArea.style.display="block";

  loadMembers();
  setInterval(loadMessages,2000);
}

// SEND TEXT
async function sendMsg(){
  if(!msg.value) return;

  await fetch(API,{
    method:'POST',
    body:new URLSearchParams({
      action:'send',
      from:ME,
      to:member.value,
      msg:msg.value,
      type:'text'
    })
  });

  msg.value="";
}

// LOAD MEMBERS
async function loadMembers(){
  let r=await fetch(API+"?action=members");
  let list=await r.json();

  member.innerHTML=list.map(x=>`<option>${x}</option>`).join("");
}

// LOAD MSG
async function loadMessages(){
  let r=await fetch(API+"?action=msgs");
  let d=await r.json();

  chat.innerHTML="";

  d.slice(1).forEach(row=>{
    let from=row[1];
    let to=row[2];
    let message=row[3];

    if((from==ME && to==member.value)||(from==member.value && to==ME)){
      chat.innerHTML+=`<div class="${from==ME?'msgMe':'msgOther'}">${message}</div>`;

      // Notification
      if(from!==ME && document.hidden){
        new Notification(from+": "+message);
      }
    }
  });

  chat.scrollTop=chat.scrollHeight;
}

// FILE SEND
async function sendFile(){
  let input=document.createElement("input");
  input.type="file";
  input.onchange=()=>{
    let file=input.files[0];
    let reader=new FileReader();

    reader.onload=async ()=>{
      await fetch(API,{
        method:'POST',
        body:new URLSearchParams({
          action:'send',
          from:ME,
          to:member.value,
          msg:reader.result,
          type:'file'
        })
      });
    };

    reader.readAsDataURL(file);
  };
  input.click();
}

// VOICE
let mediaRecorder, chunks=[];

async function recordVoice(){
  let stream=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder=new MediaRecorder(stream);

  mediaRecorder.ondataavailable=e=>chunks.push(e.data);

  mediaRecorder.onstop=()=>{
    let blob=new Blob(chunks);
    let reader=new FileReader();

    reader.onload=async ()=>{
      await fetch(API,{
        method:'POST',
        body:new URLSearchParams({
          action:'send',
          from:ME,
          to:member.value,
          msg:reader.result,
          type:'audio'
        })
      });
    };

    reader.readAsDataURL(blob);
  };

  mediaRecorder.start();
  setTimeout(()=>mediaRecorder.stop(),3000);
}
</script>

</body>
</html>
