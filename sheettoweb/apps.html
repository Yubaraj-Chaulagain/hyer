<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats System</title>

<style>
body{margin:0;font-family:Arial;background:#ece5dd}
.box{background:#fff;padding:15px;margin:15px;border-radius:10px}
input,button,select{padding:8px;margin:5px;font-size:14px}
button{background:#075e54;color:white;border:none;border-radius:5px}
#chat,#publicChat{height:300px;overflow:auto;background:#f1f1f1;padding:10px;border-radius:8px}
.msgMe{background:#dcf8c6;padding:6px;margin:4px;border-radius:6px;text-align:right}
.msgOther{background:#fff;padding:6px;margin:4px;border-radius:6px;text-align:left}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Login</h3>
  <input id="loginID" placeholder="Member ID"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p>
    <a href="#" onclick="showSignup()">Signup</a> |
    <a href="#" onclick="showReset()">Forgot?</a>
  </p>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="box" style="display:none">
  <h3>Signup</h3>
  <input id="sid" placeholder="Member ID"><br>
  <input id="sname" placeholder="Name"><br>
  <input id="semail" placeholder="Email"><br>

<input type="file" id="sphoto" accept="image/*"><br>
  <button id="uploadBtn">Upload Now</button><br>
  <input type="text" id="photoURL" placeholder="Photo URL will appear here" readonly><br>
  <input id="spass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Register</button>
  <p><a href="#" onclick="showLogin()">Back</a></p>
</div>

<!-- RESET PASSWORD -->
<div id="resetBox" class="box" style="display:none">
  <h3>Reset Password</h3>
  <input id="remail" placeholder="Email"><br>
  <button onclick="sendOTP()">Send OTP</button><br>
  <input id="rotp" placeholder="Enter OTP"><br>
  <input id="rnew" type="password" placeholder="New Password"><br>
  <button onclick="verifyReset()">Reset</button>
  <p><a href="#" onclick="showLogin()">Back</a></p>
</div>

<!-- CHAT AREA -->
<div id="chatArea" class="box" style="display:none">

  <!-- PROFILE HEADER -->
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:10px;">
    <div style="text-align:right;margin-right:10px;">
      <div id="myName" style="font-weight:bold;"></div>
    </div>
    <img id="myPhoto" src="https://ui-avatars.com/api/?name=User&background=075e54&color=fff"
         style="width:40px;height:40px;border-radius:50%;">
  </div>

  <button onclick="showPrivate()">🔒 Private</button>
  <button onclick="showPublic()">🌍 Public</button>
  <button onclick="showChange()">⚙ Change Password</button>
  <hr>

  <!-- PRIVATE -->
  <div id="privateDiv">
    <select id="member"></select>
    <div id="chat"></div>
    <input id="msg" placeholder="Message">
    <button onclick="sendPrivate()">Send</button>
  </div>

  <!-- PUBLIC -->
  <div id="publicDiv" style="display:none">
    <div id="publicChat"></div>
    <input id="publicMsg" placeholder="Public Message">
    <button onclick="sendPublic()">Send</button>
  </div>

  <!-- CHANGE PASSWORD -->
  <div id="changeDiv" style="display:none">
    <h4>Change Password</h4>
    <input id="cemail" placeholder="Your Email"><br>
    <input id="cnew" type="password" placeholder="New Password "><br>
    <button onclick="changePass()">Updates</button>
  </div>

</div>

<script>

// ✨ Enter your Apps Script Web App URL here
const API="https://script.google.com/macros/s/AKfycbzXZ5jVWoWZk3p7eJLDPQKUQbEAHBYjFxk5jnysX1IPgeoHHzXU8-LHX8ysFNEcWLkQ0g/exec";

let ME=""; // Logged-in username

// ---------- UI SHOW ----------

function showSignup(){loginBox.style.display="none";signupBox.style.display="block";}
function showLogin(){loginBox.style.display="block";signupBox.style.display="none";resetBox.style.display="none";}
function showReset(){loginBox.style.display="none";resetBox.style.display="block";}
function showPrivate(){privateDiv.style.display="block";publicDiv.style.display="none";changeDiv.style.display="none";}
function showPublic(){privateDiv.style.display="none";publicDiv.style.display="block";changeDiv.style.display="none";}
function showChange(){privateDiv.style.display="none";publicDiv.style.display="none";changeDiv.style.display="block";}

// ---------- LOGIN ----------

async function login(){
  let r=await fetch(API,{
    method:'post',
    body:new URLSearchParams({
      action:'login',
      id:loginID.value,
      pass:loginPass.value
    })
  });
  let t=await r.text();

  if(t=="FAIL"){alert("Wrong Login"); return;}

  let data=JSON.parse(t);
  ME = data.name;

  myName.innerText = data.name;
  if(data.photo && data.photo.trim()!=""){
    myPhoto.src=data.photo;
  }else{
    myPhoto.src="https://ui-avatars.com/api/?name="+encodeURIComponent(data.name)+"&background=075e54&color=fff";
  }

  loginBox.style.display="none";
  chatArea.style.display="block";

  loadMembers();
  setInterval(loadMessages,2000);
}

// ---------- SIGNUP ----------

async function signup(){

  if(!sid.value || !sname.value || !semail.value || !spass.value){
    alert("Fill all");
    return;
  }

  // Already uploaded URL use गर्ने
  let photoURL = document.getElementById("photoURL").value;
  let deleteURL = "";

  let r = await fetch(API,{
    method:'post',
    body:new URLSearchParams({
      action:'register',
      id:sid.value,
      name:sname.value,
      email:semail.value,
      pass:spass.value,
      photo:photoURL,
      deleteurl:deleteURL
    })
  });

  let t = await r.text();

  if(t=="REGISTERED"){
    alert("Registered Successfully");
    showLogin();
  }else{
    alert("Signup Failed");
  }
}
// ---------- PRIVATE SEND ----------

async function sendPrivate(){
  if(!msg.value) return;
  await fetch(API,{method:'post',
    body:new URLSearchParams({
      action:'send',
      from:ME,
      to:member.value,
      msg:msg.value
    })
  });
  msg.value="";
}

// ---------- PUBLIC SEND ----------

async function sendPublic(){
  if(!publicMsg.value) return;
  await fetch(API,{method:'post',
    body:new URLSearchParams({
      action:'public',
      from:ME,
      msg:publicMsg.value
    })
  });
  publicMsg.value="";
}

// ---------- LOAD MESSAGES ----------

async function loadMessages(){
  let r=await fetch(API+"?action=msgs");
  let d=await r.json();

  chat.innerHTML="";
  publicChat.innerHTML="";

  d.slice(1).forEach(row=>{

    let from=row[1], to=row[2], message=row[3];

    // PUBLIC
    if(to=="ALL"){
      publicChat.innerHTML+="<div><b>"+from+":</b> "+message+"</div>";
    }

    // PRIVATE
    else if((from==ME && to==member.value) || (from==member.value && to==ME)){
      let cls = (from==ME)?"msgMe":"msgOther";
      chat.innerHTML+="<div class='"+cls+"'>"+message+"</div>";
    }

  });

  chat.scrollTop = chat.scrollHeight;
  publicChat.scrollTop = publicChat.scrollHeight;
}

// ---------- MEMBERS ----------

async function loadMembers(){
  let r=await fetch(API+"?action=members");
  let list=await r.json();
  member.innerHTML = list.map(x => "<option>"+x+"</option>").join("");
}

// ---------- PASSWORD RESET ----------

async function sendOTP(){
  await fetch(API,{method:'post',
    body:new URLSearchParams({action:'sendOTP',email:remail.value})
  });
  alert("OTP sent");
}

async function verifyReset(){
  let r=await fetch(API,{method:'post',
    body:new URLSearchParams({
      action:'verifyOTP',
      email:remail.value,
      otp:rotp.value
    })
  });
  let t=await r.text();
  if(t=="ok"){
    await fetch(API,{method:'post',
      body:new URLSearchParams({
        action:'changePass',
        email:remail.value,
        newpass:rnew.value
      })
    });
    alert("Password Changed");
    showLogin();
  }else alert("Wrong OTP");
}

async function changePass(){
  await fetch(API,{method:'post',
    body:new URLSearchParams({
      action:'changePass',
      email:cemail.value,
      newpass:cnew.value
    })
  });
  alert("Updated");
  showPrivate();
}
  
// photo input elements
const photoInput = document.getElementById("sphoto");
const photoURLInput = document.getElementById("photoURL");
const uploadBtn = document.getElementById("uploadBtn");
uploadBtn.addEventListener("click", async function(){

  if(photoInput.files.length === 0){
    alert("Select photo first!");
    return;
  }

  const file = photoInput.files[0];
  photoURLInput.value = "Uploading...";

  const reader = new FileReader();
  reader.readAsDataURL(file);

  reader.onload = async function(){

    try{

      const base64Image = reader.result;

      const response = await fetch(API,{
        method:'POST',
        body:new URLSearchParams({
          action:'uploadPhoto',
          image: base64Image
        })
      });

      const text = await response.text();
      console.log("SERVER:", text);

      const data = JSON.parse(text);

      if(data.url){
        photoURLInput.value = data.url;
        alert("Upload success");
      }else{
        alert("Server error");
        photoURLInput.value="";
      }

    }catch(err){
      console.error(err);
      alert("Upload error");
      photoURLInput.value="";
    }

  };

});
</script>

</body>
</html>
