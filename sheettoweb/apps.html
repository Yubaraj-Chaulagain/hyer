<title>Chat System</title>
<style>
body{margin:0;font-family:Arial;background:#ece5dd}
.box{background:#fff;padding:15px;margin:15px;border-radius:10px}
input,button,select{padding:8px;margin:5px;font-size:14px}
button{background:#075e54;color:white;border:none;border-radius:5px}
#chat,#publicChat{height:50vh;overflow:auto;background:#f1f1f1;padding:10px;border-radius:8px}
.msgMe{background:#dcf8c6;padding:6px;margin:4px;border-radius:6px;text-align:right}
.msgOther{background:#fff;padding:6px;margin:4px;border-radius:6px;text-align:left}
</style>
</head>
<body>
   <!-- Splash Screen को डिजाइन -->
<div id="splash-screen">
    <div class="splash-content">
        <!-- ImgBB को लोगो लिङ्क यहाँ हाल्नुहोस् -->
        <img src="https://i.ibb.co/C5YhXsr4/m2i8-H7-G6b1-K9b1-G6.png" alt="Logo" class="splash-logo">

<style>
/* Splash Screen CSS */
#splash-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #007bff; /* एपको मुख्य रङ */
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

.splash-content { text-align: center; color: white; }

.splash-logo {
    width: 120px; height: 120px;
    border-radius: 20px;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
}

.splash-text { font-family: sans-serif; font-weight: bold; }

/* घुम्ने लोडर (Loading Circle) */
.loader {
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 30px; height: 30px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Login</h3>
  <input id="loginID" placeholder="Member ID"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p>
    <a href="#" onclick="showSignup()">Signup</a> |
    <a href="#" onclick="showReset()">Forgot?</a>
  </p>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="box" style="display:none">
  <h3>Signup</h3>
  <input id="sid" placeholder="Member ID"><br>
  <input id="sname" placeholder="Name"><br>
  <input id="semail" placeholder="Email"><br>
  <input type="file" id="sphoto" accept="image/*">
<button onclick="openFile()">📎 Send File</button>
<br>
  <input type="text" id="photoURL" placeholder="Photo URL" readonly><br>
  <input id="spass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Register</button>
  <p><a href="#" onclick="showLogin()">Back</a></p>
</div>

<!-- RESET PASSWORD -->
<div id="resetBox" class="box" style="display:none">
  <h3>Reset Password</h3>
  <input id="fMemberID" placeholder="Member ID"><br>
  <button onclick="sendForgetOTP()">Send OTP</button><br>
  <input id="fOTP" placeholder="Enter OTP"><br>
  <input id="fNew" type="password" placeholder="New Password"><br>
  <input id="fNew2" type="password" placeholder="Retype New Password"><br>
  <button onclick="verifyForgetOTP()">Reset Password</button>
  <p><a href="#" onclick="showLogin()">Back</a></p>
  <p id="resetMsg" style="color:red;"></p>
</div>

<!-- CHAT AREA -->
<div id="chatArea" class="box" style="display:none">
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:10px;">
    <div style="text-align:right;margin-right:10px;">
      <div id="myName" style="font-weight:bold;"></div>
    </div>
    <img id="myPhoto" src="https://ui-avatars.com/api/?name=User&background=075e54&color=fff"
         style="width:40px;height:40px;border-radius:50%;cursor:pointer" onclick="changeProfilePhoto()">
  </div>

  <button onclick="showPrivate()">🔒 Private</button>
  <button onclick="showPublic()">🌍 Public</button>
  <button onclick="showChange()">⚙ Change Password</button>
  <button onclick="logout()">🚪 Logout</button>
  <hr>

  <!-- PRIVATE -->
  <div id="privateDiv">
    <select id="member"></select>
    <div id="chat"></div>
    <input id="msg" placeholder="Messages">
    <button onclick="sendPrivate()">Send</button>
  </div>

  <!-- PUBLIC -->
  <div id="publicDiv" style="display:none">
    <div id="publicChat"></div>
    <input id="publicMsg" placeholder="Public Messages">
    <button onclick="sendPublic()">Send</button>
  </div>

  <!-- CHANGE PASSWORD -->
  <div id="changeDiv" style="display:none">
<h4>Change Password</h4>
<input id="cold" type="password" placeholder="Current Password"><br>
<input id="cnew" type="password" placeholder="New Password"><br>
<input id="cretype" type="password" placeholder="Retype New Password"><br>
<button onclick="changePass()">Update Password</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwalMCiAaQ8CL7uutvNOJgmqecukye8ij7lK-1G2a0gy8Cz4H1srEQrPccipQVf050EfA/exec";
const IMG_API_KEY="8cd7b6025719a1b842b0779939b5db60"; // HTML मा राखिएको
const photoURLInput = document.getElementById("photoURL");
let lastMsgCount = 0;
let ME="";

// ---------- UI ----------
function showSignup(){loginBox.style.display="none";signupBox.style.display="block";}
function showLogin(){loginBox.style.display="block";signupBox.style.display="none";resetBox.style.display="none";}
function showReset(){loginBox.style.display="none";resetBox.style.display="block";}
function showPrivate(){privateDiv.style.display="block";publicDiv.style.display="none";changeDiv.style.display="none";}
function showPublic(){privateDiv.style.display="none";publicDiv.style.display="block";changeDiv.style.display="none";}
function showChange(){privateDiv.style.display="none";publicDiv.style.display="none";changeDiv.style.display="block";}

// ---------- LOGIN ----------
// ---------- LOGIN ----------
async function login() {
  const loginID = document.getElementById("loginID");
  const loginPass = document.getElementById("loginPass");
  const myName = document.getElementById("myName");
  const myPhoto = document.getElementById("myPhoto");
  const loginBox = document.getElementById("loginBox");
  const chatArea = document.getElementById("chatArea");

  // Notification permission
  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  // Check empty
  if (!loginID.value || !loginPass.value) {
    alert("Fill all fields");
    return;
  }

  try {
    let res = await fetch(API, {
      method: 'POST',
      body: new URLSearchParams({
        action: 'login',
        id: loginID.value,
        pass: loginPass.value
      })
    });

    let text = await res.text();

    if (text === "FAIL") {
      alert("Wrong Login");
      return;
    }

    const data = JSON.parse(text);

    // Save current user
    ME = data.name;

    // Show name and photo
    myName.innerText = data.name;
    myPhoto.src = data.photo && data.photo.trim() !== ""
      ? data.photo
      : "https://ui-avatars.com/api/?name=" + encodeURIComponent(data.name) + "&background=075e54&color=fff";

    // Show chat
    loginBox.style.display = "none";
    chatArea.style.display = "block";

    // Load members and messages
    loadMembers();
    setInterval(loadMessages, 1000);

  } catch (err) {
    console.error(err);
    alert("Login failed. Check network or API URL.");
  }
}
// ---------- SIGNUP ----------
async function signup(){
  if(!sid.value || !sname.value || !semail.value || !spass.value){
    alert("Fill all");
    return;
  }

  let photoURL = document.getElementById("photoURL").value;
  let deleteURL = "";

  const r = await fetch(API,{
    method:'post',
    body:new URLSearchParams({
      action:'register',
      id:sid.value,
      name:sname.value,
      email:semail.value,
      pass:spass.value,
      photo:photoURL,
      deleteurl:deleteURL
    })
  });

  const t = await r.json(); // JSON parse

  if(t.error){
    alert(t.error); // "Member ID already exists"
  } else {
    alert("Registered Successfully");
    showLogin();
  }
}
    

// ---------- LOGOUT ----------
async function logout(){

await fetch(API,{
method:'post',
body:new URLSearchParams({
action:'logout',
id:loginID.value
})
});

ME="";
chatArea.style.display="none";
loginBox.style.display="block";

}

// ---------- PRIVATE SEND ----------
async function sendPrivate(){if(!msg.value) return; await fetch(API,{method:'post',body:new URLSearchParams({action:'send',from:ME,to:member.value,msg:msg.value})}); msg.value="";}

// ---------- PUBLIC SEND ----------
async function sendPublic(){if(!publicMsg.value) return; await fetch(API,{method:'post',body:new URLSearchParams({action:'public',from:ME,msg:publicMsg.value})}); publicMsg.value="";}

// ---------- LOAD MESSAGES ----------
async function loadMessages() {
  let r = await fetch(API + "?action=msgs");
  let d = await r.json();

  chat.innerHTML = "";
  publicChat.innerHTML = "";

  d.slice(1).forEach(row => {
    let from = row[1];
    let to = row[2];
    let message = row[3];

    // Public message
    if (to == "ALL") {
      publicChat.innerHTML += "<div><b>" + from + ":</b> " + message + "</div>";
    }

    // Private message: only if a member is selected
    else if (member.value && ((from == ME && to == member.value) || (from == member.value && to == ME))) {
      chat.innerHTML += "<div class='" + (from == ME ? "msgMe" : "msgOther") + "'>" + message + "</div>";
    }
  });

  chat.scrollTop = chat.scrollHeight;
  publicChat.scrollTop = publicChat.scrollHeight;
}
// ---------- LOAD MEMBERS ----------
async function loadMembers() {
  let current = member.value; // अहिले select भएको member

  let r = await fetch(API + "?action=members");
  let list = await r.json(); // online members मात्र

  member.innerHTML =
    "<option value=''>Select Member</option>" +
    list.map(x => "<option value='" + x + "'>" + x + "</option>").join("");

  // पुरानो member अझै online छ भने select राख्नु
  if (current && list.includes(current)) {
    member.value = current;
  } else {
    member.value = ""; // old member offline भए empty
  }
}
// ---------- PASSWORD RESET ----------
// SEND OTP
async function sendForgetOTP(){
  const memberId = fMemberID.value.trim();
  if(!memberId){ resetMsg.innerText="Enter Member ID"; return; }

  const res = await fetch(API, {
    method:'POST',
    body: new URLSearchParams({
      action:'sendOTP',
      memberId: memberId
    })
  });
  const data = await res.json();

  if(data.error){
    resetMsg.innerText = data.error;
  } else {
    resetMsg.innerText = "OTP sent to your registered email.";
  }
}

async function verifyForgetOTP(){
  const memberId = fMemberID.value.trim();
  const otp = fOTP.value.trim();
  const pass1 = fNew.value.trim();
  const pass2 = fNew2.value.trim();

  if(!memberId || !otp || !pass1 || !pass2){ resetMsg.innerText="Fill all fields"; return; }
  if(pass1 !== pass2){ resetMsg.innerText="Passwords do not match"; return; }

  const res = await fetch(API, {
    method:'POST',
    body: new URLSearchParams({
      action:'verifyOTP',
      memberId: memberId,
      otp: otp,
      newpass: pass1
    })
  });

  const data = await res.json();
  if(data.error){ resetMsg.innerText = data.error; }
  else { resetMsg.innerText = "Password changed successfully."; showLogin(); }
}
    
// VERIFY + CHANGE PASSWORD
async function resetPass(){

if(!fotp.value || !fnew.value){
alert("Enter OTP and new password");
return;
}

let r = await fetch(API,{
method:'post',
body:new URLSearchParams({
action:'resetPass',
id:fid.value,
otp:fotp.value,
newpass:fnew.value
})
});

let t = await r.text();

if(t=="changed"){
alert("Password Changed Successfully");
showLogin();
}
else{
alert("Wrong OTP");
}

}
    
async function changePass(){

if(!cold.value || !cnew.value || !cretype.value){
alert("Fill all fields");
return;
}

if(cnew.value != cretype.value){
alert("New password not match");
return;
}

let r = await fetch(API,{
method:'post',
body:new URLSearchParams({
action:'changePass',
id:ME,
oldpass:cold.value,
newpass:cnew.value
})
});

let t = await r.text();

if(t=="changed"){
alert("Password Changed. Check Gmail.");
cold.value="";
cnew.value="";
cretype.value="";
showPrivate();
}
else{
alert("Current password wrong");
}

}
// ---------- PHOTO UPLOAD ----------
async function changeProfilePhoto(){
  const fileInput = document.createElement("input");
  fileInput.type="file"; fileInput.accept="image/*"; fileInput.click();
  fileInput.onchange = async ()=>{ 
    const file=fileInput.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload=async ()=>{
      let base64=reader.result.split(",")[1];
      let res=await fetch("https://api.imgbb.com/1/upload?key="+IMG_API_KEY,{
        method:"POST",
        body:new URLSearchParams({image:base64})
      });
      let data=await res.json();
      if(data.success){ 
        myPhoto.src=data.data.url;
        if(ME){ await fetch(API,{method:'post',body:new URLSearchParams({action:'updatePhoto',id:ME,photo:data.data.url})}); }
        alert("Photo Updated"); 
      }else alert("Upload Failed");
    };
    reader.readAsDataURL(file);
  };
}

// ---------- SIGNUP AUTO UPLOAD ----------
// profile photo click
uploadBtn.addEventListener("change", async () => {
  if (uploadBtn.files.length === 0) return;
  const file = uploadBtn.files[0];
  const reader = new FileReader();
  
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1]; // data:image/... हटाउने
    try {
      const res = await fetch("https://api.imgbb.com/1/upload?key=" + IMG_API_KEY, {
        method: "POST",
        body: new URLSearchParams({ image: base64 })
      });
      const data = await res.json();
      if (data.success) {
        photoURLInput.value = data.data.url; // photoURL मा URL set गरियो
        alert("फोटो सफलतापूर्वक upload भयो!");
      } else {
        alert("Upload failed");
      }
    } catch (err) {
      console.error(err);
      alert("Upload error");
    }
  };

  reader.readAsDataURL(file);
});

  // Example: Send photo/file/audio/video
async function sendFileMessage(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result;
    const filename = file.name;

    // 1️⃣ Upload to Litterbox
    const uploadRes = await fetch(API, {
      method: "POST",
      body: new URLSearchParams({
        action: "uploadTempFile",
        file: base64,
        name: filename
      })
    });
    const data = await uploadRes.json();
    if(!data.url){ alert("Upload failed"); return; }

    // 2️⃣ Send message with file URL
    await fetch(API, {
      method: "POST",
      body: new URLSearchParams({
        action: "send",
        from: ME,
        to: member.value,
        msg: "",
        type: file.type.split("/")[0],
        fileURL: data.url
      })
    });
  };
  reader.readAsDataURL(file);
}

// Usage: file input
function openFile(){
  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.onchange = ()=> sendFileMessage(fileInput.files[0]);
  fileInput.click();
}
window.onload = () => {
  const uploadBtn = document.getElementById("sphoto");
};
</script>
