<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">   

<style>
body{
    padding:15px;
    background:#f8f9fa;
}
.table-responsive{
    max-height:85vh;
    overflow:auto;
}
h3{
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="container-fluid">

    <h3>Member List</h3>

    <input
        type="text"
        id="memberSearch"
        class="form-control mb-3"
        placeholder="Search Member..."
        onkeyup="searchMembers()">

    <div class="table-responsive">
        <table class="table table-bordered table-striped table-sm">
            <tbody id="tbl">
                <tr>
                    <td>Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxQ8vujV7sUyBx_4DqYICc2czRBvNqkiTSu0PYLKcypaUAKqdQWOBMJQwsJTJFCS2zS/exec";

let members = [];

window.onload = function(){
    loadMembers();
};

function loadMembers(){

    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            action:"getMembers"
        })
    })
    .then(response => response.json())
    .then(data => {

        members = data;
        drawMembers(data);

    })
    .catch(error => {

        console.error(error);

        document.getElementById("tbl").innerHTML =
        "<tr><td>Unable to load members</td></tr>";

    });

}

function drawMembers(data){

    const tbl = document.getElementById("tbl");

    if(!data || data.length === 0){
        tbl.innerHTML =
        "<tr><td>No Members Found</td></tr>";
        return;
    }

    let html = "<tr>";

    Object.keys(data[0]).forEach(key => {

        if(
            key !== "Member PhotoURL" &&
            key !== "Identy PhotoURL"
        ){
            html += "<th>" + key + "</th>";
        }

    });

    html += "</tr>";

    data.forEach(member => {

        html += "<tr>";

        Object.entries(member).forEach(([key,val]) => {

            if(
                key !== "Member PhotoURL" &&
                key !== "Identy PhotoURL"
            ){
                html += "<td>" + (val || "") + "</td>";
            }

        });

        html += "</tr>";

    });

    tbl.innerHTML = html;

}

function searchMembers(){

    const q = document
        .getElementById("memberSearch")
        .value
        .toLowerCase();

    const filtered = members.filter(member =>
        Object.values(member).some(value =>
            String(value)
            .toLowerCase()
            .includes(q)
        )
    );

    drawMembers(filtered);

}

</script>

</body>
</html>
