<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Cashbook</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Offline Cashbook</h1>
<p>Status: <span id="status">Checking...</span></p>

<input type="date" id="date"/>
<input type="text" id="memberId" placeholder="Member ID"/>
<input type="number" id="receivedAmt" placeholder="Received Amount"/>
<input type="number" id="bankiAmt" placeholder="Banki Amount"/>
<input type="text" id="description" placeholder="Description"/>
<button onclick="addEntry()">Add Entry</button>

<select id="memberFilter" onchange="filterMember()">
  <option value="">All Members</option>
</select>

<button onclick="exportExcel()">Export to Excel</button>

<h3>Daily Totals</h3>
<p>Income: <span id="totalIncome">0</span> | Expense: <span id="totalExpense">0</span></p>

<table>
<thead>
<tr><th>Date</th><th>Member ID</th><th>Received</th><th>Banki</th><th>Description</th></tr>
</thead>
<tbody id="entries"></tbody>
</table>

<script>
const statusEl = document.getElementById('status');
const entriesEl = document.getElementById('entries');
const memberFilterEl = document.getElementById('memberFilter');
const totalIncomeEl = document.getElementById('totalIncome');
const totalExpenseEl = document.getElementById('totalExpense');

const STORAGE_KEY = 'offlineCashbook';
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyEMqZdcJGHsjAO238RC-XptHSPmSRzjqF5wxagoKKo0RDW7BK_xfy64BAO2VspBKBd/exec'; // Replace with deployed web app URL

function updateStatus(){
  if(navigator.onLine){
    statusEl.textContent='Online';
    statusEl.className='online';
    syncDataToGoogleSheet();
  } else {
    statusEl.textContent='Offline';
    statusEl.className='offline';
  }
}

function loadEntries(){
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  entriesEl.innerHTML='';

  const memberSet = new Set();
  let totalIncome=0, totalExpense=0;

  data.forEach(entry=>{
    memberSet.add(entry.memberId);
    totalIncome += parseFloat(entry.receivedAmt);
    totalExpense += parseFloat(entry.bankiAmt);
  });

  totalIncomeEl.textContent = totalIncome;
  totalExpenseEl.textContent = totalExpense;

  memberFilterEl.innerHTML = '<option value="">All Members</option>';
  memberSet.forEach(m=>{memberFilterEl.innerHTML += `<option value="${m}">${m}</option>`});

  displayEntries(data);
}

function displayEntries(data){
  const filter = memberFilterEl.value;
  const today = new Date().toISOString().slice(0,10);
  const filtered = data.filter(entry => (entry.date === today) && (filter === "" || entry.memberId === filter));

  entriesEl.innerHTML='';
  filtered.forEach(entry=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`<td>${entry.date}</td><td>${entry.memberId}</td><td>${entry.receivedAmt}</td><td>${entry.bankiAmt}</td><td>${entry.description}</td>`;
    entriesEl.appendChild(tr);
  });
}

function addEntry(){
  const date=document.getElementById('date').value;
  const memberId=document.getElementById('memberId').value;
  const receivedAmt=document.getElementById('receivedAmt').value;
  const bankiAmt=document.getElementById('bankiAmt').value;
  const description=document.getElementById('description').value;

  if(!date || !memberId || !receivedAmt || !bankiAmt || !description){
    alert('Fill all fields'); return;
  }

  const newEntry={date, memberId, receivedAmt, bankiAmt, description};
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  data.push(newEntry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  document.getElementById('date').value='';
  document.getElementById('memberId').value='';
  document.getElementById('receivedAmt').value='';
  document.getElementById('bankiAmt').value='';
  document.getElementById('description').value='';

  loadEntries();
  if(navigator.onLine) syncDataToGoogleSheet();
}

function filterMember(){
  loadEntries();
}

async function syncDataToGoogleSheet(){
  const data=JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if(data.length===0) return;

  try{
    const response = await fetch(WEB_APP_URL,{
      method:'POST',
      body:JSON.stringify({entries:data}),
      headers:{"Content-Type":"application/json"}
    });
    const result=await response.json();
    if(result.success){
      localStorage.removeItem(STORAGE_KEY);
      loadEntries();
      console.log('Data synced!');
    } else {
      console.log('Sync failed:', result.error);
    }
  } catch(err){
    console.log('Sync error', err);
  }
}

function exportExcel(){
  const data = [];
  const rows = document.querySelectorAll('#entries tr');
  rows.forEach(row=>{
    const rowData = [];
    row.querySelectorAll('td').forEach(td=>rowData.push(td.textContent));
    data.push(rowData);
  });

  let csvContent = "data:text/csv;charset=utf-8," 
    + data.map(e=>e.join(",")).join("\n");

  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", "cashbook_today.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

window.addEventListener('online',updateStatus);
window.addEventListener('offline',updateStatus);

updateStatus();
loadEntries();
</script>

</body>
</html>
