<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashbook PRO</title>

<style>
body { font-family: Arial; padding:20px; max-width:700px; margin:auto; }
input, button { width:100%; padding:10px; margin:5px 0; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
.online { color:green; }
.offline { color:red; }
.edit-btn { cursor:pointer; color:blue; }
</style>
</head>

<body>

<h2>💰 Cashbook (Offline + Sync)</h2>
Status: <b id="status"></b>

<input type="date" id="date">
<input type="text" id="memberId" placeholder="Member ID">
<input type="number" id="receivedAmt" placeholder="Received Amount">
<input type="number" id="bankiAmt" placeholder="Banki Amount">
<input type="text" id="desc" placeholder="Description">
<button onclick="add()">➕ Add</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Member ID</th>
<th>Received</th>
<th>Banki</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwtNNpt8tdOXJm6IbWM8FSlNSx0MU--yMNejtWzfRgykQyip_c6zhzdyK3v1nIXmZO7/exec"; // replace with your Apps Script URL
const KEY = "cashbook_offline";

// Set this to true for admin edit/update
const isAdmin = true;

// LocalStorage helpers
function getData(){ return JSON.parse(localStorage.getItem(KEY)||"[]"); }
function setData(d){ localStorage.setItem(KEY, JSON.stringify(d)); }

// Draw table
function draw(){
  const d = getData();
  tbl.innerHTML = "";
  d.forEach((x,i)=>{
    tbl.innerHTML += `<tr>
      <td>${x.date}</td>
      <td>${x.memberId || ""}</td>
      <td>${x.receivedAmt || 0}</td>
      <td>${x.bankiAmt || 0}</td>
      <td>${x.description || ""}</td>
      <td>${isAdmin ? `<span class="edit-btn" onclick="edit(${i})">Edit</span>` : ""}</td>
    </tr>`;
  });
}

// Add new entry
function add(){
  if(!date.value || !memberId.value) return alert("Fill Date and Member ID");

  let d = getData();
  d.push({
    date: date.value,
    memberId: memberId.value,
    receivedAmt: receivedAmt.value || 0,
    bankiAmt: bankiAmt.value || 0,
    description: desc.value || "",
    synced: false
  });

  setData(d);
  date.value=""; memberId.value=""; receivedAmt.value=""; bankiAmt.value=""; desc.value="";
  draw();
  sync(); // try immediately
}

// Edit an entry (Admin only)
function edit(idx){
  const d = getData();
  const e = d[idx];
  // Fill inputs for editing
  date.value = e.date;
  memberId.value = e.memberId;
  receivedAmt.value = e.receivedAmt;
  bankiAmt.value = e.bankiAmt;
  desc.value = e.description;

  // Remove old entry before update
  d.splice(idx,1);
  setData(d);
  draw();
}

// 🔥 SYNC
async function sync(){
  if(!navigator.onLine){
    status.innerHTML = "OFFLINE"; status.className="offline"; return;
  }

  status.innerHTML="SYNCING..."; status.className="online";

  let data = getData();
  let unsynced = data.filter(x=>!x.synced);
  if(unsynced.length===0){ status.innerHTML="✅ Up to date"; return; }

  try{
    const res = await fetch(API,{
      method:"POST",
      body: JSON.stringify({entries: unsynced})
    });
    const txt = await res.text();
    let json = JSON.parse(txt);

    if(json.success){
      data = data.map(x=>({...x,synced:true}));
      setData(data);
      status.innerHTML = `✅ Synced ${unsynced.length} items`;
      draw();
    } else {
      status.innerHTML = "❌ Server error";
    }

  }catch(e){
    console.log("ERROR:",e);
    status.innerHTML="❌ Retry later";
  }
}

// AUTO EVENTS
window.addEventListener("online", sync);
window.addEventListener("load", ()=>{
  draw(); sync();
});
setInterval(sync, 10000);

</script>
</body>
</html>
