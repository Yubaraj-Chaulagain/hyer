<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashbook PRO</title>

<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; }
input, button { width:100%; padding:10px; margin:5px 0; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
.online { color:green; }
.offline { color:red; }
</style>
</head>

<body>

<h2>💰 Cashbook (Offline + Sync)</h2>
Status: <b id="status"></b>

<input type="date" id="date">
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="desc" placeholder="Description">
<button onclick="add()">➕ Add</button>

<table>
<thead>
<tr><th>Date</th><th>Amount</th><th>Description</th></tr>
</thead>
<tbody id="tbl"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbyOlLVFxH34xR5tndDGpAN-l88XMnb8oXZRvgdvfBwDPZtplrneFBOuJHEDMYwJ5Nan/exec";

const KEY = "cashbook_offline";

function getData(){
  return JSON.parse(localStorage.getItem(KEY)||"[]");
}

function setData(d){
  localStorage.setItem(KEY, JSON.stringify(d));
}

function draw(){
  const d = getData();
  tbl.innerHTML = "";
  d.forEach(x=>{
    tbl.innerHTML += `<tr>
      <td>${x.date}</td>
      <td>${x.amount}</td>
      <td>${x.description}</td>
    </tr>`;
  });
}

function add(){
  if(!date.value || !amount.value) return alert("Fill data");

  let d = getData();
  d.push({
    date: date.value,
    amount: amount.value,
    description: desc.value || "",
    synced: false
  });

  setData(d);
  date.value=""; amount.value=""; desc.value="";
  draw();
  sync(); // try immediately
}

// 🔥 MAIN SYNC ENGINE
async function sync(){
  if(!navigator.onLine){
    status.innerHTML = "OFFLINE";
    status.className = "offline";
    return;
  }

  status.innerHTML = "SYNCING...";
  status.className = "online";

  let data = getData();
  let unsynced = data.filter(x=>!x.synced);

  if(unsynced.length===0){
    status.innerHTML = "✅ Up to date";
    return;
  }

  try{
    const res = await fetch(API,{
      method:"POST",
      body: JSON.stringify({entries: unsynced})
    });

    const txt = await res.text();
    console.log("SERVER:", txt);

    let json = JSON.parse(txt);

    if(json.success){
      // mark synced
      data = data.map(x=>({...x, synced:true}));
      setData(data);

      status.innerHTML = "✅ Synced "+unsynced.length+" items";
      draw();
    }else{
      status.innerHTML = "❌ Server error";
    }

  }catch(e){
    console.log("ERROR:", e);
    status.innerHTML = "❌ Retry later";
  }
}

// AUTO EVENTS
window.addEventListener("online", sync);
window.addEventListener("load", ()=>{
  draw();
  sync();
});

// 🔁 AUTO RETRY EVERY 10 sec
setInterval(sync, 10000);

</script>

</body>
</html>
