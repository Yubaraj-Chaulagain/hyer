<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Cashbook</title>
<style>
body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; }
h1 { text-align: center; }
input, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
.offline { color: red; }
.online { color: green; }
</style>
</head>
<body>

<h1>Offline Cashbook</h1>
<p>Status: <span id="status"></span></p>

<input type="date" id="date" placeholder="Date">
<input type="text" id="memberId" placeholder="Member ID">
<input type="number" id="receivedAmt" placeholder="Received Amount">
<input type="number" id="bankiAmt" placeholder="Banki Amount">
<input type="text" id="description" placeholder="Description">
<button onclick="addEntry()">Add Entry</button>

<hr>
<h3>Search / Filter</h3>
<input type="date" id="searchDate" placeholder="Search by date">
<button onclick="filterEntries()">Search</button>
<button onclick="loadEntries()">Show All</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Member ID</th>
<th>Received Amt</th>
<th>Banki Amt</th>
<th>Description</th>
</tr>
</thead>
<tbody id="entries"></tbody>
</table>

<script>
const STORAGE_KEY = 'offlineCashbook';
const entriesEl = document.getElementById('entries');
const statusEl = document.getElementById('status');

// Replace with your Apps Script Web App URL
const WEB_APP_URL = 'YOUR_WEB_APP_URL_HERE';

// Update online/offline status
function updateStatus() {
  if (navigator.onLine) {
    statusEl.textContent = 'Online';
    statusEl.className = 'online';
    syncDataToGoogleSheet();
  } else {
    statusEl.textContent = 'Offline';
    statusEl.className = 'offline';
  }
}

// Load all entries from localStorage
function loadEntries() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  displayEntries(data);
}

// Display filtered or all entries
function displayEntries(data) {
  entriesEl.innerHTML = '';
  data.forEach(entry => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${entry.date}</td>
      <td>${entry.memberId}</td>
      <td>${entry.receivedAmt}</td>
      <td>${entry.bankiAmt}</td>
      <td>${entry.description}</td>
    `;
    entriesEl.appendChild(tr);
  });
}

// Add a new entry
function addEntry() {
  const date = document.getElementById('date').value;
  const memberId = document.getElementById('memberId').value;
  const receivedAmt = document.getElementById('receivedAmt').value;
  const bankiAmt = document.getElementById('bankiAmt').value;
  const description = document.getElementById('description').value;

  if (!date || !memberId || !receivedAmt || !bankiAmt || !description) {
    alert('Please fill all fields'); return;
  }

  const newEntry = { date, memberId, receivedAmt, bankiAmt, description };
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  data.push(newEntry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  document.getElementById('date').value = '';
  document.getElementById('memberId').value = '';
  document.getElementById('receivedAmt').value = '';
  document.getElementById('bankiAmt').value = '';
  document.getElementById('description').value = '';

  loadEntries();
  if (navigator.onLine) syncDataToGoogleSheet();
}

// Filter entries by date
function filterEntries() {
  const searchDate = document.getElementById('searchDate').value;
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const filtered = data.filter(e => e.date === searchDate);
  displayEntries(filtered);
}

// Sync local data to Google Sheet
async function syncDataToGoogleSheet() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (data.length === 0) return;

  try {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({ entries: data }),
      headers: { "Content-Type": "application/json" }
    });
    const result = await response.json();
    if (result.success) {
      localStorage.removeItem(STORAGE_KEY);
      loadEntries();
      console.log('Data synced to Google Sheet!');
    } else {
      console.log('Sync failed:', result.error);
    }
  } catch (err) {
    console.log('Sync error:', err);
  }
}

// Detect online/offline
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

// Initial load
updateStatus();
loadEntries();
</script>

</body>
</html>
