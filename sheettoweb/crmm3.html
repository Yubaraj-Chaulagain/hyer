<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-3">

<h4 class="mb-3">📋 Members List</h4>

<!-- SEARCH -->
<input id="search" class="form-control mb-3" placeholder="Search member..." onkeyup="searchMembers()">

<!-- TABLE -->
<div class="table-responsive">
<table class="table table-bordered table-sm">
<thead class="table-dark">
<tr>
  <th>Member ID</th>
  <th>Name</th>
  <th>Phone</th>
  <th>Address</th>
  <th>Email</th>
  <th>Photo</th>
</tr>
</thead>

<tbody id="tbl"></tbody>
</table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQ8vujV7sUyBx_4DqYICc2czRBvNqkiTSu0PYLKcypaUAKqdQWOBMJQwsJTJFCS2zS/exec";

let members = [];

// LOAD MEMBERS
function loadMembers(){
  fetch(API,{
    method:"POST",
    body: JSON.stringify({ action:"getMembers" })
  })
  .then(r=>r.json())
  .then(data=>{
    members = data;
    drawTable(data);
  })
  .catch(err=>{
    console.error(err);
    alert("Failed to load members");
  });
}

// DRAW TABLE
function drawTable(data){
  const tbl = document.getElementById("tbl");
  tbl.innerHTML = "";

  if(!data || data.length === 0){
    tbl.innerHTML = "<tr><td colspan='6'>No Members Found</td></tr>";
    return;
  }

  data.forEach(m=>{
    tbl.innerHTML += `
      <tr>
        <td>${m.MemberID || ""}</td>
        <td>${m.Name || ""}</td>
        <td>${m.Phone || ""}</td>
        <td>${m.Address || ""}</td>
        <td>${m.Email || ""}</td>
        <td>
          ${m["Member PhotoURL"] 
            ? `<img src="${m["Member PhotoURL"]}" width="40" height="40" style="border-radius:50%">`
            : ""}
        </td>
      </tr>
    `;
  });
}

// SEARCH
function searchMembers(){
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = members.filter(m =>
    Object.values(m).some(v =>
      String(v).toLowerCase().includes(q)
    )
  );

  drawTable(filtered);
}

// INIT
loadMembers();
</script>

</body>
</html>
