<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App PRO</title>

<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:10px;background:#f5f5f5}
button{padding:10px;margin:5px;border:none;border-radius:6px;background:#007bff;color:#fff}
input,select{padding:8px;margin:5px;width:100%}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
#status{font-weight:bold}
.badge{padding:5px 10px;border-radius:20px}
.offline{background:red;color:#fff}
.online{background:green;color:#fff}
</style>
</head>

<body>

<h2>💰 Finance App PRO</h2>
<div id="status"></div>
<div id="pending"></div>

<div class="card">
  <input id="amount" placeholder="Amount">
  <select id="type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>
  <button onclick="saveTransaction()">Save</button>
</div>

<div class="card">
  <h3>Transactions</h3>
  <ul id="list"></ul>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQ8vujV7sUyBx_4DqYICc2czRBvNqkiTSu0PYLKcypaUAKqdQWOBMJQwsJTJFCS2zS/exec";

// ===== IndexedDB =====
let db;
const DB_NAME="FinanceDB";
const STORE="offline";

function initDB(){
 return new Promise((res,rej)=>{
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore(STORE,{autoIncrement:true});
  };
  req.onsuccess=e=>{db=e.target.result;res();};
  req.onerror=rej;
 });
}

function saveOffline(data){
 const tx=db.transaction(STORE,"readwrite");
 tx.objectStore(STORE).add(data);
 updatePending();
}

function getOffline(){
 return new Promise(res=>{
  const tx=db.transaction(STORE,"readonly");
  const req=tx.objectStore(STORE).getAll();
  req.onsuccess=()=>res(req.result);
 });
}

function clearOffline(){
 const tx=db.transaction(STORE,"readwrite");
 tx.objectStore(STORE).clear();
 updatePending();
}

// ===== Smart Save =====
async function smartFetch(payload){
 if(navigator.onLine){
  try{
    const r=await fetch(API,{method:"POST",body:JSON.stringify(payload)});
    const d=await r.json();
    if(!d.status) saveOffline(payload);
    return d;
  }catch(e){
    saveOffline(payload);
    return {offline:true};
  }
 }else{
  saveOffline(payload);
  return {offline:true};
 }
}

// ===== Sync =====
async function sync(){
 if(!navigator.onLine) return;
 const data=await getOffline();
 if(!data.length) return;

 for(const item of data){
  try{
    await fetch(API,{method:"POST",body:JSON.stringify(item)});
  }catch(e){return;}
 }
 clearOffline();
 loadData();
}

// ===== UI =====
function updateStatus(){
 const s=document.getElementById("status");
 if(navigator.onLine){
  s.innerHTML='<span class="badge online">ONLINE</span>';
 }else{
  s.innerHTML='<span class="badge offline">OFFLINE</span>';
 }
}

async function updatePending(){
 const data=await getOffline();
 document.getElementById("pending").innerText="Pending Sync: "+data.length;
}

// ===== Save =====
async function saveTransaction(){
 const payload={
  action:"add",
  amount:document.getElementById("amount").value,
  type:document.getElementById("type").value
 };

 const res=await smartFetch(payload);

 if(res.offline){alert("Saved Offline");}
 else{alert("Saved Online");}

 loadData();
}

// ===== Load =====
async function loadData(){
 try{
  const r=await fetch(API);
  const data=await r.json();

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(d=>{
    const li=document.createElement("li");
    li.innerText=d.type+" - "+d.amount;
    list.appendChild(li);
  });

 }catch(e){console.log("Offline mode");}
}

// ===== Init =====
window.addEventListener("load",async()=>{
 await initDB();
 updateStatus();
 updatePending();
 sync();
 loadData();
});

window.addEventListener("online",()=>{updateStatus();sync();});
window.addEventListener("offline",updateStatus);

</script>

</body>
</html>
